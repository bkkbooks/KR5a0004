front:
  text: 无上内祕眞藏經卷之五洪十二
  hash: sha256:58b1bd88c59422de6d7e14697c63e40adfbe39edd1d889bc87565bdd19206b97
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0004_HFL_005-001a, image: hfl/0015/0015-030.png}
body:
  text: 普明品爾時元始天尊遊居西那大福堂國形無定相或隱或顯或麤或妙在靈解山從容自在其山髙廣遍覆法界林藪䝉籠虎狼獅子毒蟲惡獸傷害羣生噉食物命其山之内復有隱居賢士精思修道學大乗行決定無疑護守心城摧滅魔賊復有三萬六千衆生習其縁業各有所趣種種不同元始天尊處於大衆忽然變體入寳珠中寂然不動四衆驚駭莫知所在七日七夜光景不見猛獸毒蟲轉加興盛一國男女號天叩地無所歸依爾時眞藏童子於大衆中恬然靜慮稽顙伏地奉請天尊願救蒼生慈恩重見懇陳未訖忽見山上光明遍照十方無極世界地獄幽徒悉皆解脫爾時天尊坐本微華端然不動怡神含笑威徳光明猛獸毒蟲悉皆摧滅於是天尊告眞藏童子汝當爲諸大衆宣揚眞藏甚深無上妙法令諸衆生覺煩惱性達空有心滌蕩五情生死一相有無平等眞藏童子承天尊力冉冉昇虚變見自在於大衆中顯智慧光說無生理慧光普照無大不通無細不入進彼百千日月光景隨諸衆生所求皆得無極世界有縁無縁悉皆備足信心重者皆來聽受四衆雲集天尊變大光明清涼竒雅顯衆生性寂靜無爲無生無滅無去無來預有縁者皆了正法寂然悟道縁慮永斷分别不生何以故道無二故生死無二去來無二愚智無二髙下無二取捨無二衆生迷惑假說因縁接引示迷扶欄徒歩衆生根性種種不同略說異途開爲三品上根衆生了逹身相不入道徳不出生死無道徳際無生死際無人我際無塵垢際無行業際中品衆生捨離生死貪求道徳有出有入有道徳際有生死際有人我際有塵垢際有行業際下品衆生無明障重不覺不知沉溺苦海冥冥長夜無有出期四部大衆及諸男女汝等諦聽善思如是慧光從何而來出入推求非内非外湛然清淨究竟道場一相光明平等無二眼入慧者達色妙理耳入慧者達聲妙音鼻入慧者達香妙氣舌入慧者達味妙味身入慧者達身妙身心入慧者達心妙心一切諸法悉皆被入惡鬼毒蟲及諸邪見地獄餓鬼獄卒畜生皆發善心飡甘露藥善男女等深入法性自在無爲善察心源皎然無礙學大方便不捨有爲不住無爲功徳具足成無上道大衆疑惑有一童子名曰善音敢問眞藏童子顯天尊徳宣揚慧光因縁普被爲一光周普爲一切自有斯光者一光被者則從外來一切衆生從外受得則是無常若各自有不應又云慧光普被如是疑惑唯願決了耳眞藏童子答言汝諸大衆分明聽受我從無量劫來發大乗願今始得聞了逹因縁識諸業報汝所問者衆生外受即是無常若各自有不應又云慧光普被我所顯光衆生受潤天尊大慧之光非内非外非長非短非顯非不顯妙鑄羣生並皆䝉益所利益者一切衆生與天尊無毫𨤲差别云何有外入無常云何有光可顯又問旣無差别即是天尊云何有衆生迷惑云何有衆生受苦云何有衆生修道答曰汝漸就迷作如此難一切衆生受苦樂者皆是慧源與天尊無毫𨤲差别汝等當行六行通六合之道何謂六合眼與色合心不縁色不縁色故則是忘色耳與聲合心不縁聲不縁聲故則是忘聲鼻與香合心不縁香不縁香故則是忘香口與味合心不縁味不縁味故則是忘味身與觸合心不縁觸不縁觸故則是忘觸如是行行去來常一取捨常一坐卧常一動靜常一是非常一心城守固斷諸外賊羣邪徒黨並皆磨滅法王自在猶如明珠内外通徹見法明淨塵穢莫染入一相門即名大道則是法母能生諸法諸法悉具三十二相八十一好裝嚴色身功徳具足若有善男女等靜心直念常行慈愛不貪不欲翻却六賊入五通城破三兵陣四固無侵得無畏力煩惱不生恩愛永斷善音等衆歡喜歡曰善哉善哉眞藏童子宣揚妙義廣示因縁開大乗門濟沉溺苦爲法梯隥爲法舟航天尊告諸徒衆善音大士汝等莫疑眞藏童子此人無量劫未發心求道功徳廣逺不可稱量今當爲汝廣說玄心宻行反守舊城晝夜廵行勿令缺漏一切衆聖常行此法此法最妙爲衆行之本吾今得道由此而悟汝等徒衆不得懈怠勤行此行調伏六關法無有定不可執爲何以故法如幻故寂滅無生法常變故窅窅無心幻生於變變生於幻變生幻滅變生無生幻滅無滅各不相知自然解脫衆生愚闇夜中織網自纒自縛恒處網中三大毒蛇共同一室八劫之賊圍繞四方㝠㝠長夜不能得出汝等徒衆勤行精進取吾一字勿他念想何以故法無二念當知三界之中有漏衆生無方便慧煩惱火燒炎熾難滅種種教示終無悟解善男子汝等正念思惟鑚煩惱性煩惱淨者得慧眼淨慧眼淨故得方便力方便力故則六識常轉六識常轉則無受無染無縛無解得法自在名爲法王眞藏童子上白天尊今日大衆承法威顔得方便慧悟解衆生達諸根性入實相門天尊巧說善得機縁方便易解不審當來衆生受持何法云行何法何法易受何法易行何法難受何法難行天尊答曰善哉善哉汝大慈悲爲縁請益當來衆生無有慧眼汝等諦聽善思善念吾爲汝說眞藏正經無生無滅當來衆生依此文義自然得解我顯一字非過去非未來非見在非内非外非長非短此一字者易受易行諸觀之法種種方便此觀第一初從數心心法不住法不住故則無定法無定法故則見道慧見道慧者即是本身不生不滅復有三種莊嚴智慧入法神通一者貪著二者嗔怒三者癡愛此三法者爲行之先證道之所何以故法無貪故貪性寂滅法無嗔故嗔性清淨法無癡故癡性解脫證此性者達三寳門入眞藏法名大法王種種具足是時善音童子及諸大衆聞此妙法各各自思昔所未聞今日所聞昔所未見今日所見十方衆聖甚深法藏不可思議並是天尊大慈悲力開闡要門令衆易解爾時善音童子及諸大衆歡喜稽首而作頌曰法王法鼓鼔無邊四魔八賊皆降伏我等我衆衆易悟諸法究竟無差别慧光慧炬炬常明遍照羣生無遣失大乗大行行無方輪轉法音巧能說羣生羣業業相親識網迷途無眞實天尊神徳徳護持善說愚夫令捨質貪嗔貪著著無求變成眞藏常歡恱稽首稽心心正念常行供養無虧徹爾時天尊告諸大衆善音童子善哉善哉汝能稱歎眞藏妙經勸諸徒衆勤行修習反觀慧光莊嚴六行息世機嫌不生愛結心慧明朗何以故法性淨故煩惱性淨貪慾性淨復有諸善男女雖復出家學小乗行端坐無爲日常一食教化羣生令習我業自尊自貴自是非彼名爲衆生不名善士非吾弟子吾非其師徒自疲勞終無得道我昔無量劫時亦復如是勤行苦行隱於山林求道妙果累劫辛苦道不可階後遇無上尊師大善知識爲我決疑教心迷道入五無間殺五魔賊守一不變神靈自在正念思惟悟無上道是時三萬六千衆生隨吾學道出分別城得無相理坐獅子座宣揚妙法廣濟衆生慈悲普覆汝等徒衆調伏諸相㝷善知識平等正直達正世因鼔動衆生法芽增長慧眼開發入方便門巧積智深成無上道復次一切諸法猶如鏡像非空非有畢竟無我復次衆生色心猶如鏡像非空非有畢竟清淨復次三乗教迹猶如鏡像非空非有畢竟解脫復次衆生三業猶如鏡像非空非有畢竟空寂善男子當知此經大乗無漏非覆相說非妄說非假說顯諸法性入實相門於諸經中最爲第一復次徃古劫時有五貧士常懐我慢不信經法聞此大乗而生毀謗滅三寳門不信衆生有眞道性不信衆生有經妙法不信衆生無我寂滅不信衆生等大乗法不信衆生不生不滅不信衆生心大如海不信衆生等天尊行不信衆生等諸賢聖不信衆生爲大空聚如此不信即得重病生入闇獄死入闇獄行入闇獄住入闇獄坐入闇獄卧入闇獄食入闇獄息入闇獄諸善男女各自思惟勿生不信若不達解能行直心不生毀謗此人得無量福田功徳廣逺何以故法無相故法無定故法解脫故當知直心道場不壊諸法入諸妙寂不壞生死入諸實相不壞取捨入諸智慧不壞嗔癡入諸解脫不壞貪欲入諸法寳不壞是非入諸正道不壊聲色入諸福田不壊六情入諸無漏不壞五隂入諸大慧不壞四大入諸神通此法微妙終劫說之亦不能盡若有衆生知易悟者略說半字直證大乗解無上道假使說法數如沙塵衆生迷闇亦不能解說亦無量況善男子若有信心受持讀誦講說供養善解忘神洗除心垢功徳廣逺不可思議爾時有一國王名曰大通甚信道徳常行恭敬受持眞藏妙經宣揚國内大臣子弟天下百姓悉皆受持此經當爾之時國富民豐男女歡樂壽命長逺無有夭傷當知此經威神徳重未有不由此經而得成道此經最尊最貴決開耳目爲法舟航濟沉溺苦爲法梯隥超出五苦爲法父母普度衆生爲法本身悉得自在何以故十方衆聖悉共護持方便降魔顯微妙藥爾時眞藏童子告善音等汝等大衆在靈解山聽天尊說有一明珠在此山内光明瑩淨非表非内非髙非下輪轉去來寂然無動汝等四衆見此珠不善音等衆歎曰善哉善哉我等徒衆累劫求道在此山中聞有明珠未曽得見唯願大士承天尊力爲顯明珠分明證實大士眞藏告諸來者汝等各各反顧伏地諦思明珠自顯說此語巳須㬰之間光照表裹各各迷途猖狂失性人人自視絶迹無端獨脫還家自然覺悟明識寳珠非可顯詔是時天尊歡喜無量而說偈曰我說大乗宗分别顯諸相方便引衆生寳光無限量智者了分明愚人自生謗我顯眞藏經洗盪無明障汝等善修行一字中含養諸法無定形猶如鏡中像寳珠非内外冥心内神朗功徳並熏天大乗無偏黨十方諸聖道受持眞藏經常行不解怠得成無上尊我今說譬喻示本假明權衆生不信道習業恩愛因各行方便慧五廕裹求㝷是時元始天尊在靈解山宣揚半偈告諸男女善建福田修行供養不離身心而得解脫得解脫者寂靜道場入法正印證三世因成無上果復告善音童子一切衆生心性解脫身相解脫心爲言教身爲文字尋文逐字教迹斯忘悟此文字入解脫門證無上道善音童子上白天尊不審何故衆生心爲言教身爲文字衆生心是癡心身是闇網云何令衆生學其癡心而求闇網若求闇網而得成道衆生癡心復不知學應得成道不知學者而不成道若學癡心亦不成道何以故以癡學癡智性不發云何成道衆生癡心癡不知學亦不成道譬如本中有火火不自生必假人功方得其火衆生癡心必假導師而得悟解唯願法師哀念我等而爲我說天尊曰善哉善哉吾爲汝說諸法清淨無生無滅云何有衆生得道云何有衆生失道云何有衆生癡網而學成道云何有衆生癡心不學而得成道法無自性畢竟無我云何有衆生差别而作此難我說文字性離則是法性解脫方便引誘令識正音證法音者無法可證無法可修無法可學無法可行無法可受究竟清淨混成非一二乗衆生聞此語者驚忙震懼立身無所是時善音等衆豁然意解悟大乗宗平等無二歸命忘形稽首而去无上内祕眞藏經卷之五
