front:
  text: 无上内祕眞藏經卷之一洪八
  hash: sha256:00c2ece81bc2510d93a79a9a36a0938b243567379d7ac8650a97a78f9392ec57
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0004_HFL_001-001a, image: hfl/0014/0014-100.png}
body:
  text: 顯道品爾時元始天尊遊行法界至靈解山八騫樹下七寳林中變諸色像顯竒特心殊光普照遍入微塵無量國土皆得惠潤無量衆生善能信向無量眞仙了達大乗無量上士悟空非空無量中士解離存亡無量下士覺迷知反如諸法界具足莊嚴功德普薰自然踊見瑞相芬芳各各自視絶諸他念無有漏想爾時天尊告諸四衆及大弟子汝等所居嚴淨國土眞藏法中無憂無惱斷生死際入大乗轅諸仙弟子聞是說巳歡喜作禮上白天尊乆聞眞藏妙經未曽覩音今日所說今日所聞歎希有法竒特難言不可思議唯願慈尊决了眞性愚蒙受潤自不覺知雖在眞藏猶處漏塵身受末生五形各染染情觸著遂覩色身智力不明云何顯了天尊答曰善哉善哉眞藏深奥統攝衆經爲法舟航濟沉溺苦功德深逺非可言譬諦聽善思吾當爲說衆兆異形趣情各别種種施爲取捨紛紜皆爲其實若如是者衆生無因無果無去無來亦無衆生亦無眞道云何說衆生而云業果唯願大慈曉發愚䝉天尊曰眞藏法中衆兆本身非空非有非眞非實衆生苦樂非空非有種種施爲無非眞實非空非有見在衆生等天尊性非空非有未來衆生等天尊性非空非有過去衆生等天尊性非空非有云何有差而生分别無生無滅無因無果而爲眞果諸法名字大道施爲但自思惟反㸔舊地諸善男子閉目諦聽煩㬰之頃忽見四方嚴淨國土獅子座下千葉蓮華散滿虚空衆仙妓樂無鞅數衆各各具足功德裝嚴不盈瞬間閉天光明大衆哽咽泣涕交流願我神尊開朗光明決重昏網言詞未訖光明洞照非色象光非相好光大衆歡喜各各自視地變爲金樹爲珠玉衆惡毒草悉成甘露諸來會衆慧力竒特一相無相等衆相故融淨自在無障礙故能轉換故以轉換故一切悉轉轉無所轉善男女等一向師宗勿生異見起疑惑心謂無因果夫因果者不起本心以爲妙因以無得故而爲妙果所以者何心爲善惡因意爲善惡果心性寂滅無學無㑹謂之妙因意根不動善惡俱䘮故名妙果智慧解脫無果無想因不礙果果不礙因因爲道果果爲道因因果一相一無所相眞道寂滅滅無所滅進虚空故所以不起本心以爲妙因以無得故而爲妙果若依此法名爲道行以不起爲順通以無得爲照寂通寂無二名發道行則無想無念無想無念不住生源生源旣忘三界果䘮杜心滅意縁動俱寂名發道行道行絶空無心無意無覺無觀無波無動萬物同源是爲眞道思惟深逹體解自然晃朗内照通天徹地一切相盡究竟自在解脫無爲是時大衆聞深法巳悉㑹道眞皆得解脫得解脫巳得道心得道意得道眼得道聲得道香得道味一切悉通逹復次仙靈童子從座而起伏地閉目上白天尊一切諸法皆具十二種印唯願大慈開演法藏令衆得明天尊於是重告仙靈童子汝之所問廣大利益末代衆生聞便融寂變易果丧何以故悟道心者心如道心見諸種類無量衆生是非得失彼此分别皆是道心名爲正印悟道意者意如道意一切衆生雜物之類是非得失顚倒分别一切不善皆是道意名爲正印悟道眼者眼如道眼一切衆生種種諸見皆是道見名爲正印悟道聲者聲如道聲一切衆生種種雜類禽獸之聲皆是道聲名爲正印悟道香者香如道香一切衆生種種薫香皆是道香名爲正印悟道味者味如道味一切衆生雜物之類種種臭香皆是道味名爲正印此十二印者合爲六印通印諸法名爲一印說是法時仙靈童子復白天尊何故說十二印用非以爲是天尊告曰善哉善哉快問是義今當爲汝分别解說譬如大醫觀諸草木皆入醫方種種方便救治疾病皆得差愈弟子㝷師學諸道術三年欲成師故試之示病卧牀語學醫者我今患重須無用草與我服之病便得差若不得者我今當死我有好馬隨意即到汝當馳之弟子受師之命装飾駿馬縱情㝷求隨意即到不盈旬日天下地上悉皆周普求無用草終不能得行泣歸家而啓師曰遍歴天下求無用草而不可得今當奈何師即蹷然而起語諸弟子我實不患故試汝耳汝今藥成堪能救物隨汝方便在外救疾得識病源悉皆差愈當知此經最爲第一無上醫王以此證者悟法之人周遍虚空上至九天下通九地求覔非法之物了不可得當知悟十二印者神通無礙恬然寂泊等一無爲爾時仙靈等衆聞此譬諭顯深法性皎然明了無復疑滯六根漏盡直至大乗入平等道座中徒衆衘荷而巳於是仙靈等衆以偈頌曰大慈廣顯無邊身衆生普聞皆悟解眞藏奥中千葉華華飄遍滿諸國土放光動地悉成金平等大乗皆周普性眞微妙無形假正印隨形終不覩衆生卧地不知起冥然長夜無依止大師巧說方便慧誘引群迷趣眞理大衆哀號皆哽咽天閉光明絶情視說此頌巳上白天尊唯願大慈賜垂哀慜諸仙童子歡喜無量一切衆生皆得利益壽命長遠無生無滅悉悟大乗平等無礙各自具足光明晃曜非可譬諭於是諸仙童子還復初座諦聽善思辯三寳品爾時座中有童子名曰獨脫勇猛精進爲衆騰疑不審三寳爲是道寳法寳師寳爲當衆生分内自有三寳若分内無者一切衆生寧神無所迷悶殞絶轉增塵累何以故一切衆生所有行行無量方便皆從内發若外有三寳者即非分内旣非分内即是無常愚䝉不暁猶如醉人眠睡卧地而無動起唯願大慈哀愍救護解除疑網令得開悟爾時元始天尊聞是問巳甚大歡喜即放五色光明含笑而言善哉善哉汝大慈悲哀戀無量爲開未悟如是問者寜神大寂更莫外縁何以故聽若不審法不染神微慮浮動爲漏所牽向云三寳爲是道寳法寳師寳爲當衆生分内自有三寳又復難云若外有三寳者即非分内旣非分内即是無常何以故復作此疑夫三寳者貪嗔癡是何以故貪性寂滅塵累無染戒行不虧名爲法寳嗔性不起不憤外塵定無生轉是名師寳癡性無取無惱無患慧通無礙是名道寳此三寳者非内非外非聲非色非香非觸非長非短示有三名實無三體非三非一是爲眞實眞實不生不滅無貪相無嗔相無癡相諸法自在清涼和雅等一無爲獨脫童子復白天尊大慈所說一一根中甚深法寳下根衆生愚癡障重雖有法寳了不覺知長夜流轉妄行邪道輪迴三界何由得暁天尊曰妄行邪道名爲外求無返照力汝言眞實不滅湛然常存者但衆生流動動性常一一一生中而無染汙但行方便善自思惟方覩妙軌悟道不遙徃古來今千賢萬聖悉歸眞道衆生業趣一一根中悉歸眞道遍滿虚空業趣悉歸眞道悟眞道者進如朗日無形無相無惡業趣無善業趣無貪嗔趣遍滿虚空無虚空趣悉歸眞道無眞道趣了了清淨不失機縁諸根異趣各自歸本獨脫等衆悚然毛竪上白天尊法體清淨顯三寳源不審三寳爲是貪嗔癡爲諸根中各有三寳若諸根中各有三寳不應顯三天尊曰向云示有三名實無三體無三體故云何指有三名一切衆生六情所趣四大運爲皆名三寳何以故諸根性空性無染著無染著故名爲法寳法寳清淨各自在故名爲師寳法通無礙悉成就故名爲道寳一一塵中名爲三寳禽獸之中名爲三寳魚鼈之中名爲三寳蟲蟻之中名爲三寳草木之中名爲三寳三寳無量無邊不可思議諸善男子勿泄漏心而遺三寳但自内思勤行供養巧使心力直趣本源一念有虧諸根悉斷塵境繋縛塞三寳源永絶眞道雖在道中而迷不識不識道故慧力不强而嬰苦惱諸善男子諦聽善思於是獨脫童子歡喜無量而作頌曰天尊慈悲開寳藏普施衆生甘露藥一切根中皆受潤自然無生受大樂三毒性淨眞寳門智力慧力能排却群迷曉悟大乗宗蠢動昆蟲皆踊躍廣說三寳通明路一一塵中非譬諭眞道究竟煩惱中生生寂滅無來去業相消融入性海滌蕩無邊絶思慮衆生不信三寳源二心取捨懐猶豫大師遍入五無間纎介分毫無不被殷勤勸請守心源覺悟大乗歸一處我等徒衆皆歡喜慶此群迷得依止大師畢竟無棄心猶如父母視兒子父母念子猶不恒我師法定眞可擬說此頌巳上白天尊下仙微劣䝉沾惠潤宣示三寳究竟眞源微妙義趣歡喜踊躍不能自勝非是下愚所能譬諭顯其功德一切衆生皆䝉利益悟三寳門入眞藏道各各稽首而復本位辯四眞品復次獨脫童子上白天尊如上所說衆生身有三寳等一切法如是說者衆生身中應有四眞天尊曰甚善甚善如汝所問一切衆生四眞爲本行勳坐卧食息嬉戯皆依四眞又問何謂四眞天尊曰玄精妙氣爲四眞變下通生冷氣非冷熱氣非熱動氣非動靜氣非靜四氣虚寂而無罣礙無嗔無喜無貪無捨無去無來故曰四眞又問一切衆生悉具四眞應無罪果亦無業報修善行者應入地獄造惡業者應生天堂如是說者悉壞因果斷衆生行而無修道一切衆生智根淺薄聞如是者必生謗心唯願慈尊顯令悟解天尊曰譬如有人行路拾得遺篋開篋視鏡自見其影謂是篋主心地惶怖稽首而謝棄之而去衆生迷惑捨眞取僞素本尋末亦復如是又云修善行者應入地獄造惡業者應生天堂如是疑者悉入地獄苦惱嬰身何以故我顯眞者衆生性淨無染無著亦無天堂亦無地獄諸法一相非因非果何壞之有衆生肉眼終不自覺猶如盲人雖在人間日月之下而竟不知日月光明何以故日光皎然盲者不見衆生本性亦復如是行動坐卧常相隨逐自無見者譬如室中宿有寳藏貧窮忍餓終無見寳忽有明師地鏡占之自知有寳鑿深四丈便即得寳廣作功德遍救衆生皆得利益獨脫童子重白天尊大慈廣逺譬諭甚深今䝉利益諸疑頓盡衆仙玉女各各受潤無量無邊皆得具足功德圎滿爾時天尊重告諸仙及善男女等眞道非言非說向雖譬諭隨機爲顯何以故一切衆生淺根微弱不可直說若直說者群迷倒惑轉生不信若證法者非譬論說亦非直說隨法即證逕入大乗入功德本入無所入證無所證獨脫等衆復白天尊衆生業行有精有麤有長有短諸行差别云何得等若不等者譬諭說之而非證法亦非大乗云何有益譬如枝條風飄即動其根安靜枝不離根根不離枝要須得根風飄不動衆生不離大乗大乗不離衆生要須證入若不證者飄浪生死何由得止慈尊譬論即非大乗云何反令衆生顚倒天尊曰諦聽吾言分明爲說衆生行業有精有麤有長有短皆由業因證道果者無精無麤無長無短又復難云譬諭說者則非大乗云何反令衆生顚倒善男子莫著語言若悟譬諭說者無非大乗無非眞實無非一相無非寂滅云何强生分別天尊於是而作頌曰仙靈妙解眞實性訣問開宗悟衆生衆生諸根本來淨聾盲跛躃不能行雖復方便多譬諭終歸内行絶恩情眞藏皎皎遍虚空六根根中皆滿盈三寳非爲三處顯萬物性海皆等平唯須巧積方寸力日夜鑚求無堅硬豁朗寂然證慈父變化去來無有爭愚䝉冥昧常卧地不覺死生恒清淨四眞爲本成形象衆生外求虚嗟詠獨脫爲此而決疑我今廣開諸法藏一一塵中甘露藥衆生慧解無惆悵日日竟夜眞君前四魔永滅無炎障三業究竟清淨果萬法歸宗無有妄天尊說此頌巳告諸仙童子及諸大衆澄神眞境愼勿外縁吾今分明解說開眞法藏等一切法一一沙塵而爲眞實衆生雜想而爲眞實衆生顚倒而爲眞實眞實性空不生不滅不一不異無去無來一切形質苦樂不同種種業報皆悉眞實不生不滅諸善男子勿生異見若得身相而有去來者是爲謗法是爲滅法不見大乗衆生謗法者不信根中而有三寳不信去來而爲眞實不信大乗而爲根本不信衆生等天尊性不信諸法寂滅無相無因無果不信衆生從無量劫種種示形而無生滅如此不信是名謗法是名毀法是名滅法法不可滅障法不見名爲滅法旣滅法巳而得身相是爲生死輪迴不絶必墮地獄無縁得岀諸善男子努力歸家勤行供養慎勿外求而生謗法說是法時無量國土皆放光明同入眞藏坐寳蓮華獅子白鶴散滿虛空諸天𠆸樂無鞅數衆皆入眞藏無有迫迮不壞身相而爲眞藏不壞身相遍滿諸國不壞身相滿虚空界不壞身相不生不滅一壞身相坐獅子座不壞身相出千葉華諸善男子諦聰善思非離衆生而岀相好非離衆生遍滿國土非離衆生坐獅子座非離衆生出千業華非離衆生滿虚空界非離衆生有眞藏寳非離衆生見諸光明諸善男子勿生不信起疑惑心金口演說更無虚謬若有諱說讀誦此經修行供養功德甚重非可譬論皆得解脫一切衆生蠢動之類悉䝉利益眞仙童子歡喜受命稽首而去各還本所无上内祕眞藏經卷之一
