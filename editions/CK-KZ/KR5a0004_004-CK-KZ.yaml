body:
  text: 辨相明部袠品第六是時元始天尊恬然安靜在靈解山遍施功德示眾經相顯眞道源一切諸法性相空寂無生無滅何以故法本微妙功德深遠眾生迷惑信法不湻自生謗毀失三寶源何以故煩惱障深慧源不曉輪轉三塗永無解脫爾時善明童子聞是語已上白天尊今日侍座歡樂難勝敢問天尊眾經名相其數幾何爲有部袠爲法界總名愚情不了唯願天尊分别爲說天尊曰善哉善哉子之所問正得機宜一切諸法並是經目無内無外非長非短微妙淸淨常住不壞何以故法性空故愚人淺識不悟大道失眞常性迷惑正經示爲部袠一者上淸二者妙眞三者太一四者妙林五者開化六者仙人七者黃林八者上眞九者道教十者上鍊十一者上妙十二者道德此十二部經藴在大洞玉淸境藏中無毀無壞無生無滅湛然常住遍眾妙門一者洞玄二者元陽三者元辰四者大劫五者上間六者内音七者鍊生八者靈假九者消魔十者無量十一者按摩十二者上通此十二部經在大洞上淸境藏中微妙淸淨爲諸天根本萬有之基一者太淸二者徹視三者集仙四者洞淵五者内祕六者眞一七者集靈八者中精九者無量十者集宮十一者黃庭十二者小劫此十二部經在大洞太淸境藏中濟生度死爲萬法舟航此三淸奥典眞藏之中示有名相顯眾妙經包羅無外妙入細微若有人能受持書寫講說讀誦此人功德不可思議非譬喻格量得其邊際何以故金口所說無虛和故一切諸仙聖道未有不由此經而成道者何以故此經微妙具眾經目諸天童子大力鬼神金剛師子共相衞護不得輕泄若有誹謗不信此人卽得重病前業受報今暫爲人致生誹謗不信大乘後死當入黃泉長處闇獄無有解脫善明童子汝等徒眾深思此經勿生不信隨邪見道何以故無信故信不深故無慧故慧不深故無解故解不深故無思故思不深故無定故定不深故無通故通不深故無絕故絕不深故無便故便不深故無證故證不深故無妙故妙不深故無道故道不深故汝等徒眾厯劫艱辛學小乘行終無得道何以故諸法解脫有繫相違動則乖所失正道源善明童子伏受教言未曾所說今日所說未曾所聞今日所聞未曾所見今日所見四座歡喜尚有不解復問天尊諸經部袠統攝諸法爲止其數爲無數耶若有數者不攝諸法若無數者則無部袠云何數有三十復有六名唯願天尊隨緣顯示天尊含笑遍體悉明照諸國土無極世界並皆應見不動本國到靈解山聽天尊說天尊曰汝所問法未解經旨吾爲汝說一切諸法普是經法眾生愚闇不曉本源失眞常道分别爲說假示眾經顯諸部袠隨緣爲釋或說大乘或說中乘或說小乘或於大乘而得悟解或於中乘而得悟解或於小乘而得悟解悟解之理絕三乘跡當知諸經盡妙非數非非數非大非非大非中非非中非小非非小雖止部袠妙入細微濟沉溺苦畧顯其數示者指歸若能悟解本微化見究竟圓滿了達諸法無取無捨無貪無愛無癡無慾無瞋無喜無殺無盜一相平等平等之理隨分功德各各具足慧解無窮眾生不曉自相違犯譬如油能燃燈燈明自煎油盡燈滅眾生迷惑亦復如是自造自報如影隨形形直影端形斜影曲諸法業報果皆從因一切眾生無有行者云何見道譬如種植種穀穀芽則生不種穀者無穀無芽云何得穀眾生因果亦復如是不種善因亦無善果無善果故則惡因生生長惡果惡果生長業業相因因果不絕彌淪三界墮諸惡道後生人中永無人理云何信道云何行道云何悟道何以故無善因故無智慧故善明童子及諸四眾諦聽善思無狐疑想此經深妙最尊最貴諸天神聖無不敬重汝等徒眾宿緣有幸得預知聞入功德所無以爲喻善明童子伏受教旨諸疑不了敢問此經等一切諸法無有分别旣無分别云何說此經最尊最貴若獨尊貴卽不等法旣不等法則有差别有差别故則有優劣有優劣故則有貪欲有貪欲故則有生死有生死故則有愛念有愛念故則墮邪見云何得道天尊曰經等諸法諸法等經道等諸經諸經等道道等生死生死等道道等貪欲貪欲等道道等恩愛恩愛等道道等去來去來等道道等富貴富貴等道道等貧賤貧賤等道道等智愚智愚等道道等畜生畜生等道道等禽蟲禽蟲等道如是等故等無所等云何諸法而有差别善明童子上白天尊云道等無所等不審一無所等非一等不答曰非一無等又問非一無等云何名道答曰非道爲道又問非道爲道是眞道耶答曰非眞道也又問云何非眞道答曰諸法無二非眞非俗非大非小非長非短眾生愚闇障翳日月常臥不起如盲者不睹聾者不聞如此經者億千萬劫不可得聞況能了解吾昔於靈解山宣揚此經時此座主名曰達慧廣延徒眾四方雲集到靈解山次等而坐供給衣食並皆充足功德遍施無飢無渴爾時十方大地悉皆震動獅子猛獸並共護持有一賢者名曰法才心樂道德父爲國王禁制不得自在泣涕交流我生何罪心志不遂唯願天尊聖道憐愍愚心今身不果願我後生遇見天尊教我出家學大乘道發願已後常行慈心晝夜念道今得遇我顯揚大乘習無漏法善明童子及諸大眾當知今者眞藏童子卽昔日法才是也法才心願久遠始得見聞當知此經尊貴理趣深遠難可卒聞況今淺識能得信解爾時眞藏童子於座而起稽首上白天尊小子有幸得悟大乘昔日雖在聾俗心願不輕今遇天尊顯大乘道施無上藥悟解諸法了達宿因證無生法深思慶幸難可喻知不審天尊此經方便後學其法云何爲簡而授爲普度之天尊曰善哉善哉汝慈悲行自度度他接續方來爲法梯磴如是功德廣博難稱此經大乘無大不包無細不入濟沉溺苦普救蒼生何有簡法眞藏童子稽首復問一切眾生信心不等各由宿因修善行業積劫累功而成道果若不修善而得道者則無因有果無果有因果業顛倒云何得成道果天尊曰大乘平等普濟蒼生盡虛空際譬如日月乘天普照而盲者不覩非日月不照又如大地能生隨緣而種皆得果實而愚者不種非地不生又如慈母愛子子而不孝非母不念當知此經亦復如是皆須供養抉其眼目眼目明淨得見本源遊塵永滅如是因淨果淨因卽是果果卽是因因果一相平等無二無二者非因非果而爲因果非高非下而爲高下非長非短而爲長短非見非聞而爲見聞非香非味而爲香味非智非德而爲智德非經非道而爲經道非心非想而爲心想如是達觀證法生靈善解護持功德具足汝等徒眾勤心學行修無上道勿信邪言受有漏業疾病將至憂惱萬端欻爾之間索然命盡永不自覺終身迷惑輪轉三塗長離善道爾時眞藏童子及諸四眾聞是語已歡喜讚言天尊在靈解說法教天人顯揚諸經相四眾並來尋功德無不普非長非短因三淸斷四惑道德隨日新經敷滿法界部袠示關津我等諸徒眾與道爲善隣斷諸漏永盡惡業不能侵積善無畏力自然功德林天尊巧能說施藥通流布愚者不能飲智者餐甘露聾盲無聞見巧說終無悟大乘難思議寂然無不度爾時眞藏童子及諸四眾說此讚已復云功德廣遠非可歎說我等徒眾共讚法王顯天尊德終劫說之亦不能及敢問天尊經寶次第功德階級何者爲先早證果者何法最易唯願天尊慈悲爲說天尊曰往古無量劫時有一仙人名曰仙靈不信大乘常習小道長齋苦行隱在山林服柏餐松學他仙道累劫辛苦道不可階終無解脫雖得延年益夀不得天仙眞訣今眞藏大乘經典包羅無外細入毫端行内行者悟解須臾諸經部袠示相凡愚功德因緣隨方引誘㝠心内照直趣道場絶諸漏相無先無後無内無外無階無級功德浩蕩重於法界法界殊方無内無外無視無聽無思無想隨分功德功德具足無出無入無去無來汝等四眾勿疑功德經實無差教迹淺深布張得所何以故法性眞故不受塵故若無慧解法性不通六情受染則生六塵六塵不滅心識不住念念相摧習業旣多輪廻五道煩惱憂懼疾病逼身父子恩情索然命盡魂神流漂墮三惡道如是痛苦不可言說善男女等勤行精進勿生懈怠各發善心修無上道功德莊嚴則六情不染六情不染則六塵淨六塵淨故六識通六識通故智慧具足而成道果成道果已得無畏心究竟平等了達諸法從容自在無餘憂無餘喜無餘樂無餘苦無餘貪無餘愛無餘惱無餘瞋無餘思無餘想無餘視無餘聽無餘觸無餘慱無餘取無餘捨無餘增無餘念得法自在名功德林是爲眞道善男子等汝等四眾發大乘心悟諸餘理常行四念度諸眾生濟窮苦厄福德無量不可稱說爾時眞藏童子及諸四眾聞如是說歎未曾有歡喜作禮而作頌曰法王慧澤無邊底說法無量度眾生跛躃聾盲皆自得五欲四倒坦然平我等徒眾咸歡悅悟入大乘無有驚法王法力由方寸大智大行等甘露天尊廣運慈悲力遍灑微塵無不透眾生受潤猶不知願各欽承廣傳布慧日慧音永不絶愚者漸染諸根固是日眞藏童子及諸四眾讚誦天尊顯功德力遍法無間非可譬喻得其根際如是功德不可思議天尊曰一切諸法皆是三世法身身有三世若無慧眼云何識別旣無識別喪我本身迷惑諸法卽是顛倒顛倒旣見則成煩惱煩惱習業苦痛切身生死輪迴終無解脫諸善男子湻謹行業勿令二心毀謗賢良反善作惡眞藏童子及諸四眾聞此妙音歡喜無量敢問天尊三世慧眼爲一開三爲三合一若一而有三者亦應一眼而有三身唯願天尊分别爲說天尊曰善哉善哉諸法無量功德無量或一爲三一三無體或三爲一三一無名或一眼成無量形或一形成無量眼如是方便功德不可思議所云一爲三者並是爲緣顯無明障緣眼障滅三一非眞何以故此經能開慧眼有利益故一切仙聖皆由此經而成道果諸善男女吾念羣生如母愛子化導誘引懇志殷勤故說此經分明委悉眞實要義顯然易解若復有人得聞此經信心恭敬諸仙童子大力善神自然衞護當知此經有大神力功德廣遠非可譬喻天尊於是說頌曰大乘平等教普化諸眾生非外亦非内功德坦然平愚人不信法智者見空驚悟解眞藏理法界自然成我非形色象法性盡無名汝等虛嗟詠心識不能明天尊說此頌已告諸四眾大力神王金剛獅子善念護持修行正法爾時眞藏童子及諸四眾聞此妙音神開意解歡喜受持各守一元修無上道天尊曰成道果已寂然無我究竟淸淨淸淨微妙能生諸法諸法各得無滅無生無生無滅自在法王功德具足一切眾生愚闇不明閉塞六識諸根受染染著迷惑迷惑相傅遂不覺悟輪迴五道不信大乘何以故一切眾生受有爲樂云何能捨假使捨有卽取空法取空爲空空不離有有不離空空有二名繫業縛身云何得出超入道源眞藏童子復問
