seq: 2
front:
  text: 可譬喻一切障礙皆得解脫一切眾生悉䝉利益眞仙童子歡喜受命稽首而退各還本所
  hash: sha256:c06372adb78d7a45cfa927ad5b8c5cb63a0589c630f6663e93fd715c2ec2aab1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0004_CK-KZ_02p011a, image: JY004/CK-KZ_JY004_02p011a.png}
body:
  text: 惠澤品第四爾時元始天尊與諸眷屬及大弟子住靈解山顯諸法相示奇特身微妙第一諸仙童子充塞虛空圍繞千匝百億獅子備衞左右猛獸毒蟲各獻奇寶諸天發瑞自然音樂種種殊妙不可思議爾時天尊散本微華其華飄飄遍滿法界非青非白非赤非黑非長非短非大非小非廣非狹入於細微離諸色像華中有自然之果其果圓淨具一切味非一切味具一切聲非一切聲具一切色非一切色具一切香非一切香具一切觸非一切觸具一切法非一切法具一切智非一切智其果名具慈甘泉得此泉味自然飽滿無饑無渴姿容端正妙麗希有到靈解山不生不滅湛然常住證無生果爾時四座見此神變散本微華顯未來事歡喜無量不可思議眾中有疑未了斯事復願慈尊告所未悟天尊曰善哉善哉子之所問要如是乎要如是乎諦聽善思吾今爲汝顯本微華此華玄妙終劫說之亦不能盡略其機要示以一源我分身法界遍滿虛空無大不覆無小不入悟此華者舉目便正眾生迷惑信心淺薄耽著恩愛不敬三寶富貴自在輪迴生死冥冥長夜無曉無出苦惱相縈習諸惡業報生貧病或饑或渴或寒或𤍠如是苦惱非可能說種種因緣隨其業報爾時眾中有一童子名曰善逹從座而起上白天尊不審本微之華華中有自然之果散滿法界盡諸微塵無大不覆無小不入爲青爲白爲赤爲黑爲長爲短爲大爲小爲廣爲狹爲見爲聞爲來爲去爲天爲地如是華果浩博周普遍成法界不可思議不審一切眾生同禀一華云何諸緣各有差別善惡不同生死業對苦樂殊形返覆往還受生各異種種不同唯願慈尊分別解釋天尊曰善哉善哉子之所問甚得機緣吾今爲汝顯諸因緣一切諸法相好不同苦樂殊別皆有因緣由其業行信心不等造惡行好受報無差如影隨形如響應聲一切諸法生皆從一一本微華種種相好眾生迷惑不自覺知於實相中橫生顚倒顚倒法成受苦見徴自生不孝慈愛遠離失本求末冥冥不曉長處闇中無有解脫我懐慈愍種種濟度顯法因由眾中疑惑不了業緣諸法空寂畢竟無我試問東方生物有邊崖不南方顯照有極源不西方衰殺有情變不北方冥昧有窮通不色聲香味觸有色聲香味觸不貪嗔癡縛有貪嗔癡縛不善惡行業有行業可修不不也大慈所顯推問諸法行業並無所得云何差別苦樂不同天尊曰諸法幻生幻生幻滅諸法幻滅幻滅幻生如是幻相生滅幻無生滅幻相去來幻無去來幻相貪癡幻無貪癡幻相取捨幻無取捨幻相煩惱幻無煩惱幻相恩愛幻無恩愛幻相差別幻無差別一切眾生業緣端正生滅無幻去來無幻貪癡無幻取捨無幻煩惱無幻恩愛無幻差別無幻如是空寂究竟道場善達聞之忽然覺悟端坐内思伏地默然不起於坐四眾嚴整各各斂容須臾之間天尊變現本微之華從地踴出遍滿法界無大不覆無小不入一一華中各有寶座座方一丈諸天雲集無有迫迮一一座中各有天尊一一尊所各說諸法祕密眞藏一切諸法無不自在非空非有非長非短非去非來非高非下具一切法非一切法是名眞法具一切色非一切色是名眞色具一切聲非一切聲是名眞聲具一切香非一切香是名眞香具一切味非一切味是名眞味具一切觸非一切觸是名眞觸具一切智非一切智是名眞智如是諸法本微玄妙能生法界法界之中能生眾聖眾聖能爲法母通逹無礙不生不滅無内無外無長無短無去無來是名道母道母能生惠因惠因能生惠果以惠果故諸法淨諸法淨故無因無果云何有眾生差別云何有眾生取捨云何有眾生貪欲云何有眾生業報云何有眾生得道云何有眾生失道如是秘密眞藏大乘經典世所希有眾生狹劣自生顚倒聞此秘密眞藏大乘反生誹謗自招罪業迷沒闇中如盲者不覩光明聾者不聞鐘鼓善達汝今悟解由未盡源雖悟諸相心都未了於實相中浩博窅然反成迷惑善達聞之朗然覺悟歡喜踴躍歎未曾有四眾思惟稽首伏地須臾之間有一童子名曰達相從座而起稽首天尊一切眾生生皆從一旣得從一何好何惡若從一者心亦從一心旣從一種種施爲造好作惡皆心所作旣是心作皆一所爲若一所爲何有苦樂旣有苦樂卽是因緣業行所爲苦樂報對一若有對不名爲一旣名一已卽無有對云何有善惡苦樂殊別天尊曰如是如是一切眾生生皆從一一生無相生旣無相心亦無相心旣無相種種施爲造好作惡皆是空寂何好何惡眾生愚闇千思萬慮不止一源源旣不止諸行競受善惡殊形自招業對於一相中受諸苦惱眾生懐惡貪有所纏不能了逹旣不了達積惡日深冥冥長夜何能識本旣不識本離大慈源源旣遠離迷失父母旣失父母兄弟怨憎更相讐䦧種種懐惡心恒察察不顧死生惡業旣成無明障重遂至煩惱煩惱所牽飄浪生死强生恩愛恩愛著身如魚失水豈能得久恩愛旣集罪業日臻不久之間業緣各至隨分報對受諸惡業輪迴三界墮落諸苦遂成差別復告惠力童子曰眾生受業可推求不眾生心數可推求不眾生煩惱可推求不眾生業報可推求不眾生顚倒可推求不眾生虛妄可推求不地水火風可推求不過去未來見在三世可推求不不也大慈天尊所顯推問實無所得實有所得天尊曰諸法微妙非幻非非幻非妄非非妄非長非非長非短非非短非去非非去非來非非來非外非非外非内非非内一切眾生業緣解脫具三世身非三世身是名眞身具三寶相非三寶相是名眞相具三毒業非三毒業是名眞業如是深奧經典小乘眾生永不聞見縱使聞見終不信向反生謗毀自招罪業惠力童子汝等徒眾勤行大乘絕諸漏想非心觀心滅一切心是名眞心非身觀身滅一切身是名眞身非色觀色滅一切色是名眞色非聲觀聲滅一切聲是名眞聲非香觀香滅一切香是名眞香非味觀味滅一切味是名眞味如是行行證無生法非無生法名爲證法是名大乘善男子汝等徒眾作如是修作如是行勿生懈怠起疑惑心墮諸邪見爾時惠力童子曰不審非心觀心滅一切心是名眞心非身觀身滅一切身是名眞身如是等行是大乘不天尊曰非大乘也大乘之道離一切相離一切行離一切觀離一切智離空有心離眞實際名爲大乘惠力童子曰不審離一切相離一切行離一切觀離一切智離空有心離眞實際如是等行是大乘不天尊曰非大乘也大乘之道無離無無離無行無無行無觀無無觀無空無無空無眞無無眞名爲大乘善男子汝等徒眾聞此祕密眞藏大乘經典宿緣有幸得遇眞經汝等徒眾各發宏願修行大乘勿生懈怠於是惠力童子及諸眷屬與大弟子俱發願言修習大乘誓無退轉了諸法性得到邊底無有罣礙利益一切并及後學愛樂深法達重玄理一湛凝照窮源盡空悟解大乘成無上道到靈解山究竟圓滿功德具足證果無爲復次寶明童子聞說祕密眞藏大乘經典發宏願心講大乘法誓度眾生到解脫處成無上道如是誓願功德深遠非可譬喻復次山際童子聞此願已勇猛精進發宏誓心學大乘道修四大城决五逆賊除七惑鬼殺七礙魔刳無明障刻三賊心堅硬不退到靈解山不生不滅湛然常住究竟清淨爾時天尊見諸童子發此願已歎未曾有我從昔來見諸眾生唯習小道不信大乘無發願者汝諸童子甚爲希有天尊於是分形散體遍滿法界一一毛孔放大光明照無邊底盡虛空界無極眾生承道威光不覺而起俱至道前自在神力爾時眾中忽有童子名曰金燈從座而起敢問天尊如是光瑞由何所起因何而興天尊形貌云何散滿法界諸大眾等有何因緣神通而至唯願天尊分別爲釋令得悟解爾時天尊聞金燈童子問此瑞相歎未曾有善哉善哉汝等四眾伏聽訣言以無聽無不聽而聽受之以無說無不說而說授之今當略說瑞相因緣我懐大慈放神通力遍諸法界普雨甘露盡諸微塵以無起無不起而起因緣大眾來者皆是宿世久遠巳曾聞說祕密眞藏經典故承光集會樂聞大乘神通自在得無畏力不集會者不信大乘宿緣淺薄雖被慈光不能悟解譬如採寶無有導師了無識者法性深奧覺無所覺無所覺而覺是名眞覺得無所得無所得而得是名眞得如是祕密小乘眾生不能聞不能見不能修不能行不能信今爲開解令無量眾悟解道眞爾時大眾聞是語已踴躍歡喜得神通力承道威光以偈頌曰慈尊顯眞藏住在靈解山諸仙並雲集示現本微華飄飄滿世界玄妙難思議一一華中果自然清淨圓非青非色像非長非短因具一切智法微妙莫能尋眾生倒迷惑耽著恩愛親富貴懐自在死入長夜門相牽習諸惡業報生貧窮常懐饑渴想苦惱莫能通信心不湻厚跛躃生盲聾離道甚遙遠不見日月光天尊顯眞藏非幻亦非眞諸法得自在善惡無不均座中方丈室容眾巨沙塵去來無迫迮說法度天人眾中歡喜悅各悟大乘因了了見法性無非功德林勇猛發宏願誓度於眾生證成無上道究竟爲法城爾時大眾說此頌已重誡身心顯天尊力功德無量不可思議終劫說之亦不能盡唯願天尊開示未聞顯因緣相一切眾生令得悟解了達大乘爾時天尊聞諸徒眾說此偈頌歎未曾有善哉善哉快能顯了深問其義汝今四座以無聽無不聽而聽受之我今以無說無不說而說授之爾時大眾聞是語已悟解法性了眞藏源證無生果天尊於是重宣是義而說頌曰眞藏微妙無形段無狀無名不腐壞隨流混合常自然寂靜惠光照無礙圓法究竟爲軌式常湛清淨善能貸無量賢聖由此悟萬劫淡然不移度軌法消伏功德林滅除三毒貪嗔路和柔大力道眼開五情豁爾無留固我今慈愍救一切普施甘露眞妙藥自然流入性海中勇勢降伏諸魔賊我以無量功方便曉示本微甚奇特萬相玄注實性中出入去來常軌則眾生迷惑不信眞愚癡世間無厭足我今自歸眞性海諸法寂泊亦復然六情受納常無染虛空法界是道身眾生妄惑來日久念念逐樂習業因冥冥闇獄處無窮若痛難聞難可臨汝等徒眾各努力絕想因緣各内尋方寸自在金剛力成眞證果不勞心天尊說此頌已諸仙童子各悟大乘歡喜無量不審天尊所說經法卽顯一切眾生身爲法聚若一切眾生身爲法聚者唯願天尊慈哀爲說令無量大眾及下方一切諸眾生達解自身究竟法聚息於外求見其知識天尊重告諸仙童子一切眾生身無邊相名爲經法亦名法聚何以故解惑立名不同體解究竟名爲秘密眞藏迷惑立名同體相解名爲眾生亦名生死亦名苦聚亦名顚倒亦名外求何以故眾生不解名之爲惑以是緣由不識自身自身之中有無量法聚具三清境眾生迷惑遂使外求不信正法不求善友名爲眾生將法逐法迷沒世間從劫至劫終無曉了若遇善知識者名爲宿緣種其福德何以故昔因今果得遇天尊爲說法顯無上眞藏秘密重玄了達昔因證今生果善男子汝等若欲求者先當自求若自求者秘密法現廣開眞藏顯三寶源以此法藏統收諸法盡無邊底惠力童子白天尊言大師所說教諸眾生若求法者先當自求若自求者秘密法現廣開眞藏顯三寶源雖聞聖說不能解了不知何者爲道何者爲法何者爲師何者爲聚何者爲内何者爲外以不知故願爲說之天尊告惠力童子汝當澄神靜慮吾今廣爲說之一切眾生身性清淨天眞正道隱在其中名爲眞藏此眞藏者無内無外無法聚無眾生聚無道德聚究竟寂滅名爲秘密隱爲沖寂顯爲應妙廣示多途能開物障利益深遠諸仙童子及諸眷屬天仙地仙無量等眾歡喜歎曰善哉善哉天尊功德普照無窮潤益蒼生平等無礙天尊告諸四眾及大弟子當來眾生若有讀誦受持講說眞藏經者此人功德不可思議則見我身成無上道何以故此經說諸法根本利益處深功德廣遠難可譬喻若有眾生信心讀誦捨諸他念卽得道眼照三世因緣平等無碍悟因非因悟果非果達身心相非心不心亦不不心是眞心相相無所相無相之心遍周法界法界之相不生不滅前際不去後際不來今不往
