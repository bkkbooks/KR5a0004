body:
  text: 天尊顯功德微妙莫能尋施張遍法界鬱鬱香園林智者巧能入方便種善因愚夫迷日久自與失爲鄰我等生信行共習大乘津法王王自在解脫脫相親大乘平等道濟度於天人㝠心自然合方寸隨日新爾時善音童子及諸四眾說此偈頌讚仰天尊顯揚功德濟度眾生所說功德非功德是名功德各各自悟見一赤珠非内非外懸在空中光明映徹照耀諸國無大無小皆同一類俱入珠中不生不滅須臾之間忽然不見四眾茫然莫知所在各各自視復無所得荏苒之間法界宛然在寶珠中四眾視之復無所得非空非有非長非短非妙非粗非廣非狹離一切相一切相離所說法界非法界而爲法界卽是寶珠所說寶珠非寶珠而爲寶珠卽是法界當知寶珠不離法界亦不在内亦不在外非内非外非非内非非外言語道斷絶諸漏行如是功德微妙深遠不可稱說顯誡行品第九是時元始天尊告諸四眾一切眾生貪著有爲欣生惡死意雖求生由造死業不持戒行假使長夀猶如老樹有何殊别若持戒行死補天官昇仙自在人雖有王公之位苟不持戒死皆重罪無益魂神魂神受苦不可堪忍善男子汝等思維明奉戒行直心行道吾爲汝說天下萬物無有長存有生有死有成有敗日出則没月滿則虧從古至今誰能長存惟有道德不生不滅修善積善今日亦善今月亦善今時亦善善善積德諸行備足善念護持令入法寶誡曰不得盜竊人物不得妄取人財不得妄言綺語不得因恨殺人不得貪嗔癡狠不得慢老欺人不得咒詛毒心不得罵詈高聲不得訾毀謗人不得兩舌奏佞不得持人短長不得好言人惡不得毀善自譽不得自驕我慢不得畜毒藥人不得投書譖人不得輕慢經教不得謗毀聖文不得恃威凌物不得貪淫好色不得好殺物命不得耽酒迷狂不得殺生淫祀不得燒野山林遊獵不得評論師長不得貪惜財賄不得言人陰事天尊曰略說戒條罪各有報善男子善聽在心今當爲說盜竊人物者死入金槌獄妄取人一錢以上者死入鑊湯獄妄言綺語者死入拔舌獄因恨殺人者死入五牢大地獄貪嗔癡狠者死入大檻獄慢老欺人者死入酆都獄咒詛毒心者死入八闥獄罵詈高聲者死入泥犁獄訾毀謗人者死入北寒獄兩舌奏佞者死入大山獄持人長短者死入碓磑獄好言人惡者死入黑暗獄毀善自譽者死入大劍獄自驕我慢者死入寒冰獄畜毒藥人者死入灰炭獄投書譛人者死入黃泉大暗獄輕慢經教者死入障明獄謗毀聖文者死入銅火獄恃威凌物者死入炎爐獄貪淫好色者死入溟冷獄好殺物命者死入無間獄耽酒迷狂者死入渴寒獄殺生淫祀者死入沸山獄燒野山林遊獵者死入分形獄評論師長者死入磨山獄貪惜財賄者死入餓鬼獄言人陰事者死入黑水獄如是戒行不得輕犯輕犯之者隨犯輕重如影隨形如響應聲聲大響大聲小響小善惡報應亦復如是善音童子汝等四眾勤行此戒積漸累功證成道果一切法聚悉是戒行畧顯數科示爲善否若通一行諸戒無犯人法自在解脫無爲善音童子上白天尊敢問說諸戒行罪業報應如影隨形犯戒罪報深淺云何爲犯一戒罪深爲犯多戒罪深若犯一戒深者不應戒多若犯多戒深者初犯一戒應無有罪眾中疑惑唯願天尊分明曉示天尊曰善哉善哉眾生業行千差萬别報對不同廣說戒文隨緣利益若犯戒者隨犯輕重不論一多犯一戒重罪卽隨重犯多戒重各各重報若犯輕戒報對亦輕如身長者影卽隨長身若短者影卽隨短犯戒罪報亦復如是我說諸戒斷諸雜心無雜煩惱又問煩惱是有是無答曰不有不無又問不有不無何名煩惱答曰不有爲有不無爲無於實法中橫計爲有則成煩惱又問此有非有若如是者眾生橫計則是正法眾生犯戒亦是正法云何有罪業報應云何有眾生虛妄天尊曰何故作如是疑諸法業正因果無差妙理報應纎芥無遺行善得善行惡得惡譬如種穀生榖種麻生麻當知種子不差因果亦爾諸善男女善聽吾言我說正法不離空有而爲正法我說正法不離生死而爲正法我說正法不離煩惱而爲正法我說正法不離去來而爲正法我說正法不離取捨而爲正法我說取捨非取捨而爲取捨我說去來非去來而爲去來我說煩惱非煩惱而爲煩惱我說生死非生死而爲生死我說空有非空有而爲空有當知法無有二亦不一不二不一不二湛然常住何以故眾生業行淨故取捨淨故去來淨故貪欲淨故煩惱淨故生死淨故眞實究竟應無罣礙當知此經最尊最貴三世天尊皆由此經而得成道十方大聖亦習此經而得成道諸天天帝亦習此經而得成道此經包羅無外所在之處皆受此經而得成業此經威力廣大度諸眾生不可稱說善男女等若能信心受持此經福德深遠非可譬喻得其邊底爾時天尊在靈解山宣揚正法告諸大眾而說偈曰我說功德本積劫修苦行若遇眞藏經勤行不退轉無犯諸戒愆後悟無上道皆由在昔因汝等精勤學功德隨日新妙道非近遠五陰裏追尋行行雖辛苦證理不勞心天尊於是告諸眷屬及大弟子我說半偈顯本因緣人從信生人從解生人從苦行入樂正因善本而立道慧自明一切諸法無有自性畢竟空寂證此理者名爲了因卽是正果一切眾生愚癡外想六賊俱生各貪愛著分别世間悉爲邪道爲邪道者心行妄起習繫業因業對相牽生老病死遂無解了無明覆蔽貪愛甚深種種是非罪累增長如是行業煩惱切身十惡報應汝等四眾善察業因明識緣起善音童子及諸大眾得思微旨悟解道場歡喜讚曰無上天尊眞道眼照法圓淨顯明珠眾生得聞皆悟解離垢無欲等無餘我等徒眾皆利益得見身上八角書觀彼世間皆實相無取無捨湛然居天尊平等說戒行無犯無漏業消除悉皆充滿方丈室幻化自在等空虛天尊積劫修苦行後遇無上大乘轅顯是眾生令深信遊心法界一乘門諸法不生亦不滅自然解脫寂無言爾時善音童子與諸眷屬說偈頌已歎未曾有大乘經教濟度無涯玄㝠隱奥非世能知敢問學行因緣大乘方法眾生根淺惠力不深觸有纒身六情受染如是下劣不識經教不信大乘不受化導雖聞眞藏心由不顧云何方便引誘復次三乘教門引三根性上智生知聞有眞藏自然覺悟證入大乘到天尊所解脫無爲不生不滅印眾經相能出能入巧積方便功德深遠難可測量中智依文受持戒行漸積功著得入中乘勤苦累階終不覺悟下根眾生唯知貪愛引誘教化捨施外財心貪吝惜無明暗鈍雖預下乘未有功入眾生根性利鈍如此受益不同云何得入大惠天尊曰善哉善哉善音童子得世機宜巧能抉問吾爲汝說各各聽受入內思惟至道窅㝠絶諸情愛大乘玄妙視聽莫聞一切眾生從道而生從道而滅業緣悉被同貫一門譬如母能生子子懐不孝棄擲其母四向造罪被繫羅網母思憶之枯腸寸斷子終不覺身自受苦楚痛難當眾生顛倒迷失其本亦復如是魂神受苦楚痛切身自當苦惱大乘玄教隨根布德了自不知雖不覺知隨根度脫一切眾生悉皆受潤在眞藏中含生奥養出苦入樂不離眞藏眾生迷惑妄想爲有於眞藏中終不覺悟何以故法性眞故於眞受有有是苦聚卽是苦惱我說三乘猶如天網廣覆施張隨根利益我觀一切悉是大惠無生無滅無苦無惱去來平等出入平等受業平等苦樂平等三乘平等下根布施受施無受卽是平等中根戒行行戒無戒卽是平等上根智慧無智無我卽是平等眾生受樂樂受無受卽是平等眾生業報報業無業卽是平等眾生根性殊別別無所別卽是平等一切諸法等無所等無所等故名爲大道善音童子汝等勤行教化依此大乘勿生異想卽是方便得入大惠法門功德自在得自在力不生不滅能度眾生滅煩惱業汝等徒眾勿生倒想爾時善音童子及諸大眾聞此語已歡喜無量不可思議各各伏地稽首奉辭而退
