front:
  text: 究竟淸淨混成非一二乘眾生聞此語者驚忙震懼立身無所是時善音等眾豁然意解悟大乘宗平等無二歸命忘形稽首而去
  hash: sha256:aa01e06376785eef92331e3626e52f2123d7d49241281ba94cd70decbb55bfa6
body:
  text: 是時善音童子及諸仙
