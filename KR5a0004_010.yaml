front:
  text: 无上内祕眞藏經卷之十洪十七
  hash: sha256:1d591f036e2e3f43e0fb582c2fa4dcdb539ee4784a55921c59726624e9a6fcc4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0004_HFL_010-001a, image: hfl/0015/0015-162.png}
body:
  text: 䆒竟品爾時天尊領諸徒衆在靈解山顯揚功德无量國土皆受慧潤无量衆生悉得度脫无量法界並悉聞知无量小乗皆得悟解无量眞仙能顯功德无量眷屬能受持經无量童子能說眞藏无量上士能體大乘无量中士能行供養无量下士能生信心无量師子衞護法城无量金剛斷邪魔惑爾時天尊放慧光明遍照東方无量國土各隨形類而得受潤見此神變尋光而來不動本國而覩天尊稽首无上尊稽首无上法歸依无上師又照南方无量國土各隨形類而得受潤見此神變尋光而來不動本國而覩天尊稽首无上尊稽首无上法歸依无上師又照西方无量國土各隨形類而得受潤見此神變尋光而來不動本國而覩天尊稽首无上尊稽首无上法皈依无上師又照北方无量國土各隨形類而得受潤見此神變尋光而來不動本國而覩天尊稽首无上尊稽首无上法皈依无上師又照上方无量諸天各隨形類而得受潤見此神變尋光而來不動分度而覩天尊稽首无上尊稽首无上法皈依无上師又照下方无極世界各隨形類而得受潤見此神孌尋光而來不動本所而覩天尊稽首无上尊稽首无上法皈依无上師又照地獄幽徒楚痛各隨業報而得解脫見此神變尋光而出不動其所而覩天尊稽首无上尊稽首无上法皈依无上師爾時天尊告諸來者吾爲汝等猶居幻中妄生業縛生死憂惱不能悟解又有諸仙行小乘行雖得長年終皈變易何以故業受累故汝今逥向皈命大乗諦聽善思吾爲汝說我發神光遍照十方无量國土汝等各見神光殊妙希有第一不識所由此光非外非内非青非白非赤非黒脫諸色像而得自在汝等各有此光非近非逺變見在物能爲五聲非五聲能爲五色非五色能爲五味非五味能爲物像非物像能爲智慧非智慧能爲解脫非解脫能爲微妙非微妙能爲清淨非清淨能爲不動非不動能爲取捨非取捨能爲去來非去來能爲寂滅非寂滅能爲是非非是非略示此光千分萬分未顯其一善男子等汝勿驚疑自生退悔我累劫來修行大乘坐觀行觀四宜不失遂經劫載艱辛備經而成道果汝等眷屬聽受不等多有疑惑何故不問我今最後顯深妙理令汝易解勿懐不信迷情不巳須㬰之間汝自當見言語未訖忽然神變空中發聲震天動地逥易日月驚駭衆生蠢蠕之類一持變易莫知所在五苦日徒咸得解脫衆仙等衆乗空而來到靈解山一時稽首瞻視天尊欣慶無巳俱發聲言歎大慈尊顯揚妙德異相威嚴種種方便能成能壞能妙能麄能長能短不可思議不審爲法自有殊妙竒特變見非諸色像爲當天尊神德逥易天尊答言善哉巧問諸法自在非麄非妙亦非自有亦非我作我與法等更無差别汝與我等亦無差别我等衆生衆生我等所變動者皆是正慧法性自顯自顯非相非非相非法非非法清淨自在解脫無爲爾時四衆聞此瑞相非内非外非眞非假各在本性寂然无照四衆皆至不動本國而見他方不壞法相而法相自在不壞煩惱而煩惱清淨不壞生死而生死解脫不壞去來而去來无我不壞是非而是非无主不壞智慧而智慧寂滅我等徒衆乆習諸經未聞此法又經履歴名山洞府諸仙宫殿各有仙經无量部表略披尋讀遂經數劫種種教方學長生術修善外求内懐人我无方便慧自顯功能强化他縁自縁不曉我等昔日徒勞辛苦不遇眞經今覩天尊示我妙藥顯眞藏經決生靈㫖我等宿縁種福淳厚得聞此經不踰旬月无進无退覺悟大乗至靈解山豁然无滯天尊又告諸大弟子及諸來衆此經无量劫來常存不壞神德㣲妙廣布威嚴生天立地造化无端汝等勸化受持供養書寫流通功德甚重福報無窮若有誹謗不信此經見世招禍祅邪惡鬼不意而生汝善觀察惑貧惑賤惑疾惑病惑苦惑惱惑聾惑盲惑瘖惑瘂皆由縁業報應不差惑前惑後宜各愼之修身立行有五福德何謂五福德勤行恭敬勤行慈悲勤行忍辱勤行精進勤行布施何謂恭敬恭敬有二一者覩相恭敬外形人見則信二者當照本性皎然等眞道法行此恭敬名爲正解何爲慈悲慈悲亦有二一者憐愍哀念衆生二者慈能破有樹立行此慈悲名爲度物何謂忍辱忍辱亦有二一者惡業外來觸巳心能懐忍不生怨恚二者无我外无塵累得法自在行此忍辱名爲等性何謂精進亦有二種一者專精定心執志欲人敬已二者内行照物妙心無人我相無去來相常行常照證果不差名爲精進何謂布施亦有二法一者財施受用不周功德不具二者法施懐在胷中慧無不普此之功德心行不等有深有淺若印法者觀理則住名爲大乗最勝功德希有難聞若有不印者縳在色聲名爲小乘辛苦累劫證因受果雖得少分終無解脫復有最下愚癡衆生不知恭敬不知慈悲不知忍辱不知精進不知布施如此等類難可化諭不可思議汝等聽受而聽受之是時眞藏等衆聞此妙說利益甚深難可譬諭而說偈言無上天尊慧無窮顯法隨方皆得度逗機萬行不差殊巨細淺深歸正路放光動地見諸像非巧言辭能譬諭我等積劫習小乘勤苦艱辛終不悟今聞天尊顯眞藏不盈日月了深趣慈悲䆒竟眞道場壞忍受生端正果我師巧說無虚假救濟蒼生無不可衆生不信善因縁誹謗大乗懐自我天尊法母慈受深布德遍周無不普我今曉了大乘經內行思惟自然覩天尊善離於世間方寸受納諸國土示見微妙竒特身不生不死非今古是時眞藏等衆說偈讃歎天尊希有愍傷一切廣布大乗顯眞藏法開化愚蒙教導利益使未見者見未聞者聞未悟者悟未解脫者今得解脫我等眷屬普入法門悟無上道復有下根衆生不能曉逹本性深微迷情不到云何可顯唯願天尊重宣委示天尊答言一切衆生不聞法寳不信大乘不行正法未入定位當審其行隨心爲說我得道巳無量劫來常住世間濟度諸法無時捨離若得度者則見我身非外非內非青非白非赤非黒彼土衆生業縁感對汝等徒衆各取所宜而隨物化我今反入無間汝等肉眼不能見我妙相法身謂言我滅汝自觀身當得見我圎滿具足法未體空迷途倒惑要憑文字執繫其心汝等受持眞藏妙經功德立至當見我身見我身者無文無字無去無來亦無我相無非我相非相非非相何以故經微妙故連法不二法微妙故連衆生不二衆生妙故連我不二我等妙故連一切法非法非非法復告四衆我初學行遂經數劫種種尋求學長生業餐芝服餌吐納導養遂得長生雖夀千齡終必變易乃復進修學中乗行尋文記享外相求眞執著語言謂言是實後遇本師逢善知識曉示眞源决無爲理我禀受形四妙爲本五廕成相遣我行行先觀四妙遊歴五成五成之相窅窅㝠㝠變化出没不住生生反源守一照理明明此時覺悟諸法平等一相無相䆒竟寂滅無初中後汝等四衆廣開法門除五垢行斷四縁愛三惑得除一慧能通六聦明徹映照内外如琉璃山無表無内皎然明淨慧解無窮衆生不曉自懐我𢢔煩惱䨱蔽不能顯了猶如泥中玉䖍不見終無汙染汝等四衆各勸修行勿生外想衆生顚倒迷惑世間躭著五慾以此爲樂謂言不死須㬰之間百病具生惑頭眩風病惑內疾充心惑手脚不遂惑瘖瘂聾盲如此病至求死不得苦腦自嬰妻子看守經年累月復無孝心如此怨報苦痛切身不可歎說若身死後名係三官魂神被縳考對幽牢長夜之中不見日月受苦報對永無期限妻子欣然不知不覺汝等觀察前後因縁明瑩身心逹三世因了三世果善知衆生根性差别隨分自在從無量劫受身定位不生不滅與我同身與道同根一切諸法亦復如是汝等要須先習此經悟諸縁理何以故此經正印通印諸法顯物妙心眞實不二無虛假說是一相門圎滿具足修行至此堅固不退滌蕩無爲外道羣邪自然磨滅此經神力爲大法輪運載衆生輪轉不絶猶如日月懸照四方盲者不覩眞經妙性亦復如是衆生顚倒煩惱覆蔽不見正經自生誹謗失愛慈母眞藏等衆稽首伏地上白天尊衆疑不了敢問衆生等天尊性無差無則爲衆生性等天尊相爲衆生相等天尊性若相等者衆生應見若見尊相則無顚倒亦無煩惱亦無誹謗亦無是非亦無生死云何衆生顚倒不了若性等者相則不等性相則別衆生有相則無有性天尊有性則無有相若相即性性即是相衆生即是天尊圓應天尊即是衆生執著如此疑惑願垂誨示天尊歡喜讃歎善哉巧能問義於衆得聞譬如種樹根深枝盛離枝無根離根無枝衆生性相亦復如是離相無性離性無相性不可見則相非相非非相相不可見則性非性非非性等我性者則是等相等無所等云何難言相則可見性不可見分別二途失眞實道我說此經名大醫王能療諸疾應病與藥能服之者無不差愈不能服者病則不瘳徒嗟大醫終無有損此經亦復如是衆生顚倒不信大乘而生誹謗不行恭敬不肯受持自生顚倒惑此經能破煩惱重病能破貪欲愛網結縳能破瞋恚愚癡障惱能令衆生得無畏心能令衆生得不死術能令衆生智慧方便能令衆生慈仁孝順能令衆生長命富貴能令衆生安樂自在能令衆生成無上道此經功德廣速遍周非言可顯汝能方便功積修行到靈解山入眞實際證大乘轅平等無礙若無方便不曉眞宗反成執滯更增煩惱失大慈毋失平等心失無爲理失解脫慧失功德本諸行皆失自然禍殃天尊於是說偈讃揚重宣功德令諸四衆反照身心說偈頌云大乘廣分布隨分教衆生我顯眞藏本正印證分明能行此經者智慧自然成汝等諸徒衆廣化勤修行證法得自在了逹無上經我今說譬諭近聞令易解小乘人得信漸證無生果䆒竟功德林非人復非我最後殷勤說所言無不可巨細各相容神力隨行坐大乘不可顯反覆在環堵天尊說此偈巳告四衆及諸眷屬我說法訖當還本所此經委付國王聖主次及大臣王侯子弟我大弟子共傳宣布經法流通功德廣逹不可格量何以故猶如良井遍給衆渴井泉不竭此經功德亦復如是廣宣分布衆人皆得本猶不失若不流通此經不行功德斷絶塞諸智慧斷衆生行斷解脫源斷因縁業其罪深重非可譬諭汝諸四衆勤行大行勿生分别我當反神不沉不浮離諸色像四衆顒顒聞此語巳哀號哽咽涕淚不勝齊聲唱言留請天尊垂恩住世天尊答言我遊諸國崑崙九土思法教化令彼衆生逥向大道我别汝當不易時汝等各居嚴淨國土鬱蕙名香在靈解山自當見我忽然冉冉昇空而去眞藏等衆瞻視無巳莫知所在各還本所无上内祕眞藏經卷之十
