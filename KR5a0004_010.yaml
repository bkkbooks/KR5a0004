front:
  text: 無上內祕真藏經卷之十洪十七
  hash: sha256:eed5ecee63ffc0c3ad0baef5e07ceccf329dfcf53b69fdb6ba29ba1d245202ca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0004_HFL_010-001a, image: hfl/0015/0015-162.png}
body:
  text: 究竟品爾時天尊領諸徒衆在靈解山顯揚功德無量國土皆受慧潤無量衆生悉得度脫無量法界並悉聞知無量小乘皆得悟解無量真仙能顯功德無量眷屬能受持經無量童子能説真藏無量上士能體大乘無量中士能行供養無量下士能生信心無量師子衛護法城無量金剛斷邪魔惑爾時天尊放慧光明遍照東方無量國土各隨形類而得受潤見此神變尋光而來不動本國而覩天尊稽首無上尊稽首無上法歸依無上師又照南方無量國土各隨形類而得受潤見此神變尋光而來不動本國而覩天尊稽首無上尊稽首無上法歸依無上師又照西方無量國土各隨形類而得受潤見此神變尋光而來不動本國而覩天尊稽首無上尊稽首無上法皈依無上師又照北方無量國土各隨形類而得受潤見此神變尋光而來不動本國而覩天尊稽首無上尊稽首無上法皈依無上師又照上方無量諸天各隨形類而得受潤見此神變尋光而來不動分度而覩天尊稽首無上尊稽首無上法皈依無上師又照下方無極世界各隨形類而得受潤見此神孌尋光而來不動本所而覩天尊稽首無上尊稽首無上法皈依無上師又照地獄幽徒楚痛各隨業報而得解脫見此神變尋光而出不動其所而覩天尊稽首無上尊稽首無上法皈依無上師爾時天尊告諸來者吾為汝等猶居幻中妄生業縛生死憂惱不能悟解又有諸仙行小乘行雖得長年終皈變易何以故業受纍故汝今回向皈命大乘諦聽善思吾為汝説我發神光遍照十方無量國土汝等各見神光殊妙希有第一不識所由此光非外非內非青非白非赤非黑脫諸色像而得自在汝等各有此光非近非逺變見在物能為五聲非五聲能為五色非五色能為五味非五味能為物像非物像能為智慧非智慧能為解脫非解脫能為微妙非微妙能為清淨非清淨能為不動非不動能為取捨非取捨能為去來非去來能為寂滅非寂滅能為是非非是非略示此光千分萬分未顯其一善男子等汝勿驚疑自生退悔我纍劫來修行大乘坐觀行觀四宜不失遂經劫載艱辛備經而成道果汝等眷屬聽受不等多有疑惑何故不問我今最後顯深妙理令汝易解勿懷不信迷情不巳須臾之間汝自當見言語未訖忽然神變空中發聲震天動地回易日月驚駭衆生蠢蠕之類一持變易莫知所在五苦日徒咸得解脫衆仙等衆乘空而來到靈解山一時稽首瞻視天尊欣慶無巳俱發聲言歎大慈尊顯揚妙德異相威嚴種種方便能成能壞能妙能粗能長能短不可思議不審為法自有殊妙竒特變見非諸色像為當天尊神德回易天尊答言善哉巧問諸法自在非粗非妙亦非自有亦非我作我與法等更無差别汝與我等亦無差别我等衆生衆生我等所變動者皆是正慧法性自顯自顯非相非非相非法非非法清淨自在解脫無為爾時四衆聞此瑞相非內非外非真非假各在本性寂然無照四衆皆至不動本國而見他方不壞法相而法相自在不壞煩惱而煩惱清淨不壞生死而生死解脫不壞去來而去來無我不壞是非而是非無主不壞智慧而智慧寂滅我等徒衆久習諸經未聞此法又經履歷名山洞府諸仙宫殿各有仙經無量部表略披尋讀遂經數劫種種教方學長生術修善外求內懷人我無方便慧自顯功能強化他緣自緣不曉我等昔日徒勞辛苦不遇真經今覩天尊示我妙藥顯真藏經決生靈旨我等宿緣種福淳厚得聞此經不踰旬月無進無退覺悟大乘至靈解山豁然無滯天尊又告諸大弟子及諸來衆此經無量劫來常存不壞神德微妙廣布威嚴生天立地造化無端汝等勸化受持供養書寫流通功德甚重福報無窮若有誹謗不信此經見世招禍祅邪惡鬼不意而生汝善觀察惑貧惑賤惑疾惑病惑苦惑惱惑聾惑盲惑瘖惑啞皆由緣業報應不差惑前惑後宜各愼之修身立行有五福德何謂五福德勤行恭敬勤行慈悲勤行忍辱勤行精進勤行布施何謂恭敬恭敬有二一者覩相恭敬外形人見則信二者當照本性皎然等真道法行此恭敬名為正解何為慈悲慈悲亦有二一者憐愍哀念衆生二者慈能破有樹立行此慈悲名為度物何謂忍辱忍辱亦有二一者惡業外來觸巳心能懷忍不生怨恚二者無我外無塵纍得法自在行此忍辱名為等性何謂精進亦有二種一者專精定心執志欲人敬已二者內行照物妙心無人我相無去來相常行常照證果不差名為精進何謂布施亦有二法一者財施受用不周功德不具二者法施懷在胸中慧無不普此之功德心行不等有深有淺若印法者觀理則住名為大乘最勝功德希有難聞若有不印者縳在色聲名為小乘辛苦纍劫證因受果雖得少分終無解脫復有最下愚癡衆生不知恭敬不知慈悲不知忍辱不知精進不知布施如此等類難可化諭不可思議汝等聽受而聽受之是時真藏等衆聞此妙説利益甚深難可譬諭而説偈言無上天尊慧無窮顯法隨方皆得度逗機萬行不差殊巨細淺深歸正路放光動地見諸像非巧言辭能譬諭我等積劫習小乘勤苦艱辛終不悟今聞天尊顯真藏不盈日月了深趣慈悲究竟真道場壞忍受生端正果我師巧説無虛假救濟蒼生無不可衆生不信善因緣誹謗大乘懷自我天尊法母慈受深布德遍周無不普我今曉了大乘經內行思惟自然覩天尊善離於世間方寸受納諸國土示見微妙竒特身不生不死非今古是時真藏等衆説偈讃歎天尊希有愍傷一切廣布大乘顯真藏法開化愚蒙教導利益使未見者見未聞者聞未悟者悟未解脫者今得解脫我等眷屬普入法門悟無上道復有下根衆生不能曉逹本性深微迷情不到云何可顯唯願天尊重宣委示天尊答言一切衆生不聞法寶不信大乘不行正法未入定位當審其行隨心為説我得道巳無量劫來常住世間濟度諸法無時捨離若得度者則見我身非外非內非青非白非赤非黑彼土衆生業緣感對汝等徒衆各取所宜而隨物化我今反入無間汝等肉眼不能見我妙相法身謂言我滅汝自觀身當得見我圎滿具足法未體空迷途倒惑要憑文字執繫其心汝等受持真藏妙經功德立至當見我身見我身者無文無字無去無來亦無我相無非我相非相非非相何以故經微妙故連法不二法微妙故連衆生不二衆生妙故連我不二我等妙故連一切法非法非非法復告四衆我初學行遂經數劫種種尋求學長生業餐芝服餌吐納導養遂得長生雖夀千齡終必變易乃復進修學中乘行尋文記享外相求真執著語言謂言是實後遇本師逢善知識曉示真源決無為理我稟受形四妙為本五廕成相遣我行行先觀四妙遊歷五成五成之相窅窅冥冥變化出沒不住生生反源守一照理明明此時覺悟諸法平等一相無相究竟寂滅無初中後汝等四衆廣開法門除五垢行斷四緣愛三惑得除一慧能通六聰明徹映照內外如琉璃山無表無內皎然明淨慧解無窮衆生不曉自懷我慢煩惱䨱蔽不能顯了猶如泥中玉虔不見終無汙染汝等四衆各勸修行勿生外想衆生顚倒迷惑世間耽著五欲以此為樂謂言不死須臾之間百病具生惑頭眩風病惑內疾充心惑手腳不遂惑瘖啞聾盲如此病至求死不得苦腦自嬰妻子看守經年纍月復無孝心如此怨報苦痛切身不可歎説若身死後名係三官魂神被縳考對幽牢長夜之中不見日月受苦報對永無期限妻子欣然不知不覺汝等觀察前後因緣明瑩身心逹三世因了三世果善知衆生根性差别隨分自在從無量劫受身定位不生不滅與我同身與道同根一切諸法亦復如是汝等要須先習此經悟諸緣理何以故此經正印通印諸法顯物妙心真實不二無虛假説是一相門圎滿具足修行至此堅固不退滌蕩無為外道羣邪自然磨滅此經神力為大法輪運載衆生輪轉不絶猶如日月懸照四方盲者不覩真經妙性亦復如是衆生顚倒煩惱覆蔽不見正經自生誹謗失愛慈母真藏等衆稽首伏地上白天尊衆疑不了敢問衆生等天尊性無差無則為衆生性等天尊相為衆生相等天尊性若相等者衆生應見若見尊相則無顚倒亦無煩惱亦無誹謗亦無是非亦無生死云何衆生顚倒不了若性等者相則不等性相則別衆生有相則無有性天尊有性則無有相若相即性性即是相衆生即是天尊圓應天尊即是衆生執著如此疑惑願垂誨示天尊歡喜讃歎善哉巧能問義於衆得聞譬如種樹根深枝盛離枝無根離根無枝衆生性相亦復如是離相無性離性無相性不可見則相非相非非相相不可見則性非性非非性等我性者則是等相等無所等云何難言相則可見性不可見分別二途失真實道我説此經名大醫王能療諸疾應病與藥能服之者無不差愈不能服者病則不瘳徒嗟大醫終無有損此經亦復如是衆生顚倒不信大乘而生誹謗不行恭敬不肯受持自生顚倒惑此經能破煩惱重病能破貪欲愛網結縳能破瞋恚愚癡障惱能令衆生得無畏心能令衆生得不死術能令衆生智慧方便能令衆生慈仁孝順能令衆生長命富貴能令衆生安樂自在能令衆生成無上道此經功德廣速遍周非言可顯汝能方便功積修行到靈解山入真實際證大乘轅平等無礙若無方便不曉真宗反成執滯更增煩惱失大慈毋失平等心失無為理失解脫慧失功德本諸行皆失自然禍殃天尊於是説偈讃揚重宣功德令諸四衆反照身心説偈頌云大乘廣分布隨分教衆生我顯真藏本正印證分明能行此經者智慧自然成汝等諸徒衆廣化勤修行證法得自在了逹無上經我今説譬諭近聞令易解小乘人得信漸證無生果究竟功德林非人復非我最後殷勤説所言無不可巨細各相容神力隨行坐大乘不可顯反覆在環堵天尊説此偈巳告四衆及諸眷屬我説法訖當還本所此經委付國王聖主次及大臣王侯子弟我大弟子共傳宣布經法流通功德廣逹不可格量何以故猶如良井遍給衆渴井泉不竭此經功德亦復如是廣宣分布衆人皆得本猶不失若不流通此經不行功德斷絶塞諸智慧斷衆生行斷解脫源斷因緣業其罪深重非可譬諭汝諸四衆勤行大行勿生分别我當反神不沉不浮離諸色像四衆顒顒聞此語巳哀號哽咽涕淚不勝齊聲唱言留請天尊垂恩住世天尊答言我遊諸國崑崙九土思法教化令彼衆生回向大道我别汝當不易時汝等各居嚴淨國土鬱蕙名香在靈解山自當見我忽然冉冉升空而去真藏等衆瞻視無巳莫知所在各還本所無上內祕真藏經卷之十
