front:
  text: 無上內袐真藏經卷之八洪十五
  hash: sha256:fc66fb9dbc5c633755a0461c584f12eb039db3ed397ed117d4cbf4c6320cc0b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0004_HFL_008-001a, image: hfl/0015/0015-114.png}
body:
  text: 集仙品爾時真人名曰仙靈與諸徒衆七千四百餘人遊居世界及林屋山彌齡積劫餐芝服餌吐納導養遂得長生為地仙道不悟大乘而無解脫仙靈於是伏地頓首上白天尊久聞真藏妙經在靈解山濟生度死斷煩惱際排百劫魔蕩千祅惑慈恩普照潤被蒼生咨論請益唯願天尊垂見恩念是時天尊坐五色琉璃寶座在靈解山去地百丈宣揚正法祕密真藏復有鬱蕙及風名香散布諸法悉皆利益一切蠕動有識含生無不受潤四方來衆自然悟解復能成就下方穢雜國土裝嚴妙麗竒特希有於是天尊告諸仙曰汝等徒衆積習小乘業緣難斷吾今為汝宣揚大乘恐驚怛汝何以故妙絶心源見者難矣若欲求者先斷三惑何謂三惑一者心惑貪生二者情惑財色三者意惑善惡除此三惑可以求道復有一行為道根本萬行之先何謂一行不住世問不離世間不住空有不離空有不住人我不離人我不住因果不離因果不住身心不離身心常行實道如是行行常得解脫出離生死仙靈於是伏地稽首上白天尊取問行比一行依何所行天尊曰依舊文字又問初學小乘纍年積劫不識道源云何是舊答曰不生心是又問不生心者則是無法無法云何得名舊字答曰心行處滅斷煩惱際得無為理證此理者無生無滅究竟道場功德具足則名舊字又問心行處滅誰斷煩惱誰證無為誰知寂滅若知寂滅證無為者則是有法有法遷移常變不住以不住故則是無常云何得名舊字諸疑不了願重告示天尊含笑五色煥明彌冠十天脫衆色像歡喜答曰善哉善哉汝所問者為衆決疑開生靈旨吾為汝説諦聽善思分明易解我所顯者法無自性無自性故皆是舊字爾時仙靈及諸從衆聞此大乘心開意解喜恱難勝我等纍劫艱辛遠求彌失今聞大乘各歸本國自在無為天尊又告諸善知識勿生外想何以故一切諸法皆是舊字若言諸法有生滅者則謗諸法是名邪見亦是外道亦名分别亦名得失亦名顚倒亦名人我若言諸法無生滅者則壞諸法亦名邪見亦名外道亦名分别亦名得失亦名顚倒亦名人我何以故一切法本清淨究竟非空非有非非空非非有即此法性自在無礙名無上道故名舊字亦名正經亦名功德不壞諸法名無上道不壞是非名為舊字不壞生死名為正經不壞去來名為功德不壞取捨名為法寶不壞人我名為定慧如是妙法名大生死名大去來名大是非名大人我名大取捨名大彼此何以故法本無窮終日説之亦不能盡譬如大海百川所住無增無減大乘經典功德微妙亦復如是略顯譬喻百千萬分不及其一此經功德不可格量復次諸大弟子及諸仙等初學小乘繫業功重何由可捨聞此大乘心不能受勿生悔恨失功德本我懷慈念如母愛子何以故法無斷故法清淨故法智慧故法解脫故一念相違善根悉斷母愛子者亦復如是氣氣相續念念不移無時可捨兒子不孝自棄其母逃走向外不顧其母衆生迷惑亦復如是不懷恩愛失孝慈母遠離善道爾時仙靈稽首無上尊稽首無上法稽首天尊門弟子有幸得遇大乘逢善知識歡喜踊躍歎未曽有昔學小乘纍年辛苦不離生死不離是非不離煩惱不離恩愛不離攀緣不離人我不離分别不離斷常如是苦惱永無解脫今悟大乘豁然無滯復次一切衆生諸根不等云何得入大乘天尊答言悉入大乘又問若不等法入大乘者云何有衆生修道云何有衆生善惡云何有聖人教化若有衆生行善惡者則諸法不可以不等故大乘不等大乘不等故云何悉入大乘天尊答言大道無方差殊悉正衆生顚倒悉入大乘衆生善惡悉入大乘衆生處在其中自迷不曉以不曉故自受為有有法業成輪回被縛失大慈道又問善惡名異而俱得入大乘者真俗名異而俱得入小乘若真俗名異而非小乘者云何善惡名異俱入大乘答曰善惡二名真俗何别大乘等於小乘何有大小殊異又問若如是者大小一者相反而不同亦應大小二體殊異非俱有若二體俱有而不異者二名亦應俱小而無大云何悉入大乘答曰大小二乘相對而得名實無二體而可顯又問大小二乘相對而得名則是互從若大從小而得名者大應從小而名小若小從大而得名者小應從大而名大云何大小二名相對而顯天尊答曰相對顯者藥病相破衆生二心俱無所得於無所得橫生顚倒分别二見善惡差殊又問若如是者善生之時惡名應滅惡生之時善名應滅云何二名一時俱顯天尊曰如是如是善名若生惡名則滅惡名若生善名則滅仙靈曰若如是者惡名應通三世過未亦應是惡若過未非惡者見在云何有善惡更相互起天尊曰過未既無見在互起亦無所起云何得有善惡名起又問善惡二名俱無體者善惡生時亦應有體各曰善惡生時各無名體又問善惡二名而不同者不得二名俱無其體二名既無體者惡名應是有體答曰有無所有又問惡名無體而是無者亦應善名有體而是有有天尊曰善惡二名而無二體一相平等無所善惡無所善惡究竟清淨一切諸法悉得自在無大無小無長無短究竟解脫諸善男女等勤行布施勤行持戒勤行精進勤行慈悲勤行忍辱勤行智慧一切諸法名大道場未來布施未來持戒未來精進未來慈悲未來忍辱未來智慧功德具足不可思議若有善男女等深信大法誦念此經功德薰天不可格量若有人受持供養為人講説流通智慧猶如日光並照不輟智慧相傳潤及七祖悉令解脫三界諸天及諸草木塵沙等數比此功德萬分不及其一如是祕密真藏難可覩聞自非宿福功德深厚不得聞見諸仙等衆聞此大乘勤行精進宣告未聞若不流通諸緣頓絶遏塞道源彌年積劫永離善因汝等各各淨心勿生不信誹謗大乘自招重考我從無量劫來修行不懈從身至身非可算數心心相續念念尋求學此大乘而無退轉成無上道當發大願誓度衆生憐愍一切汝等四衆懷慈悲行方便引誘爾時仙靈等衆惶悸戰汗受命深重信而奉行當此之時王法清正人懷慈心三惡道滅五欲不生是時諸仙等衆歡喜無量讃歎法王功德微妙而作偈曰我師惠澤潤無邊衆生受業隨分度不易性相寂無為功德具足無不普我等昔學小乘行纍劫艱辛甚勤苦今悟大乘巧方便不動形神自然覩神妙窅窅難思議群生眇眇迷本土是時仙靈等衆讃我法王功德微妙利益蒼生度諸苦難悉皆受潤大乘廣遠不可格量我等徒衆各各受持宿緣有幸得遇真經金口顯授悟無上道天尊曰法無內外法無長短法無去來衆生微弱煩惱覆蔽永不覺知冥冥長夜無時可曉譬如日月無有私照而盲者不覩衆生迷暗亦復如是復次諸善男女譬如玉山內外俱照玉從土出而無瑕染衆生本性亦復如是迷惑顛倒終不悟解復告諸大弟十建忘修研勤行勿退微密靈神自然感果復有諸天諸地各有仙官位分不等差别殊方各有階級功行受業異類不同終劫説之亦不能盡徒復艱辛纍劫勤苦終不得道要須此經而得成道真藏密祕收攝外魔及天神地祗五嶽名山洞府諸仙皆由此經隨分而受此經第一衆經中王決定自在天尊於是而作偈言此經本微妙非我能巧説顯舊逗機緣智者聞欣恱汝等諸徒衆動行勿滅裂非汝小乘經悟懈無功拙我今廣譬論愚者聞易解言淺理深微近證無生果道非內外心衆生身等我汝各自思惟妙法平等土智慧功德林忘形形自普略讃一言音凡愚愚不覩爾時天尊説偈讃頌諸天發瑞自然靈應百億遊仙一時感會百億童子虛空自至百億士夫聞而踊躍百億衆生自然歸向百億日月一時俱照復有鬱蕙反風名香散布諸法諸法染著鬱蕙名香不生不滅當此之時一切雜類各染名香自然鬱蕙皆吐諸香入被密藏大乘微妙非可歎説時有國王名曰天寶見此瑞相歎未曽有歡喜無量群臣左右自無邪佞局局相守各各自願王率國內悉令書寫受持供養功德效驗國土清虛干戈靜息人人歡樂壽命長遠風化自均無憎無惱仙靈稽首伏地上白天尊今日所見實未曽見今日所聞實未曽聞為法自變為是神化若化變者法應無法無法云何得化變若自變者則是有法有法無常云何得化諸疑不了唯願天尊慈哀為決天尊曰善哉善哉大乘微妙非有非無非長非短非大非小亦非自變亦非他化何以故法自在故法真實故法玄妙故法解脫故法不生故法不滅故法無縛故法無解故法無憎故法無念故法無親故法無踈故所以爾者大乘經典盡通物性非假惑説仙靈等衆聞此説巳悟解漸深益加功德六通智慧戒行圎滿施為得所精進無礙忍辱慈悲智慧解脫證本微妙等一性味到靈解山成無上道爾時天尊告真藏童子汝等深得法味照理圎具智慧泉通才堪出入開示未聞決諸仙行隨緣指掌其福深逺非可譬諭假使黃金萬斤捨施功德百千萬分不及其一若有受持講説讃誦功德廣遠與前功德無毫釐差别何以故法微妙故法深逺故法無生故法無滅故法利益故復告仙靈等衆法無先後有德為尊法無大小覺悟者全真藏童子功行深遠堪為物軌汝等雖悟由未盡冥承奉宗匠能滅漏心始得慧解善男女等各自勤行深信大法行十直心行十直行行九法心行九法行行八正心行八正行行七覺心行七覺行行六慧心行六慧行行五解心行五解行行四等心行四等行行三定心行三定行行二受心行二受行行如是行了建塵勞盡諸法界功德廣遠非可顯名諸仙等衆聞此法寶的委所由歡喜踊躍震動大地物悉開悟未聞者聞未見者見未知者知未信者信未解脫者解脫一切萬類悉皆受潤仙靈等衆不動本國至靈解山常樂自在稽首而去無上內祕真藏經卷之八
