front:
  text: 无上内祕眞藏經卷之九洪十六
  hash: sha256:4a63be8932f5e7ac4598756d93d0e4b084f63fb7bfc7076fafe039e3630238ac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0004_HFL_009-001a, image: hfl/0015/0015-136.png}
body:
  text: 明行品爾時眞藏童子於大衆中庠序雅歩徃詣天尊諮諸問道爲衆決疑不審下方所有外道衆生甚難教化不信正眞無上大道云何誘引令得信向又云我所說者文字分明世所希有干忤大乘自是爲實復有諸鬼雜神祅魔惑正不識大道復有小乘行者計功立位不信眞經虚玄寂靜復有下根衆生聞而誹謗云何化度天尊所云无大不包无細不入法性平等何故迴向不同諸法差别衆中疑惑所照不深願爲隨根顯令悟解天尊曰汝等徒衆諦聽善思當爲汝説天髙地卑等無差别丘山河海等無差别一切雜類等無差别三清境界下土衆生等無差别邪言惑正等無差别衆生經教等無差别一切諸法爲大空本無等爲等若受塵累名行邪道亦名謗法不名逥向若信大乘乖小乘行是行邪道亦名謗法不名迴向若信小乗乖大乘行是行邪道亦名謗法不名逥向若受衆生祛於三惑是行邪道亦名謗法不名迴向若有衆生不信大乘是行邪道亦名謗法不名迴向若有衆生不信經教是行邪道亦名謗法不名迴向若有衆生説人短長是行邪道亦名謗法不名迴向如是謗法有深有淺若受塵累煩惱未盡不見道源若信大乘乖小乘行心源不明貪善無巳若信小乘乖大乘行取捨不停心闇多惑若受衆生祛於三惑有心求心念念無巳若有衆生不信大乘迹途顚倒失孝慈母若有衆生不信經教愚癡闇塞不聞法音若有衆生說人長短自揚巳善貪愛在懐罪業深重終劫説之亦不能盡又問邪正衆生信行不等行邪道者是名謗法行正道者爲是謗法爲非謗法又云道本虚寂若虛寂爲道者衆生誹法亦是虚寂而爲道本云何名爲謗法若非道本名爲邪行行正道者亦是邪行名爲謗法何以故衆生即是道體行業不同云何即有差别若有差别邪正不同衆生即非道體邪正皆爲謗法云何天尊勤行正道天尊曰何故復作如是疑邪正共同一根解脫由是一門雖同一體非無二源何以故行邪道者顚倒競起煩惱𦆑懐則乖正道行正道者無待無對無寂無滅假名寂滅衆生取捨有待有對妄生爲有即是待對生死業對報應業對善惡業對輪轉業對業報無極邪縁不絶又問道生萬物即是萬物之母母與衆生顚倒與衆生分別與衆生妄想與衆生邪見與衆生取捨與衆生輪轉與衆生業報種種云爲皆是道與若如是者則無善惡可故有衆生顚倒差別若有顚倒差别者天尊所說大乘無人無我無大無小無髙無下無長無短無五常行無六識轉如是説者則是謗法誑惑衆生天尊含笑應諸十方各見天尊一時含笑諸天境界亦復如然雜類衆生普皆歡樂眞藏等衆歎未曽有微妙第一雖知道妙猶不盡其妙源不審妙道難窮未知衆生是妙道不若是妙道則無衆生既有衆生則無妙道四衆皆疑天尊曰妙法無妙云何有衆生可顯又問無衆生可顯云何天尊說法誘引苦有誘引則有衆生云何説云無衆生相信心衆生不逹法性猶自有疑况諸衆生寜得信乎唯願天尊隨根曉示天尊曰我説一字舒善十方一切法界沙塵之數盡然顯了汝等徒衆難悟難聞衆生一相二行而行行之一相衆生一相三行而行行之一相衆生一相四行而行行之一相衆生一相五行而行行之一相衆生一相六行而行行之一相衆生一相七行而行行之一相衆生一相八行而行行之一相衆生一相九行而行行之一相衆生一相十行而行行之一相如是行行逹了慧源悉皆解脫名爲上樂名爲上樂到靈解山不生不滅復次非心不心亦不不心非色不色亦不不色非我不我亦不不我非縁不縁亦不不縁非慮不慮亦不不慮如是行行道眼清淨故具足一切無量功徳智慧成就到靈解山常住安樂樂生三業煩惱益𦆑正性不顯倒惑甚深種種譬諭不自覺知何謂三業一者貪愛思慮百端計劃無巳貪性一發遂惑迷途六情馳騁不可制御自乖行戒二者瞋恚忿發外觸動情瞋恨無巳自乖定行三者癡闇㝠㝠不曉五情纒繞惡業相連億劫無巳自乖慧解此三業受能滅道種復此三業行能種道果何以故一者捨離世問心棲域外行業遍通斷貪心種直至道場名大乘戒二者諸行無深不受不觸慈愛衆生歡喜無量善根解脫名大乘定三者達了衆生五情六觸煩惱業縁顯發無礙逕入道場名大乘慧復次諸善男子此三業者惑成惑敗時由心發一切諸法心則爲本善否由心心不在内亦不在外不近不逺不麤不妙無大無小無長無短不圎不方善否自在爲惡業者業報立至過去亦縳未來亦縳見在亦縳沙塵劫數悉是𡨚家斷諸道種爲善業者道果立至過去亦解未來亦解見在亦解沙塵劫數悉是善因斷諸惡種又問心既非内非外非長非短非大非小絶無有相亦無非相云何善惡立至善至則解惡至則縳唯願天尊慈恩見念衆得明了天尊曰譬如鏡像像形分明如言有者取而不得如言無者像見分明當知非有非無妍醜立見前心後心心心相續雖無相貌善惡則由分别二見誹謗是非毀善譽惡皆是心作名爲凡夫在得失中以失爲失行人修行照本實情無分别相無善惡相無人我相不名凡夫在眞實中以得爲得略説心行得失差殊况諸凡計千差萬别殊雖萬途得之者一又聞得一之時爲是一邪爲非一邪若有一者應有二法若一非一一無所得云何得一天尊曰猶如足字非一非二非縳非解非空非不空所言得一者證虚空理證無所正名爲得一不壞諸法名虚空相虚空之相是名道體亦名功徳如是廣說功德因縁無邊衆眞藏等衆稽首敢問本迹二途云何有二爲本中有迹爲迹中有本若本中有迹有迹應無有本若迹中有本有本應無有迹譬如空有有有無空有空無有云何一時顯其本迹天尊曰實無二義開方使門即迹是本本無有迹無迹無本名爲眞本一切諸法不離本故故名諸法諸法性離故名道本心水澄清見眞實本非眞非假了了分明眞藏等衆名悟大乘歡喜無已而說謁言大乘無虚假廣布於天人利益無邉衆非果亦非因衆生聞悉悟自然解脫身我等勤精進積劫勞苦辛三業定慧本文字裏追尋凡夫迷日乆分别失天津天尊徃徃說方便度衆生三業各各受法内有天經因果微妙相遂成功德林我等諸徒衆未曾聞此音應變諸國土物類盡歡欣㝠功不可測心見實難陳寄語悠悠子努力尋道眞世間非非實離相得遊神眞藏功徳力破惑慳貪瞋四衆皆歡樂證法盡方圎爾時眞藏童子及諸四衆說是偈巳歡喜天尊功德方便説微妙法廣度衆生潜功不宰敢問衆生差殊諸行不等根機淺深云何天尊説言足字未審衆生是足字不若是足字根機應等應悉悟解若非足字天尊說之有何利益唯願天尊不簡雜言随縁爲說天尊答言我說足字諸法共之一切衆生皆是足字悉皆平等雖復千差萬類無非畢竟凡夫迷惑不自覺知教迹漸多方便誘説下根衆生爲説有法覩相生善中相衆生爲說空有若聞空有即生信向上根衆生爲說非空非有亦空亦有非非空非非有聞此説者虚心了悟説雖不同隨縁布德皆是足字應病與藥悟足字者無言無教若病下眼藥者終無差損衆生不信大乘終無悟解是故此經能破衆生煩惱無明闇障能滌衆生離惡垢塵能調衆生生死苦惱能令衆生妻子安樂能令衆生孝事君父能今衆生長命富貴能今衆生得金剛力能今衆生甚多智慧能今衆生慈愛孝順能今衆生不生怖畏能今衆生得法自在能令衆生不生不滅此經功德力重非可譬諭得其邊際又問三乘經教隨化三根稱機布德不審愚癡最下衆生不解布施不識人禮云何化度天尊答言雖指三乘化途無量若能信心恭敬幡花供養抄寫受持功德甚重亦不可量用此捨施功德百千萬分不及其一又問若能如是受持供養者則是上根智慧之士不名愚癡衆生四座顒顒祛疑未了天尊又言有耳有目者悉可提撕非止三乘種種方便愚䝉本性悉在靈解逥向即至此經深妙爲衆經第一光示餘行斷截外魔外魔消滅内行調伏城壍堅固衆賊永斷功德裝嚴具足圓滿一切種智自在解脫十方天尊得一切智慧解無方到靈解山成無上道䆒竟清淨斷諸漏道一切諸法皆爲實相一切煩惱皆爲種智是行人行䖍是功德本汝等四衆證微妙身入祕宻藏出離生死入五濁中化度衆生隨三業行示方便惠所以爾者十方大聖證入妙身皆是煩惱内發不由外來自然㣲妙無形無相復次一切諸法非造作法非生滅法非昔有法非今無法湛寂自然與天尊合德一切衆生聞如是語反生謗心便更起惑雖然要在逆俗功德甚深利益廣遠復次正行修道難一切相印無生理虚妄自斷與道爲一不生不滅無去無來何以故妙道寂滅故寂滅能生生滅能生去來能生動轉能生業行一切諸法悉能生育生育之法相好不同惑優㳺自在惑常生苦惱惑䖏富貴惑居貧賤惑姿容婥約惑形貌醜陋干差萬別種類不同皆是妙道寂滅無爲凡夫不能解了自生顛倒天尊爾時欲顯大乘眞藏妙典說偈頌曰本體不生滅法相自玄通諸受常清淨無爲性自空十方天尊德衆生等共同汝等咸恭敬修行立大功五癊香園宅窅然無始終三業戒定慧無去亦無來道相不可測示見無不該我說方便慧妙法絶三才顯揚功德本世孕是瓊胎能修無上道六識自然開悟法端正慧三毒靡不逥於法得自在萬劫不建災衆生長苦夜不覺年命摧轉輪無窮極欲樂不知哀歎汝愚癡軰不信大乗經棄離眞父母習惡爲因縁不逢善知識無由作福田能行此經者悟解諸法前爾時天尊說此偈已讃揚功德顯諸法相示大乘經無大不包無細不入度諸衆生令入法寳一切衆生善知識等勤行精進習讀此經此經功德最大爲諸法本爲法舟航爲法梯橙能疾能速能救諸病爲大醫王種種救治隨病與藥無不差愈汝等徒衆廣化衆縁觀其業趣勿生機宜得性順從夫性違戾得性恬愉失性憂惱又問不審恬愉之性云何修行天尊答言五常之行皆悉恬愉實無相尅衆生顛倒貪欲取捨失恬愉行皆悉相尅情深外塵失恬愉行名爲相尅五隂不通失恬愉行名爲相尅能行布施名爲恬愉能行持戒名爲恬愉能行智慧名爲恬愉能行讀誦名爲恬愉能行書寫名爲恬愉能行供飬名爲恬愉能行受持名爲恬愉能行講說名爲恬愉能行觀行名爲恬愉能行逺離名爲恬愉我說布施非布施名爲恬愉我說持戒非持戒名爲恬愉我說智慧非智慧名爲恬愉我說讀誦非讀誦名爲恬愉我說書寫非書寫名爲恬愉我說供養非供養名爲恬愉我說講說非講說名爲恬愉我說諸行非諸行名爲恬愉我說諸法非諸法名爲恬愉我說修道非修道名爲恬愉我說一二非一二名爲恬愉我說眞藏非眞藏名爲恬愉我說本性非本性名爲恬愉我說譬諭非譬諭名爲恬愉我說小乘非小乘名爲恬愉我說大乘非大乘名爲恬愉恬愉之行非大非小非長非短非廣非狹非去非來亦非色相亦非聲相亦非觸相又問恬愉之體是道體否天尊答言一切諸法皆是道體一切諸法皆是恬愉雖有二名而爲一體我說一體非一體名爲一體善男女等勿取文字勿著語言文字性離離相修行言語道斷斷相修行心識䖏滅滅相修行五廕性空空相修行三業性淨淨相修行六識常住住相修行四大常通通相修行能如是行功德廣慱濟無邊衆度生死海到靈解山神通自在爾時眞藏童子及諸四衆稽首讃歎善哉善哉天尊深智聞顯大乘微妙之義我等徒衆各恬心源哀念深逺㝠功濟度非是二乘之所能知又於諸法相中顯大慧源成無上道被諸來生悉令易悟大乘平等等一切相不偏不黨授與能行無賤無貴當知天尊爲衆生父母爲衆生橋梁廣施布教開决耳目紹隆三寳輪轉無極我等徒衆各發大意宣揚妙法示來衆生令聞正法得正法巳父子妻孥安樂無巳天尊又曰此經從無量劫來不終不壞度人無量終劫說之亦不能盡得道之人相傳不絶要須此經而得道果若無此經終無有是此經神驗疾於影響若在急難讀誦此經難即消滅自然擁護昔有玉印童子燒香供養讀誦此經忽有仙童玉女遍滿虚空一時來至燒反風名香讃詠靈文驚動一國玉印童子安然不恐遂無輟音眞藏等衆寂默無言稽首而去无上内祕眞藏經卷之九
