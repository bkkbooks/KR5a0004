front:
  text: 无上内祕眞藏經卷之六洪十三
  hash: sha256:f7a4c2d0b2e1ff51d6ae6f047bf2dd0e8843b66d45bd570c3c44815484e3fdad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0004_HFL_006-001a, image: hfl/0015/0015-054.png}
body:
  text: 顯功徳品是時善音童子及諸仙衆在香林園詣天尊所聽習大乗遂生迷惑敢問一切衆生普受光者云何利益不同受生各異若俱受者根機應等不應有難悟易悟若不等者慧光不周天尊偏說又問衆生要須此經而得成道若無此經終無解脫天尊曰善哉善哉如汝問者以空問空空無所問我所答者以空答空空無所答一切衆生異類差殊諸根不等不等故空空無所等無所等故是名解脫衆生迷惑而不知覺悉有慧光眼瞳不曉本性清淨心識昬迷要須此經開訣耳目耳目明淨照諸法本無差無別當知一切衆生同禀道源悟解先後譬如玄珠遺在赤水種種推求而不能得當知衆生本性空寂非空非有非内非外有心求者終不能得無心不求亦不能得要須方便巧積慧源自然得果若言我說法者則謗正法毀壞善根當知所說非說非說非非說平等一相一無所相善男子汝等内行靜照冀著空有天地成形道徳成經智者悟之仁者行之見其所不見不見其所見知其所不知不知其所知反人常見及人常聞一切有爲無爲悉皆而反如是行者體入大乗證成功徳善音童子及諸大衆聞如是說心地驚疑迷懼失所敢問諸法究竟非空非有云何有法而反得入大乗旣無法者云何證成功徳天尊曰我說一字反覆無端衆生虚妄妄有妄無執妄生迷妄成倒惑我說反者達妄無妄妄有非有妄無非無如是觀者是名反本得入大乗證成功徳又問衆生虚妄虚妄即是無法無法云何可反若無法反云何有大乗可入云何有功徳可證天尊曰如是如是諸法解脫得解脫理名入大乗證成功徳又問諸法解脫名入大乗證成功徳一切衆生不修不學名爲大乗證成功徳禽蟲雜獸不修不學名爲大乗證成功德如是一切諸法名爲大乗證成功徳云何有衆生虚妄云何有衆生顚倒云何有衆生取捨云何有衆生去來云何有衆生差別云何有仙聖化度天尊曰如是如是如我所說諸法具滿一字若有一法不具大惠功徳者則謗諸法毀滅大乗何以故一切衆生行住生卧悉入大乗證成功徳五廕六情悉入大乗證成功德貪癡取捨悉入大乗證成功徳一切有爲無爲悉入大乗證成功徳所說大乗非大乗是名大乗所說功徳非功徳是名功徳諸法微妙自在無爲所有言說皆是名字非眞實道悟斯理者得無畏力心合天徳心合地徳心合聖徳心合日月之徳心合星宿之徳心合萬類之徳一切諸法悉皆合徳無傷物性是名究竟大乗功徳衆生虚妄妄受諸有失功德力譬如畫師畫形而非眞形又如聲響響非眞聲當知一切諸法如幻如化非空非有衆生顚倒妄受煩惱煩惱妄生妄成受苦恩愛別離苦無極巳倐忽之間索然都盡魂識飄揚轉增苦惱善男子勿生不信失慈愛力吾爲汝說大人能受天下之辱大徳能受天下之惡何以故大達無妄故能受辱故能受惡所能受者皆是功徳大慧福德莊嚴具足成就復次無爲故能生能長虚無故能體能行澹泊故能受能張寂嘿故能聲能藏恬淡故能聚能散清淨故能神能光精誠故能得能從中和故能化能同當知祕宻眞藏衆經第一無爲養性虚無存生澹泊安身寂嘿者榮恬淡樂志清淨平心精誠守節中和存神草本地生去地而死魚鼈水生離水而死人以氣生去氣而死聖人愛氣守精以爲身寳上無所指下無所揆心無想念意如流水善男子當知一切諸法本性恬澹悉入大乗衆生迷惑不達生靈失大乗道彌年積劫輪轉不悟汝等徒衆各開縁化功徳甚重不可格量爾時善音童子及諸大衆歡喜無量俱發善心而說偈曰天尊顯功徳微妙莫能尋施張遍法界鬱鬱香園林智者巧能入方便種善因愚夫迷日乆自與失爲鄰我等生信行共習大乗津法王王自在解脫脫相親大乗平等道濟度於天人冥心自然合方寸隨日新爾時善音童子及諸四衆說此偈頌讃仰天尊顯揚功徳濟廣衆生所說功徳非功徳是名功徳各各自悟見一赤珠非内非外懸在空中光明映徹照曜諸國無大無小皆同一類俱入珠中不生不滅須㬰之間忽然不見四衆茫然莫知所在各各自視復無所得荏苒之間法界宛然在寳珠中四衆視之復無所得非空非有非長非短非妙非麤非廣非狹離一切相一切相離所説法界非法界而爲法界即是寳珠所說寳珠非寳珠而爲寳珠即是法界當知寳珠不離法界亦不在内亦不在外非内非外非非内非非外言語道斷絶諸漏行如是功徳微妙深逺不可稱説顯誡行品是時元始天尊告諸四衆一切衆生貪著有爲欣生惡死意雖求生由造死業不持誡行假使長壽猶如老樹有何殊别若持誡行死補天官昇仙自在人雖有王公之位苟不持誡死皆重罪無益魂神魂神受苦不可堪忍善男子汝等思惟明奉誡行直心行道吾爲汝說天下萬物無有長存有生有死有成有敗日出則没月虧則滿從古至今誰能長存唯有道徳不生不滅修善積善今日亦善今月亦善今時亦善善善積徳諸行備足善念護持令入法寳誡曰不得盜竊人物不得妄取人財不得妄言綺語不得因恨殺人不得貪嗔癡狠不得慢老欺人不得呪詛毒心不得罵詈髙聲不得訾毀謗人不得兩舌奏佞不得持人短長不得好言人惡不得毀善自譽不得自驕我慢不得畜毒藥人不得投書譛人不得輕慢經教不得謗毀聖文不得恃威凌物不得貪婬好色不得好殺物命不得耽酒迷狂不得殺生淫祀不得燒野山林遊獵不得評論師長不得貪惜財賄不得言人隂事天尊曰略説誡條罪各有報善男子善聽在心今當爲說盜竊人物者死入金槌獄妄取人一錢以上者死入鑊湯獄妄言綺語者死入㧞舌獄因恨殺人者死入五牢大地獄貪嗔癡狠者死入大檻獄慢老欺人者死入酆都獄呪詛毒心者死入八闥獄罵詈髙聲者死入泥犁獄訾毀謗人者死入北寒獄兩舌奏佞者死入火山獄持人長短者死入碓磑獄好言人惡者死入黒暗獄毀善自譽者死入大劔獄自驕我慢者死入寒冰獄畜毒藥人者死入灰炭獄投書讃人者死入黃泉大暗獄輕慢經教者死入障明獄謗毀聖文者死入銅火獄恃威凌物者死入炎爐獄貪婬好色者死入溟泠獄好殺物命者死入無間獄耽酒迷狂者死入渴寒獄殺生淫祀者死入沸山獄燒野山林遊獵者死入分形獄評論師長者死入磨山獄貪惜財物者死入餓鬼獄言人隂事者死入黒水獄如是誡行不得輕犯輕犯之者隨犯輕重如影隨形如響應聲聲大響大聲小響小善惡報應亦復如是善音童子汝等四衆勤行此誡積漸累功證成道果一切法聚悉是誡行略顯數科示爲善否若通一行諸誡無犯人法自在解脫無爲善音童子上白天尊敢問說諸誡行罪業報應如影隨形犯説罪報深淺云何爲犯一誡罪深爲犯多誡罪深若犯一誡深者不應誡多若犯多誡深者初犯一誡應無有罪衆中疑惑唯願天尊分明暁示天尊曰善哉善哉衆生業行千差萬別報對不同廣説誡文隨縁利益若犯誡者隨犯輕重不論一多犯一誡重罪即隨重犯多誡重各各重報若犯輕誡報對亦輕如身長者影即隨長身若短者影即隨短犯誡罪報亦復如是我說雜誡斷諸雜心無雜煩惱又問煩惱是有是無答曰不有不無又問不有不無何名煩惱答曰不有爲有不無爲無於實法中橫計爲有則成煩惱又問正法非有非無云何受此横計若受横計即是有無不名正法答曰正法無相於無相中而報爲有又問法既無相云何於無相中而得爲有答曰妄報爲有此有非有又問此有非有若如是者衆生横計則是正法衆生犯誡亦是正法云何有罪業報應云何有衆生虚妄亦無罪業因果業倒修善得罪造惡得善天尊曰何故作如是疑諸法業正因果無差妙理報應纎芥無遺行善得善行惡得惡譬如種穀生榖種麻生麻因果業倒當知種子不差因果亦爾諸善男女善聽吾言我說正法不離空有而爲正法我說正法不離生死而爲正法我說正法不離煩惱而爲正法我說正法不離去來而爲正法我說正法不離取捨而爲正法我說取捨非取捨而爲取捨我說去來非去來而爲去來我說煩惱非煩惱而爲煩惱我說生死非生死而爲生死我說空有非空有而爲空有當知法無有二亦不一不二不一不二湛然常住何以故衆生業行淨故取捨淨故去來淨故貪欲淨故煩惱淨故生死淨故眞實究竟應無罣礙當知此經最尊最貴三世天尊皆由此經而得成道十方大堅亦習此經而得成道異類國土亦習此經而得成道諸天天帝亦習此經而得成道此經包羅無外所在之處皆受此經而得成業此經威力廣大度諸衆生不可稱說善男女等若能信心受持此經福徳深遠非可譬喻得其邊底爾時天尊在靈解山宣揚正法告諸大衆而說偈曰我說功徳本積劫修苦行不遇眞藏經勤行不退轉無犯諸誡愆後悟無上道皆由在昔因汝等精勤學功徳隨日新妙道非近逺五隂裹追尋行行雖辛苦證理不勞心天尊於是告諸眷屬及大弟子我説半偈顯本因縁人從信生人從解生人從苦行入樂正因善本而立道慧自明一切諸法無有自性畢竟空寂證此理者名爲了因即是正果一切衆生愚癡外想六賊俱生各貪愛著分別世間悉爲邪道爲邪道者心行妄起習繫業因業對相牽生老病死遂無解了無明覆蔽貪愛甚深種種是非罪累増長如是行業煩惱切身十惡報應汝等四衆喜察業因明識縁起善音童子及諸大衆得思微旨悟解道場歡喜讃曰無上天尊眞道眼照法圎淨顯明珠衆生得聞皆悟解離垢無欲等無餘我等徒衆皆利益得見身上八角書觀彼世間皆實相無取無捨湛然居天尊平等説誡行無犯無漏業消除悉皆充滿方丈室幻化自在等空虚天尊積劫修苦行後遇無上大乘轅顯示衆生令深信遊心法界一乗門諸法不生亦不滅自然解脫寂無言爾時善音童子與諸眷屬説偈頌巳歎未曽有大乗經教濟度無涯玄冥隱奥非世能知敢問學行因縁大乗方法衆生根淺惠力不深觸有纒身六情受染如是下劣不識經教不信大乗不受化導雖聞眞藏心由不顧云何方便引誘復次三乗教門引三根性上智生知聞有眞藏自然覺悟證入大乗到天尊所解脫無爲不生不滅印衆經相能出能入巧積方便功徳深逺難可測量中智依文受持誡行漸積功著得入中乗勤苦累階終不覺悟下根衆生唯知貪愛引誘教化捨施外財心貪悋惜無明暗鈍雖預下乗未有功入衆生根性利鈍如此受益不同云何得入大惠天尊曰善哉善哉善音童子得世機宜巧能快問吾爲汝說各各聽受入内思惟至道窅冥絶諸情愛大乗玄妙視聽莫聞一切衆生從道而生從道而滅業縁悉被同貫一門譬如母能生子子懐不孝棄擲其母四向造罪被繋羅網毋思憶之枯腸寸斷子終不覺身自受苦楚痛難當衆生顚倒迷失其本亦復如是魂神受苦楚痛切身自當苦惱大乗玄教隨根布德了自不知雖不覺知隨根度脫一切衆生悉皆受潤在眞藏中舍生奥養出苦入樂不離眞藏衆生迷惑妄想爲有於眞藏中終不覺悟何以故法性眞故於眞受有有是苦聚即是苦惱我說三乗猶如天網廣覆施張隨根利益我觀一切悉是大惠無生無滅無苦無惱去來平等出入平等受業平等苦樂平等三乗平等下根布施受施無受即是平等中根誡行行誡無誡即是平等上根智慧無智無我即是平等衆生受樂樂受無受即是平等衆生業報報業無業即是平等衆生根性殊別别無所別即是平等一切諸法等無所等無所等故名爲大道善音童子汝等勤行教化依此大乗勿生異想即是方便得入大惠法門功徳自在得自在力不生不滅能度衆生滅煩惱業汝等徒衆勿生倒想爾時善音童子及諸大衆聞此語巳歡喜無量不可思議各各伏地稽首奉辭而退无上内祕眞藏經卷之六
