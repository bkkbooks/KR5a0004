  - {type: variant, offset: 13, length: 4003, content: 衆在香林園詣天尊所聽習大乗遂生迷惑敢問一切衆生普受光者云何利益不同受生各異若俱受者根機應等不應有難悟易悟若不等者慧光不周天尊偏說又問衆生要須此經而得成道若無此經終無解脫天尊曰善哉善哉如汝問者以空問空空無所問我所答者以空答空空無所答一切衆生異類差殊諸根不等不等故空空無所等無所等故是名解脫衆生迷惑而不知覺悉有慧光眼瞳不曉本性清淨心識昬迷要須此經開訣耳目耳目明淨照諸法本無差無別當知一切衆生同禀道源悟解先後譬如玄珠遺在赤水種種推求而不能得當知衆生本性空寂非空非有非内非外有心求者終不能得無心不求亦不能得要須方便巧積慧源自然得果若言我說法者則謗正法毀壞善根當知所說非說非說非非說平等一相一無所相善男子汝等内行靜照冀著空有天地成形道徳成經智者悟之仁者行之見其所不見不見其所見知其所不知不知其所知反人常見及人常聞一切有爲無爲悉皆而反如是行者體入大乗證成功徳善音童子及諸大衆聞如是說心地驚疑迷懼失所敢問諸法究竟非空非有云何有法而反得入大乗旣無法者云何證成功徳天尊曰我說一字反覆無端衆生虚妄妄有妄無執妄生迷妄成倒惑我說反者達妄無妄妄有非有妄無非無如是觀者是名反本得入大乗證成功徳又問衆生虚妄虚妄即是無法無法云何可反若無法反云何有大乗可入云何有功徳可證天尊曰如是如是諸法解脫得解脫理名入大乗證成功徳又問諸法解脫名入大乗證成功徳一切衆生不修不學名爲大乗證成功徳禽蟲雜獸不修不學名爲大乗證成功德如是一切諸法名爲大乗證成功徳云何有衆生虚妄云何有衆生顚倒云何有衆生取捨云何有衆生去來云何有衆生差別云何有仙聖化度天尊曰如是如是如我所說諸法具滿一字若有一法不具大惠功徳者則謗諸法毀滅大乗何以故一切衆生行住生卧悉入大乗證成功徳五廕六情悉入大乗證成功德貪癡取捨悉入大乗證成功徳一切有爲無爲悉入大乗證成功徳所說大乗非大乗是名大乗所說功徳非功徳是名功徳諸法微妙自在無爲所有言說皆是名字非眞實道悟斯理者得無畏力心合天徳心合地徳心合聖徳心合日月之徳心合星宿之徳心合萬類之徳一切諸法悉皆合徳無傷物性是名究竟大乗功徳衆生虚妄妄受諸有失功德力譬如畫師畫形而非眞形又如聲響響非眞聲當知一切諸法如幻如化非空非有衆生顚倒妄受煩惱煩惱妄生妄成受苦恩愛別離苦無極巳倐忽之間索然都盡魂識飄揚轉增苦惱善男子勿生不信失慈愛力吾爲汝說大人能受天下之辱大徳能受天下之惡何以故大達無妄故能受辱故能受惡所能受者皆是功徳大慧福德莊嚴具足成就復次無爲故能生能長虚無故能體能行澹泊故能受能張寂嘿故能聲能藏恬淡故能聚能散清淨故能神能光精誠故能得能從中和故能化能同當知祕宻眞藏衆經第一無爲養性虚無存生澹泊安身寂嘿者榮恬淡樂志清淨平心精誠守節中和存神草本地生去地而死魚鼈水生離水而死人以氣生去氣而死聖人愛氣守精以爲身寳上無所指下無所揆心無想念意如流水善男子當知一切諸法本性恬澹悉入大乗衆生迷惑不達生靈失大乗道彌年積劫輪轉不悟汝等徒衆各開縁化功徳甚重不可格量爾時善音童子及諸大衆歡喜無量俱發善心而說偈曰天尊顯功徳微妙莫能尋施張遍法界鬱鬱香園林智者巧能入方便種善因愚夫迷日乆自與失爲鄰我等生信行共習大乗津法王王自在解脫脫相親大乗平等道濟度於天人冥心自然合方寸隨日新爾時善音童子及諸四衆說此偈頌讃仰天尊顯揚功徳濟廣衆生所說功徳非功徳是名功徳各各自悟見一赤珠非内非外懸在空中光明映徹照曜諸國無大無小皆同一類俱入珠中不生不滅須㬰之間忽然不見四衆茫然莫知所在各各自視復無所得荏苒之間法界宛然在寳珠中四衆視之復無所得非空非有非長非短非妙非麤非廣非狹離一切相一切相離所説法界非法界而爲法界即是寳珠所說寳珠非寳珠而爲寳珠即是法界當知寳珠不離法界亦不在内亦不在外非内非外非非内非非外言語道斷絶諸漏行如是功徳微妙深逺不可稱説顯誡行品是時元始天尊告諸四衆一切衆生貪著有爲欣生惡死意雖求生由造死業不持誡行假使長壽猶如老樹有何殊别若持誡行死補天官昇仙自在人雖有王公之位苟不持誡死皆重罪無益魂神魂神受苦不可堪忍善男子汝等思惟明奉誡行直心行道吾爲汝說天下萬物無有長存有生有死有成有敗日出則没月虧則滿從古至今誰能長存唯有道徳不生不滅修善積善今日亦善今月亦善今時亦善善善積徳諸行備足善念護持令入法寳誡曰不得盜竊人物不得妄取人財不得妄言綺語不得因恨殺人不得貪嗔癡狠不得慢老欺人不得呪詛毒心不得罵詈髙聲不得訾毀謗人不得兩舌奏佞不得持人短長不得好言人惡不得毀善自譽不得自驕我慢不得畜毒藥人不得投書譛人不得輕慢經教不得謗毀聖文不得恃威凌物不得貪婬好色不得好殺物命不得耽酒迷狂不得殺生淫祀不得燒野山林遊獵不得評論師長不得貪惜財賄不得言人隂事天尊曰略説誡條罪各有報善男子善聽在心今當爲說盜竊人物者死入金槌獄妄取人一錢以上者死入鑊湯獄妄言綺語者死入㧞舌獄因恨殺人者死入五牢大地獄貪嗔癡狠者死入大檻獄慢老欺人者死入酆都獄呪詛