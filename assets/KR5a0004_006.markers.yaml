毒心者死入八闥獄罵詈髙聲者死入泥犁獄訾毀謗人者死入北寒獄兩舌奏佞者死入火山獄持人長短者死入碓磑獄好言人惡者死入黒暗獄毀善自譽者死入大劔獄自驕我慢者死入寒冰獄畜毒藥人者死入灰炭獄投書讃人者死入黃泉大暗獄輕慢經教者死入障明獄謗毀聖文者死入銅火獄恃威凌物者死入炎爐獄貪婬好色者死入溟泠獄好殺物命者死入無間獄耽酒迷狂者死入渴寒獄殺生淫祀者死入沸山獄燒野山林遊獵者死入分形獄評論師長者死入磨山獄貪惜財物者死入餓鬼獄言人隂事者死入黒水獄如是誡行不得輕犯輕犯之者隨犯輕重如影隨形如響應聲聲大響大聲小響小善惡報應亦復如是善音童子汝等四衆勤行此誡積漸累功證成道果一切法聚悉是誡行略顯數科示爲善否若通一行諸誡無犯人法自在解脫無爲善音童子上白天尊敢問說諸誡行罪業報應如影隨形犯説罪報深淺云何爲犯一誡罪深爲犯多誡罪深若犯一誡深者不應誡多若犯多誡深者初犯一誡應無有罪衆中疑惑唯願天尊分明暁示天尊曰善哉善哉衆生業行千差萬別報對不同廣説誡文隨縁利益若犯誡者隨犯輕重不論一多犯一誡重罪即隨重犯多誡重各各重報若犯輕誡報對亦輕如身長者影即隨長身若短者影即隨短犯誡罪報亦復如是我說雜誡斷諸雜心無雜煩惱又問煩惱是有是無答曰不有不無又問不有不無何名煩惱答曰不有爲有不無爲無於實法中橫計爲有則成煩惱又問正法非有非無云何受此横計若受横計即是有無不名正法答曰正法無相於無相中而報爲有又問法既無相云何於無相中而得爲有答曰妄報爲有此有非有又問此有非有若如是者衆生横計則是正法衆生犯誡亦是正法云何有罪業報應云何有衆生虚妄亦無罪業因果業倒修善得罪造惡得善天尊曰何故作如是疑諸法業正因果無差妙理報應纎芥無遺行善得善行惡得惡譬如種穀生榖種麻生麻因果業倒當知種子不差因果亦爾諸善男女善聽吾言我說正法不離空有而爲正法我說正法不離生死而爲正法我說正法不離煩惱而爲正法我說正法不離去來而爲正法我說正法不離取捨而爲正法我說取捨非取捨而爲取捨我說去來非去來而爲去來我說煩惱非煩惱而爲煩惱我說生死非生死而爲生死我說空有非空有而爲空有當知法無有二亦不一不二不一不二湛然常住何以故衆生業行淨故取捨淨故去來淨故貪欲淨故煩惱淨故生死淨故眞實究竟應無罣礙當知此經最尊最貴三世天尊皆由此經而得成道十方大堅亦習此經而得成道異類國土亦習此經而得成道諸天天帝亦習此經而得成道此經包羅無外所在之處皆受此經而得成業此經威力廣大度諸衆生不可稱說善男女等若能信心受持此經福徳深遠非可譬喻得其邊底爾時天尊在靈解山宣揚正法告諸大衆而說偈曰我說功徳本積劫修苦行不遇眞藏經勤行不退轉無犯諸誡愆後悟無上道皆由在昔因汝等精勤學功徳隨日新妙道非近逺五隂裹追尋行行雖辛苦證理不勞心天尊於是告諸眷屬及大弟子我説半偈顯本因縁人從信生人從解生人從苦行入樂正因善本而立道慧自明一切諸法無有自性畢竟空寂證此理者名爲了因即是正果一切衆生愚癡外想六賊俱生各貪愛著分別世間悉爲邪道爲邪道者心行妄起習繫業因業對相牽生老病死遂無解了無明覆蔽貪愛甚深種種是非罪累増長如是行業煩惱切身十惡報應汝等四衆喜察業因明識縁起善音童子及諸大衆得思微旨悟解道場歡喜讃曰無上天尊眞道眼照法圎淨顯明珠衆生得聞皆悟解離垢無欲等無餘我等徒衆皆利益得見身上八角書觀彼世間皆實相無取無捨湛然居天尊平等説誡行無犯無漏業消除悉皆充滿方丈室幻化自在等空虚天尊積劫修苦行後遇無上大乘轅顯示衆生令深信遊心法界一乗門諸法不生亦不滅自然解脫寂無言爾時善音童子與諸眷屬説偈頌巳歎未曽有大乗經教濟度無涯玄冥隱奥非世能知敢問學行因縁大乗方法衆生根淺惠力不深觸有纒身六情受染如是下劣不識經教不信大乗不受化導雖聞眞藏心由不顧云何方便引誘復次三乗教門引三根性上智生知聞有眞藏自然覺悟證入大乗到天尊所解脫無爲不生不滅印衆經相能出能入巧積方便功徳深逺難可測量中智依文受持誡行漸積功著得入中乗勤苦累階終不覺悟下根衆生唯知貪愛引誘教化捨施外財心貪悋惜無明暗鈍雖預下乗未有功入衆生根性利鈍如此受益不同云何得入大惠天尊曰善哉善哉善音童子得世機宜巧能快問吾爲汝說各各聽受入内思惟至道窅冥絶諸情愛大乗玄妙視聽莫聞一切衆生從道而生從道而滅業縁悉被同貫一門譬如母能生子子懐不孝棄擲其母四向造罪被繋羅網毋思憶之枯腸寸斷子終不覺身自受苦楚痛難當衆生顚倒迷失其本亦復如是魂神受苦楚痛切身自當苦惱大乗玄教隨根布德了自不知雖不覺知隨根度脫一切衆生悉皆受潤在眞藏中舍生奥養出苦入樂不離眞藏衆生迷惑妄想爲有於眞藏中終不覺悟何以故法性眞故於眞受有有是苦聚即是苦惱我說三乗猶如天網廣覆施張隨根利益我觀一切悉是大惠無生無滅無苦無惱去來平等出入平等受業平等苦樂平等三乗平等下根布施受施無受即是平等中根誡行行誡無誡即是平等上根智慧無智無我即是平等衆生受樂樂受無受即是平等衆生業報報業無業即是平等衆生根性殊別别無所別即是平等一切諸法等無所等無所等故名爲大道善音童子汝等勤行教化依此大乗勿生異想即是方便得入大惠法門功徳自在得自在力不生不滅能度衆生滅煩惱業汝等徒衆勿生倒想爾時善音童子及諸大衆聞此語巳歡喜無量不可思議各各伏地稽首奉辭而退无上内祕眞藏經卷之六, YP-C: ''}
