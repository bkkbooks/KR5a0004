  - {type: variant, offset: 9, length: 4170, content: 於大衆中庠序雅歩徃詣天尊諮諸問道爲衆決疑不審下方所有外道衆生甚難教化不信正眞無上大道云何誘引令得信向又云我所說者文字分明世所希有干忤大乘自是爲實復有諸鬼雜神祅魔惑正不識大道復有小乘行者計功立位不信眞經虚玄寂靜復有下根衆生聞而誹謗云何化度天尊所云无大不包无細不入法性平等何故迴向不同諸法差别衆中疑惑所照不深願爲隨根顯令悟解天尊曰汝等徒衆諦聽善思當爲汝説天髙地卑等無差别丘山河海等無差别一切雜類等無差别三清境界下土衆生等無差别邪言惑正等無差别衆生經教等無差别一切諸法爲大空本無等爲等若受塵累名行邪道亦名謗法不名逥向若信大乘乖小乘行是行邪道亦名謗法不名迴向若信小乗乖大乘行是行邪道亦名謗法不名逥向若受衆生祛於三惑是行邪道亦名謗法不名迴向若有衆生不信大乘是行邪道亦名謗法不名迴向若有衆生不信經教是行邪道亦名謗法不名迴向若有衆生説人短長是行邪道亦名謗法不名迴向如是謗法有深有淺若受塵累煩惱未盡不見道源若信大乘乖小乘行心源不明貪善無巳若信小乘乖大乘行取捨不停心闇多惑若受衆生祛於三惑有心求心念念無巳若有衆生不信大乘迹途顚倒失孝慈母若有衆生不信經教愚癡闇塞不聞法音若有衆生說人長短自揚巳善貪愛在懐罪業深重終劫説之亦不能盡又問邪正衆生信行不等行邪道者是名謗法行正道者爲是謗法爲非謗法又云道本虚寂若虛寂爲道者衆生誹法亦是虚寂而爲道本云何名爲謗法若非道本名爲邪行行正道者亦是邪行名爲謗法何以故衆生即是道體行業不同云何即有差别若有差别邪正不同衆生即非道體邪正皆爲謗法云何天尊勤行正道天尊曰何故復作如是疑邪正共同一根解脫由是一門雖同一體非無二源何以故行邪道者顚倒競起煩惱𦆑懐則乖正道行正道者無待無對無寂無滅假名寂滅衆生取捨有待有對妄生爲有即是待對生死業對報應業對善惡業對輪轉業對業報無極邪縁不絶又問道生萬物即是萬物之母母與衆生顚倒與衆生分別與衆生妄想與衆生邪見與衆生取捨與衆生輪轉與衆生業報種種云爲皆是道與若如是者則無善惡可故有衆生顚倒差別若有顚倒差别者天尊所說大乘無人無我無大無小無髙無下無長無短無五常行無六識轉如是説者則是謗法誑惑衆生天尊含笑應諸十方各見天尊一時含笑諸天境界亦復如然雜類衆生普皆歡樂眞藏等衆歎未曽有微妙第一雖知道妙猶不盡其妙源不審妙道難窮未知衆生是妙道不若是妙道則無衆生既有衆生則無妙道四衆皆疑天尊曰妙法無妙云何有衆生可顯又問無衆生可顯云何天尊說法誘引苦有誘引則有衆生云何説云無衆生相信心衆生不逹法性猶自有疑况諸衆生寜得信乎唯願天尊隨根曉示天尊曰我説一字舒善十方一切法界沙塵之數盡然顯了汝等徒衆難悟難聞衆生一相二行而行行之一相衆生一相三行而行行之一相衆生一相四行而行行之一相衆生一相五行而行行之一相衆生一相六行而行行之一相衆生一相七行而行行之一相衆生一相八行而行行之一相衆生一相九行而行行之一相衆生一相十行而行行之一相如是行行逹了慧源悉皆解脫名爲上樂名爲上樂到靈解山不生不滅復次非心不心亦不不心非色不色亦不不色非我不我亦不不我非縁不縁亦不不縁非慮不慮亦不不慮如是行行道眼清淨故具足一切無量功徳智慧成就到靈解山常住安樂樂生三業煩惱益𦆑正性不顯倒惑甚深種種譬諭不自覺知何謂三業一者貪愛思慮百端計劃無巳貪性一發遂惑迷途六情馳騁不可制御自乖行戒二者瞋恚忿發外觸動情瞋恨無巳自乖定行三者癡闇㝠㝠不曉五情纒繞惡業相連億劫無巳自乖慧解此三業受能滅道種復此三業行能種道果何以故一者捨離世問心棲域外行業遍通斷貪心種直至道場名大乘戒二者諸行無深不受不觸慈愛衆生歡喜無量善根解脫名大乘定三者達了衆生五情六觸煩惱業縁顯發無礙逕入道場名大乘慧復次諸善男子此三業者惑成惑敗時由心發一切諸法心則爲本善否由心心不在内亦不在外不近不逺不麤不妙無大無小無長無短不圎不方善否自在爲惡業者業報立至過去亦縳未來亦縳見在亦縳沙塵劫數悉是𡨚家斷諸道種爲善業者道果立至過去亦解未來亦解見在亦解沙塵劫數悉是善因斷諸惡種又問心既非内非外非長非短非大非小絶無有相亦無非相云何善惡立至善至則解惡至則縳唯願天尊慈恩見念衆得明了天尊曰譬如鏡像像形分明如言有者取而不得如言無者像見分明當知非有非無妍醜立見前心後心心心相續雖無相貌善惡則由分别二見誹謗是非毀善譽惡皆是心作名爲凡夫在得失中以失爲失行人修行照本實情無分别相無善惡相無人我相不名凡夫在眞實中以得爲得略説心行得失差殊况諸凡計千差萬别殊雖萬途得之者一又聞得一之時爲是一邪爲非一邪若有一者應有二法若一非一一無所得云何得一天尊曰猶如足字非一非二非縳非解非空非不空所言得一者證虚空理證無所正名爲得一不壞諸法名虚空相虚空之相是名道體亦名功徳如是廣說功德因縁無邊衆眞藏等衆稽首敢問本迹二途云何有二爲本中有迹爲迹中有本若本中有迹有迹應無有本若迹中有本有本應無有迹譬如空有有有無空有空無有云何一時顯其本迹天尊曰實無二義