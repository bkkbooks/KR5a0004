開方使門即迹是本本無有迹無迹無本名爲眞本一切諸法不離本故故名諸法諸法性離故名道本心水澄清見眞實本非眞非假了了分明眞藏等衆名悟大乘歡喜無已而說謁言大乘無虚假廣布於天人利益無邉衆非果亦非因衆生聞悉悟自然解脫身我等勤精進積劫勞苦辛三業定慧本文字裏追尋凡夫迷日乆分别失天津天尊徃徃說方便度衆生三業各各受法内有天經因果微妙相遂成功德林我等諸徒衆未曾聞此音應變諸國土物類盡歡欣㝠功不可測心見實難陳寄語悠悠子努力尋道眞世間非非實離相得遊神眞藏功徳力破惑慳貪瞋四衆皆歡樂證法盡方圎爾時眞藏童子及諸四衆說是偈巳歡喜天尊功德方便説微妙法廣度衆生潜功不宰敢問衆生差殊諸行不等根機淺深云何天尊説言足字未審衆生是足字不若是足字根機應等應悉悟解若非足字天尊說之有何利益唯願天尊不簡雜言随縁爲說天尊答言我說足字諸法共之一切衆生皆是足字悉皆平等雖復千差萬類無非畢竟凡夫迷惑不自覺知教迹漸多方便誘説下根衆生爲説有法覩相生善中相衆生爲說空有若聞空有即生信向上根衆生爲說非空非有亦空亦有非非空非非有聞此説者虚心了悟説雖不同隨縁布德皆是足字應病與藥悟足字者無言無教若病下眼藥者終無差損衆生不信大乘終無悟解是故此經能破衆生煩惱無明闇障能滌衆生離惡垢塵能調衆生生死苦惱能令衆生妻子安樂能令衆生孝事君父能今衆生長命富貴能今衆生得金剛力能今衆生甚多智慧能今衆生慈愛孝順能今衆生不生怖畏能今衆生得法自在能令衆生不生不滅此經功德力重非可譬諭得其邊際又問三乘經教隨化三根稱機布德不審愚癡最下衆生不解布施不識人禮云何化度天尊答言雖指三乘化途無量若能信心恭敬幡花供養抄寫受持功德甚重亦不可量用此捨施功德百千萬分不及其一又問若能如是受持供養者則是上根智慧之士不名愚癡衆生四座顒顒祛疑未了天尊又言有耳有目者悉可提撕非止三乘種種方便愚䝉本性悉在靈解逥向即至此經深妙爲衆經第一光示餘行斷截外魔外魔消滅内行調伏城壍堅固衆賊永斷功德裝嚴具足圓滿一切種智自在解脫十方天尊得一切智慧解無方到靈解山成無上道䆒竟清淨斷諸漏道一切諸法皆爲實相一切煩惱皆爲種智是行人行䖍是功德本汝等四衆證微妙身入祕宻藏出離生死入五濁中化度衆生隨三業行示方便惠所以爾者十方大聖證入妙身皆是煩惱内發不由外來自然㣲妙無形無相復次一切諸法非造作法非生滅法非昔有法非今無法湛寂自然與天尊合德一切衆生聞如是語反生謗心便更起惑雖然要在逆俗功德甚深利益廣遠復次正行修道難一切相印無生理虚妄自斷與道爲一不生不滅無去無來何以故妙道寂滅故寂滅能生生滅能生去來能生動轉能生業行一切諸法悉能生育生育之法相好不同惑優㳺自在惑常生苦惱惑䖏富貴惑居貧賤惑姿容婥約惑形貌醜陋干差萬別種類不同皆是妙道寂滅無爲凡夫不能解了自生顛倒天尊爾時欲顯大乘眞藏妙典說偈頌曰本體不生滅法相自玄通諸受常清淨無爲性自空十方天尊德衆生等共同汝等咸恭敬修行立大功五癊香園宅窅然無始終三業戒定慧無去亦無來道相不可測示見無不該我說方便慧妙法絶三才顯揚功德本世孕是瓊胎能修無上道六識自然開悟法端正慧三毒靡不逥於法得自在萬劫不建災衆生長苦夜不覺年命摧轉輪無窮極欲樂不知哀歎汝愚癡軰不信大乗經棄離眞父母習惡爲因縁不逢善知識無由作福田能行此經者悟解諸法前爾時天尊說此偈已讃揚功德顯諸法相示大乘經無大不包無細不入度諸衆生令入法寳一切衆生善知識等勤行精進習讀此經此經功德最大爲諸法本爲法舟航爲法梯橙能疾能速能救諸病爲大醫王種種救治隨病與藥無不差愈汝等徒衆廣化衆縁觀其業趣勿生機宜得性順從夫性違戾得性恬愉失性憂惱又問不審恬愉之性云何修行天尊答言五常之行皆悉恬愉實無相尅衆生顛倒貪欲取捨失恬愉行皆悉相尅情深外塵失恬愉行名爲相尅五隂不通失恬愉行名爲相尅能行布施名爲恬愉能行持戒名爲恬愉能行智慧名爲恬愉能行讀誦名爲恬愉能行書寫名爲恬愉能行供飬名爲恬愉能行受持名爲恬愉能行講說名爲恬愉能行觀行名爲恬愉能行逺離名爲恬愉我說布施非布施名爲恬愉我說持戒非持戒名爲恬愉我說智慧非智慧名爲恬愉我說讀誦非讀誦名爲恬愉我說書寫非書寫名爲恬愉我說供養非供養名爲恬愉我說講說非講說名爲恬愉我說諸行非諸行名爲恬愉我說諸法非諸法名爲恬愉我說修道非修道名爲恬愉我說一二非一二名爲恬愉我說眞藏非眞藏名爲恬愉我說本性非本性名爲恬愉我說譬諭非譬諭名爲恬愉我說小乘非小乘名爲恬愉我說大乘非大乘名爲恬愉恬愉之行非大非小非長非短非廣非狹非去非來亦非色相亦非聲相亦非觸相又問恬愉之體是道體否天尊答言一切諸法皆是道體一切諸法皆是恬愉雖有二名而爲一體我說一體非一體名爲一體善男女等勿取文字勿著語言文字性離離相修行言語道斷斷相修行心識䖏滅滅相修行五廕性空空相修行三業性淨淨相修行六識常住住相修行四大常通通相修行能如是行功德廣慱濟無邊衆度生死海到靈解山神通自在爾時眞藏童子及諸四衆稽首讃歎善哉善哉天尊深智聞顯大乘微妙之義我等徒衆各恬心源哀念深逺㝠功濟度非是二乘之所能知又於諸法相中顯大慧源成無上道被諸來生悉令易悟大乘平等等一切相