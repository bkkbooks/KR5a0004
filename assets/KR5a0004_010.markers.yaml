  - {type: variant, offset: 2248, length: 321, content: 理我禀受形四妙爲本五廕成相遣我行行先觀四妙遊歴五成五成之相窅窅㝠㝠變化出没不住生生反源守一照理明明此時覺悟諸法平等一相無相䆒竟寂滅無初中後汝等四衆廣開法門除五垢行斷四縁愛三惑得除一慧能通六聦明徹映照内外如琉璃山無表無内皎然明淨慧解無窮衆生不曉自懐我𢢔煩惱䨱蔽不能顯了猶如泥中玉䖍不見終無汙染汝等四衆各勸修行勿生外想衆生顚倒迷惑世間躭著五慾以此爲樂謂言不死須㬰之間百病具生惑頭眩風病惑內疾充心惑手脚不遂惑瘖瘂聾盲如此病至求死不得苦腦自嬰妻子看守經年累月復無孝心如此怨報苦痛切身不可歎說若身死後名係三官魂神被縳考對幽牢長夜之中不見日月受苦報對永無期限妻子欣然不知不覺汝等觀察前後因縁明瑩身心逹三世因了三世果善知衆生根性差别隨分自在從無量劫受身定位, CK-KZ: ''}
