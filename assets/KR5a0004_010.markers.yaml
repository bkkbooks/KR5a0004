  - {type: variant, offset: 7, length: 9, content: 卷之十洪十七䆒竟品, CK-KZ: 第一無爲養性虛無存生澹泊安身寂默養營恬淡樂志淸淨平心精誠守節中和存神草本地生去地而死魚鼈水生離水而死人以氣生去氣而死聖人愛氣守精以爲身寶上無所指下無所揆心無想念意如流水善男子當知一切諸法本性恬淡悉入大乘眾生迷惑不達生靈失大乘道彌年積劫輪轉不悟汝等徒眾各開緣化功德甚重不可格量}
