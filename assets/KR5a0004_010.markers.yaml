  - {type: variant, offset: 1210, length: 171, content: 來衆此經无量劫來常存不壞神德㣲妙廣布威嚴生天立地造化无端汝等勸化受持供養書寫流通功德甚重福報無窮若有誹謗不信此經見世招禍祅邪惡鬼不意而生汝善觀察惑貧惑賤惑疾惑病惑苦惑惱惑聾惑盲惑瘖惑瘂皆由縁業報應不差惑前惑後宜各愼之修身立行有五福德何謂五福德勤行恭敬勤行慈悲勤行忍辱勤行精進勤行布施何謂恭敬恭敬有二一者覩相恭敬外形人見則信二者當照本性皎然等眞, CK-KZ: 大眾得思微旨悟解}
