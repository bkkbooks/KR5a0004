  - {type: variant, offset: 2573, length: 1, content: 與, CK-KZ: 印眾經相能出能入巧積方便功德深遠難可測量中智依文受持戒行漸積功著得入中乘勤苦累階終不覺悟下根眾生唯知貪愛引誘教化捨施外財心貪吝惜無明暗鈍雖預下乘未有功入眾生根性利鈍如此受益不同云何得入大惠天尊曰善哉善哉善音童子得世機宜巧能抉問吾爲汝說各各聽受入內思惟至道窅㝠絶諸情愛大乘玄妙視聽莫聞一切眾生從道而生從道而滅業緣悉被同貫一門譬如母能生子子懐不孝棄擲其母四向造罪被繫羅網母思憶之枯腸寸斷子終不覺身自受苦楚痛難當眾生顛倒迷失其本亦復如是魂神受苦楚痛切身自當苦惱大乘玄教隨根布德了自不知雖不覺知隨根度脫一切眾生悉皆受潤在眞藏中含生奥養出苦入樂不離眞藏眾生迷惑妄想爲有於眞藏中終不覺悟何以故法性眞故於眞受有有是苦聚卽是苦惱}
