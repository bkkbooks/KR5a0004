  - {type: variant, offset: 2585, length: 345, content: 亦復如是汝等要須先習此經悟諸縁理何以故此經正印通印諸法顯物妙心眞實不二無虛假說是一相門圎滿具足修行至此堅固不退滌蕩無爲外道羣邪自然磨滅此經神力爲大法輪運載衆生輪轉不絶猶如日月懸照四方盲者不覩眞經妙性亦復如是衆生顚倒煩惱覆蔽不見正經自生誹謗失愛慈母眞藏等衆稽首伏地上白天尊衆疑不了敢問衆生等天尊性無差無則爲衆生性等天尊相爲衆生相等天尊性若相等者衆生應見若見尊相則無顚倒亦無煩惱亦無誹謗亦無是非亦無生死云何衆生顚倒不了若性等者相則不等性相則別衆生有相則無有性天尊有性則無有相若相即性性即是相衆生即是天尊圓應天尊即是衆生執著如此疑惑願垂誨示天尊歡喜讃歎善哉巧能問義於衆得聞譬如種樹根深枝盛離枝無根離根無枝衆生性相亦復如是離相無性離性無相性不可見則相非相非非相相不可見則性非性非非性等我性者則是等相, CK-KZ: ''}
