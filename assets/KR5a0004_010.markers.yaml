  - {type: variant, offset: 978, length: 0, content: '', CK-KZ: 善音童子上白天尊敢問說諸戒行罪業報應如影隨形犯戒罪報深淺云何爲犯一戒罪深爲犯多戒罪深若犯一戒深者不應戒多若犯多戒深者初犯一戒應無有罪眾中疑惑唯願天尊分明曉示天尊曰善哉善哉眾生業行千差萬别報對不同廣說戒文隨緣利益若犯戒者隨犯輕重不論一多犯一戒重罪卽隨重犯多戒重各各重報若犯輕戒報對亦輕如身長者影卽隨長身若短者影卽隨短犯戒罪報亦復如是我說諸戒斷諸雜心無雜煩惱又問煩惱是有是無答曰不有不無又問不有不無何名煩惱答曰不有爲有不無爲無於實法中橫計爲有則成煩惱又問此有非有若如是者眾生橫計則是正法眾生犯戒亦是正法云何有罪業報應云何有眾生虛妄天尊曰何故作如是疑諸法業正因果無差妙理報應纎芥無遺行善得善行惡得惡譬如種穀生榖種麻生麻當知種子不差因果亦}
