  - {type: variant, offset: 0, length: 2, content: 无上, CK-KZ: 及諸仙眾在香林園詣天尊所聽習大乘遂生迷惑敢問一切眾生普受光者云何利益不同受生各異若俱受者根機應等不應有難悟易悟若不等者慧光不周天尊曰善哉善哉如汝問者以空問空空無所問我所答者以空答空空無所答一切眾生異類差殊諸根不等不等故空空無所等無所等故是名解脫眾生迷惑而不知覺悉有慧光眼瞳不曉本性淸淨心識昏迷要須此經開抉耳目耳目明淨照諸法本無差無别當知一切眾生同禀道源悟解先後譬如元珠遺在赤水種種推求而不能得當知眾生本性空寂非空非有非}
  - {type: page-break, offset: 0, content: '', id: KR5a0004_CK-KZ_02p048b, image: JY004/CK-KZ_JY004_02p048b.png}
