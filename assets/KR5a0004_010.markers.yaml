  - {type: variant, offset: 1208, length: 0, content: '', CK-KZ: 我說半偈顯本因緣人從信生人從解生人從苦行入樂正因善本而立道慧自明一切諸法無有自性畢竟空寂證此理者名爲了因卽是正果一切眾生愚癡外想六賊俱生各貪愛著分别世間悉爲邪道爲邪道者心行妄起習繫業因業對相牽生老病死遂無解了無明覆蔽貪愛甚深種種是非罪累增長如是行業煩惱切身十惡報應汝等四眾善察業因明識緣起善音童子}
