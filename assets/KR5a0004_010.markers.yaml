  - {type: variant, offset: 1382, length: 298, content: 法行此恭敬名爲正解何爲慈悲慈悲亦有二一者憐愍哀念衆生二者慈能破有樹立行此慈悲名爲度物何謂忍辱忍辱亦有二一者惡業外來觸巳心能懐忍不生怨恚二者无我外无塵累得法自在行此忍辱名爲等性何謂精進亦有二種一者專精定心執志欲人敬已二者内行照物妙心無人我相無去來相常行常照證果不差名爲精進何謂布施亦有二法一者財施受用不周功德不具二者法施懐在胷中慧無不普此之功德心行不等有深有淺若印法者觀理則住名爲大乗最勝功德希有難聞若有不印者縳在色聲名爲小乘辛苦累劫證因受果雖得少分終無解脫復有最下愚癡衆生不知恭敬不知慈悲不知忍辱不知精進不知布施如此等類難可化諭不可思議汝等聽受而聽受之是時眞藏等衆聞此妙說利益甚深難可譬諭而說偈言, CK-KZ: 場歡喜讚曰}
