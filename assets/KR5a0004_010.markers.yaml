  - {type: variant, offset: 3, length: 1, content: 祕, CK-KZ: 非外有心求者終不能得無心不求亦不能得要須方便巧積慧源自然得果若言我說法者則謗正法毀壞善根當知所說非說非說非非說平等一相一無所相善男子汝等内行靜照冀著空有天地成形道德成經智者悟之仁者行之見其所不見不見其所見知其所不知不知其所知反人常見反人常聞一切有爲無爲悉皆而反如是行者體入大乘證成功德善音童子及諸大眾聞如是說心地驚疑迷懼失所敢問諸法究竟非空非有云何有法而反得入大乘旣無法者云何證成功德天尊曰我說一字反覆無端眾生虛妄妄有妄無執妄生迷妄成倒惑我說反者達妄無妄妄有非有妄無非無如是觀者是名反本得入大乘證成功德又問眾生虛妄虛妄卽是無法無法云何可反若無法反云何有大乘可入云何有功德可證天尊曰如是如是諸法解脫得解脫理名入大乘證成功德又問諸法解脫名入大乘證成功德一切眾生不修不學名爲大乘證成功德如是一切諸法名爲大乘證成功德云何有眾生虛妄云何有眾生顛倒云何有眾生取捨云何有眾生去來云何有眾生差别云何有仙聖化度天尊曰如是如是如我所說諸法俱滿一字若有一法不具大惠功德者則謗諸法毀滅大乘何以故一切眾生行住坐臥悉入大乘證成功德五陰六情悉入大乘證成功德貪癡取捨悉入大乘證成功德一切有爲無爲悉入大乘證成功德所說大乘非大乘是名大乘所說功德非功德是名功德諸法微妙自在無爲所有言說皆是名字非眞實道悟斯理者得無畏力心合天德心合地德心合聖德心合日月之德心合星宿之德心合萬類之德一切諸法悉皆合德無傷物性是名究竟大乘功德眾生虛妄妄受諸有失功德力譬如畫師畫形而非眞形又如聲響響非眞聲當知一切諸法如幻如化非空非有眾生顛倒妄受煩惱煩惱妄生妄成受苦恩愛别離苦無極已倐忽之間索然都盡魂識飄揚轉增苦惱善男子勿生不信失慈愛力吾爲汝說大人能受天下之辱大德能受天下之惡何以故大德無妄故能受辱故能受惡所能受者皆是功德大慧福德莊嚴具足成就復次無爲故能生能長虛無故能體能行澹泊故能受能張寂默故能聲能藏恬淡故能聚能散淸淨故能神能光精誠故能得能從中和故能化能同當知秘密}
