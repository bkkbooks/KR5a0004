  - {type: variant, offset: 26, length: 3272, content: 林屋山彌齡積劫餐芝服餌吐納導養遂得長生爲地仙道不悟大乗而無解脫仙靈於是伏地頓首上白天尊乆聞眞藏妙經在靈解山濟生度死斷煩惱際排百劫魔蕩千祅惑慈恩普照潤被蒼生諮論請益唯願天尊垂見恩念是時天尊坐五色瑠璃寳座在靈解山去地百丈宣揚正法祕宻眞藏復有鬱蕙及風名香散布諸法悉皆利益一切蝡動有識含生無不受潤四方來衆自然悟解復能成就下方穢雜國土裝嚴妙麗竒特希有於是天尊告諸仙曰汝等徒衆積習小乗業縁難斷吾今爲汝宣揚大乗恐驚怛汝何以故妙絶心源見者難矣若欲求者先斷三惑何謂三惑一者心惑貪生二者情惑財色三者意惑善惡除此三惑可以求道復有一行爲道根本萬行之先何謂一行不住世問不離世間不住空有不離空有不住人我不離人我不住因果不離因果不住身心不離身心常行實道如是行行常得解脫岀離生死仙靈於是伏地稽首上白天尊取問行比一行依何所行天尊曰依舊文字又問初學小乗累年積劫不識道源云何是舊答曰不生心是又問不生心者則是無法無法云何得名舊字答曰心行處滅斷煩惱際得無爲理證此理者無生無滅究竟道場功徳具足則名舊字又問心行處滅誰斷煩惱誰證無爲誰知寂㓕若知寂滅證無爲者則是有法有法遷移常變不住以不住故則是無常云何得名舊字諸疑不了願重告示天尊含笑五色煥明彌冠十天脫衆色像歡喜答曰善哉善哉汝所問者爲衆决疑開生靈㫖吾爲汝説諦聽善思分明易解我所顯者法無自性無自性故皆是舊字爾時仙靈及諸從衆聞此大乗心開意解喜恱難勝我等累劫艱辛遠求彌失今聞大乗各歸本國自在無爲天尊又告諸善知識勿生外想何以故一切諸法皆是舊字若言諸法有生滅者則謗諸法是名邪見亦是外道亦名分别亦名得失亦名顚倒亦名人我若言諸法無生滅者則壊諸法亦名邪見亦名外道亦名分别亦名得失亦名顚倒亦名人我何以故一切法本清淨究竟非空非有非非空非非有即此法性自在無礙名無上道故名舊字亦名正經亦名功徳不壞諸法名無上道不壞是非名爲舊字不壊生死名爲正經不壞去來名爲功徳不壞取捨名爲法寳不壞人我名爲定慧如是妙法名大生死名大去來名大是非名大人我名大取捨名大彼此何以故法本無窮終日說之亦不能盡譬如大海百川所住無増無減大乗經典功徳微妙亦復如是略顯譬喻百千萬分不及其一此經功徳不可格量復次諸大弟子及諸仙等初學小乗繫業功重何由可捨聞此大乗心不能受勿生悔恨失功徳本我懐慈念如母愛子何以故法無斷故法清淨故法智慧故法解脫故一念相違善根悉斷母愛子者亦復如是氣氣相續念念不移無時可捨兒子不孝自棄其母逃走向外不顧其母衆生迷惑亦復如是不懐恩愛失孝慈母遠離善道爾時仙靈稽首無上尊稽首無上法稽首天尊門弟子有幸得遇大乗逢善知識歡喜踊躍歎未曽有昔學小乘累年辛苦不離生死不離是非不離煩惱不離恩愛不離攀縁不離人我不離分别不離斷常如是苦惱永無解脫今悟大乗豁然無滯復次一切衆生諸根不等云何得入大乗天尊答言悉入大乗又問若不等法入大乗者云何有衆生修道云何有衆生善惡云何有聖人教化若有衆生行善惡者則諸法不可以不等故大乗不等大乗不等故云何悉入大乗天尊答言大道無方差殊悉正衆生顚倒悉入大乗衆生善惡悉入大乗衆生處在其中自迷不曉以不曉故自受爲有有法業成輪迴被縛失大慈道又問善惡名異而俱得入大乘者眞俗名異而俱得入小乗若眞俗名異而非小乗者云何善惡名異俱入大乗答曰善惡二名眞俗何别大乗等於小乗何有大小殊異又問若如是者大小一者相反而不同亦應大小二體殊異非俱有若二體俱有而不異者二名亦應俱小而無大云何悉入大乗答曰大小二乗相對而得名實無二體而可顯又問大小二乗相對而得名則是互從若大從小而得名者大應從小而名小若小從大而得名者小應從大而名大云何大小二名相對而顯天尊答曰相對顯者藥病相破衆生二心俱無所得於無所得横生顚倒分别二見善惡差殊又問若如是者善生之時惡名應滅惡生之時善名應滅云何二名一時俱顯天尊曰如是如是善名若生惡名則滅惡名若生善名則滅仙靈曰若如是者惡名應通三世過未亦應是惡若過未非惡者見在云何有善惡更相互起天尊曰過未既無見在互起亦無所起云何得有善惡名起又問善惡二名俱無體者善惡生時亦應有體各曰善惡生時各無名體又問善惡二名而不同者不得二名俱無其體二名既無體者惡名應是有體答曰有無所有又問惡名無體而是無者亦應善名有體而是有有天尊曰善惡二名而無二體一相平等無所善惡無所善惡究竟清淨一切諸法悉得自在無大無小無長無短究竟解脫諸善男女等勤行布施勤行持戒勤行精進勤行慈悲勤行忍辱勤行智慧一切諸法名大道場未來布施未來持戒未來精進未來慈悲未來忍辱未來智慧功德具足不可思議若有善男女等深信大法誦念此經功德薰天不可格量若有人受持供養爲人講説流通智慧猶如日光並照不輟智慧相傳潤及七祖悉令解脫三界諸天及諸草木塵沙等數比此功徳萬分不及其一如是祕宻眞藏難可覩聞自非宿福功徳深厚不得聞見諸仙等衆聞此大乗勤行精進宣告未聞若不流通諸縁頓絶遏塞道源彌年積劫永離善因汝等各各淨心勿生不信誹謗大乘自招重考我從無量劫來修行不懈從身至身非可