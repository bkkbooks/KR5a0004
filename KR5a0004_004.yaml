front:
  text: 無上內祕真藏經卷之四洪十一
  hash: sha256:6d70d3ae3b50fd3c76241045717893bb76b5174ff62d29f2ba533ee00f3a33e4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0004_HFL_004-001a, image: hfl/0015/0015-004.png}
body:
  text: 辨相明部袠品是時元始天尊恬然安靜在靈解山遍施功德示衆經相顯真道源一切諸法性相空寂無生無滅何以故法本微妙功德深遠衆生迷惑信法不淳自生謗毀失三寶源何以故煩惱障深慧源不曉輪轉三塗永無解脫爾時善明童子聞是語巳上白天尊今日侍座歡樂難勝敢問天尊衆經名相其數幾何為有部袠為法界總名愚情不了唯願天尊分别為說天尊曰善哉善哉子之所問正得機宜一切諸法並是經目無內無外非長非短微妙清淨常住不壞何以故法性空故愚人淺識不悟大道失真常性迷惑正經示為部袠一者上清二者妙真三者太一四者妙林五者開化六者仙人七者黃林八者上真九者道教十者上鍊十一者上妙功德十二者道德此十二部經藴在大洞玉清境藏中無毀無壞無生無滅湛然常住遍衆妙門一者洞玄二者元陽三者原辰四者大劫五者上聞六者內音七者鍊生八者靈祕九者消魔十者無暑十一者案摩十二者上通此十二部經在大洞上清境藏中微妙清淨為諸天根本萬有之基一者太清二者徹視三者集仙四者洞淵五者內祕六者真一七者集靈八者中精九者無量十者集宫十一者黃庭十二者小劫此十二部配屬大洞泰清境藏中濟生度死為萬法舟航此三清奧內真藏之中示有名跡顯衆妙經包羅無外妙入細微若有人能受持書寫講說讀誦此人功德不可思議非譬論格量得其邊際何以故金口所說無虛假故一切諸仙聖道未有不由此經而成道者何以故此經微妙具衆經目諸天童子大力鬼神金剛師子共相衛護不得輕泄若有誹謗不信此人即得重病前業受報今暫為人致生誹謗不信大乘後死當入黃泉長處暗獄無有解脫善明童子汝等徒衆深思此經勿生不信隨邪見道何以故無信故信不深故無慧故慧不深故無解故解不深故無思故思不深故無定故定不深故無通故通不深故無絶故絶不深故無便故便不深故無證故證不深故無妙故妙不深故無道故道不深故汝等徒衆歷劫艱辛學小乘行終無得道何以故諸法解脫有繫相達動則乖所失正道源善明童子伏受教言未曾所說今日所說未曾所聞今日所聞未曾所見今日所見四座歡喜衆兆咸寧多所不解敢問天尊諸經部袠統攝諸法為止其數為無數耶若亡數者不攝諸法若無數者則無部袠云何數有三十復有六名既有數者數則有窮何能妙微濟窮苦厄衆所未了唯願天尊隨緣顯示天尊含笑遍體光明照諸國土無極世界並皆應見不動本國到靈解山聽天尊說天尊曰汝所問法未解經旨吾為汝說一切諸法普是經目衆生愚暗不曉本源失真常道分别為說假示衆經顯諸部袠隨緣為釋或說大乘或說中乘或說小乘或於大乘而得悟解或於中乘而得悟解或於小乘而得悟解悟解之理絶三乘跡當知諸經盡妙非數非非數非大非非大非中非非中非小非非小雖止部袠妙入細微濟沉溺苦略顯其數示者指歸若能悟解本微化見究竟圓滿了逹諸法無取無捨無貪無愛無癡無欲無瞋無喜無殺無盜一相平等平等之理隨分功德各各具足慧解無窮衆生不曉自相違犯譬如油能燃燈燈明自煎油盡燈滅衆生迷惑亦復如是自造自報如影隨形形直影端形斜影曲諸法業報果皆從因一切衆生無有行者云何見道譬如種植種穀穀芽則生不種榖者無穀無芽云何得榖衆生因果亦復如是不種善因亦無善果無善果故則惡因生生長惡果惡果生長業業相因因果不絶彌瀹三界墮諸惡道後生人中永無人禮云何信道云何行道云何悟道何以故無善因故無智慧故善明童子及諸四衆諦聽善思無狐疑想此經深妙最尊最貴諸天神聖無不敬重汝等徒衆宿緣有幸得預知聞入功德所無以為論善明童子伏受教㫖諸疑不了敢問此經等一切諸法無有分别既無分别云何說此經最尊最貴若獨尊貴即不等法既不等法則有差别有差別故則有優劣有優劣故則有貪欲有貪欲故則有生死有生死故則有愛念有愛念故則隨邪見云何得道天尊曰經等諸法諸法等經道等諸經諸經等道道等生死生死等道道等貪欲貪欲等道道等恩愛恩愛等道道等去來去來等道道等富貴富貴等道道等貧賤貧賤等道道等愚智愚智等道道等畜生畜生等道道等禽蟲禽蟲等道如是等故等無所等云何諸法而有差别善明童子上白天尊云道等無所等不審一無所等非一等不答曰非一無等又問非一無等云何名道答曰非道為道又問非道為道是真道耶答曰非真道也又問云何非真答曰諸法無二非真非俗非大非小非長非短衆生愚暗障翳日月常卧不起如盲者不覩如聾者不聞如此經者億千萬劫不可得聞况能了解吾昔於靈解山宣揚此經時此座主名曰逹慧廣延徒衆四方雲集到靈解山次等而坐供給衣食並皆充足功德遍施無飢無渴爾時十方大地悉皆震動師子猛獸並共護持有一賢者名曰法才心樂道德父為國王禁制不得自在泣涕交流我生何罪心志不遂唯願天尊聖道憐愍愚心今身不果願我後生遇見天尊教我出家學大乘道發願巳後常行慈心晝夜念道今得遇我顯揚大乘習無漏法善明童子及諸大衆當知今者真藏童子即是昔日法才是也法才心願久逺始得見聞當知此經尊貴理趣深逺難可卒聞况今淺議能得信解爾時真藏童子於座而起稽首上白天尊小子有幸得悟大乘昔日雖在聾俗心願不輕當時不遂道降無差今遇天尊顯大乘道施無上藥悟解諸法了逹宿因證無生法深思慶幸難可諭知不審天尊此經方便後學其法云何為簡而授為普度之天尊曰善哉善哉汝慈悲行自度度他接續方來為法梯磴如是功德廣博難稱此經大乘無大不包無細不入濟沉溺苦普救蒼生何有簡法真藏童十稽首復問不審一切衆生信心不等各由宿因修善行業積劫纍功而成道果若不修善而得道者則無因有果無果有因果業顛到故修善者應墮地獄作惡者應得生天又云普度衆生濟沉溺苦如是之理衆生不修經自度之得成道果天尊曰大乘平等普濟蒼生盡虛空際譬如日月乘天普照而盲者不覩非日月不照又如大地能生隨緣而種皆得果實而愚者不種非地不生又如慈母愛子子而不孝非母不念當知此經亦復如是皆須供養泱其眼目眼目明淨得見本源遊塵永滅如是因淨果淨因即是果果即是因因果一相平等無二無二者非因非果而為道果非髙非下而為髙下非長非短而為長短非見非聞而為見聞非香非味而為香味非智非德而為智德非經非道而為經道非心非想而為心想如是逹觀證法生靈善解護持功德具足汝等徒衆勤心學行修無上道勿信邪言受無漏業疾病將至憂惱萬端欻爾之間索然命盡永不自覺終身迷惑輪轉三塗長離善道爾時真藏童子及諸四衆聞是語巳歡喜讚言天尊在靈解說法教天人顯揚諸經相四衆並來尋功德無不普非長非短因三清斷四惑道德隨日新經敷滿法界部袠示關津我等諸徒衆與道為善瞵斷諸漏永盡惡業不能侵積善無畏力自然功德林天尊巧能說施藥通流布愚者不能飲智者餐甘露聾盲自不見巧說終無悟大乘難思議寂然無不度爾時真藏童子及諸四衆說此讃巳功德廣逺非可歎說我等徒衆共讃法王顯天尊德終劫說之亦不能及敢問天尊經寶次第功德階級何者為先早證果者何法最易唯願天尊慈悲為說衆中優劣有難悟易悟數請繁重觸冒尊顔天尊曰往古無量劫時有一仙人名曰仙靈不信大乘常習小道長齊苦行隱在山林眼餌餐松學他仙道纍劫率苦道不可階終無解脫雖得延年益壽不必三便沉瀹在苦真藏大乘經典包羅無外細入毫端行內行者悟解須臾諸經部袠示相凡愚功德因緣隨方引誘冥心內照真趣道場絶諸漏相無先無後無內無外無階無級功德浩蕩重於法界法界珠方無內無外無視無聽無思無想隨分功德功德具足無出無入無去無來汝等四衆勿疑功德經寶無寶無差教迹淺深布張得所何以故法性真故不受塵故若無慧解法性不通六情受染則生六塵不滅心識不住念念相摧習業既多輪回五道煩惱憂懼疾病逼身父子恩情索然命盡魂神流漂墮三惡道如是苦痛不可思議善男女等勤行精進勿生懈怠各發善心修無上道功德莊嚴則六情不染六情不染則六塵淨六塵淨故則六識通六識通故智慧具足則成道果成道果巳得無畏心究竟平等了逹諸法縱容自在無餘憂無餘喜無餘樂無餘苦無餘貪無餘愛無餘惱無餘瞋無餘思無餘想無餘視無餘聽無餘觸無餘慱無餘取無餘捨無餘增無餘念得法自在名功德林是為真道善男子等汝等四衆發大乘心悟諸餘理常行四念度諸衆生濟窮苦厄福德無量不可稱說爾時真藏童子及諸四衆聞如是說歎未曾有歡喜作禮而作頌曰法王慧澤無邊底說法無量度衆生跛躃聾盲皆自得五欲四倒坦然平我等徒衆欣歡恱悟入大乘無有盈生死變化無轉動浸溺稽天而不驚法王法力猶方寸大智大行等生露天尊廣逺慈悲力遍灑微塵成甘露衆生受潤猶不知迷途造惡終不悟我等善行方便慧各各勸誘流傳布慧日慧音音不絶愚者漸染諸根祚是日真藏童子及諸四衆讃誦天尊顯功德力遍法無間非可譬諭得其根際如是功德不可思議天尊曰一切諸法皆是三世法身身有三世慧眼若無慧眼云何識别既無識别喪我本身迷惑諸法即是顚倒顚倒既見則成煩惱煩惱習業苦痛切身生死輪回終無解脫諸善男子淳謹行業勿令二心毀謗賢良反善作惡兩舌傷人如是罪報苦毒難勝真藏童子及諸四衆聞此妙音歡喜無量敢問天尊三世慧眼為一開三為三合一若一為三為三無一若三為一為一無三云何一有三慧若一而有三者亦應一眼而有三身如是疑惑唯願天尊善別為說天尊曰善哉善哉如汝所疑問難諸法無量功德無量或一為三一三無體或三為一三一無名或一眼成無量形或一形成無量眼如是方便功德不可思議所云一為三者並是為緣顯無明障緣眼障滅三一非真何以故要由此經此經能開慧眼有利益故一切仙聖皆由此經而成道果諸善男女吾念羣生如母愛子化導誘引懇志殷勤故說此經分明委悉真實要義顯然易解若復有人得聞此經信心恭敬諸仙童子大力善神自然衛護當此之時國王帝主受持此經一國男女無有夭傷國富人豐兵災不起風雨及時萬人安樂當知此經有大神力功德廣逺非可譬喻天尊於是而說頌曰大乘平等教普化諸衆生非外亦非內功德坦然平愚人不信法智者見公驚悟解真藏理法界自然成我非形色象法性盡無名汝等虛嗟詠心識不能明天尊說此頌巳告諸四衆大力神王金剛師子善念護持修行正法爾時真藏童子及諸四衆聞此妙音神䦕意解歡喜受持各守一元修無上道天尊曰成道果巳寂然無我究竟清淨清淨微妙能生諸法諸法各得自生自生各得無滅無生無生無滅自在法王功德具足一切衆生愚暗不通閉塞六情諸根受染染著迷惑迷惑相傳遂不覺悟輪回五道不信大乘何以故一切衆生受有為樂云何能捨假使捨有即取空法取空為空空不離有有不離空空有二名繫業縛身云何得出超入道源真藏童子敢問天尊空有二名是道體不是真空不是妙理不是清淨不是究竟不是寂滅不若通是者云何有縛天尊曰善哉善哉如汝所問甚得機緣空有二名雖是道果究竟真空衆生不曉染有受著即非道果何以故一切衆生究竟清淨非空非有非長非短若受相者則壞正真即乖本所即非道果何以故衆生非空非有云何有知空有云何有知道性云何有知正法云何有知究竟真藏童子及諸四衆聞比妙法各自思惟稽首而退無上內祕真藏經卷之四
