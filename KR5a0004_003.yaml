front:
  text: 无上内祕眞藏經卷之三洪十
  hash: sha256:0fd4a0e5e2fe763861bf00fc3578ad155cc4549cf196068f2a8b555a1984fb27
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0004_HFL_003-001a, image: hfl/0014/0014-156.png}
body:
  text: 解脫品是時元始天尊遊居濟生國土檀林園中與諸眷屬四方雲集無量等衆各各莊嚴到檀林園聽天尊說爾時天尊在虚空中端然不動莊嚴妙麗坐師子座宣掦正法時善明童子在大衆中忽然而起稽首道前上白天尊大慈希有善度羣生念諸徒衆令發善心修无上道不審行何行觀河法調理身心天尊曰善哉善哉如汝所問濟生國土宣揚正法度諸衆生汝今諦聽吾爲汝說善男女等各發善心修无上道調伏其行滅諸魔賊守一濟生平等無二作如是行作知是觀一切羣生有識無識有形無形皆悉正慧成元上道如是成道無量法界諸天品𩔗羣生實無羣生得成道者何以故若有羣生可行可觀有身相者有滅度者有成道者有失道者即壞世法所謂入諸法界而行智慧入諸煩惱而行智慧入諸生死而行智慧入諸貪愛而行智慧入諸國土而行智慧入諸山林而行智慧入諸異類而行智慧入諸非法而行智慧入諸無間而行智慧一切諸法微妙深逺無入而入此之功德不可思議善明童子汝等云何五色六情四惑可求得不可以有身證成道不可以有相求無相不可以衆生求道性不不也天尊天尊曰一切法相皆非法也若鑒諸法寂滅無生相無住相無滅相則見道果諸善男女聞如是大乗祕宻經典而生不信此人從無量劫來受六畜身致生我慢不信三寳不信眞經我說祕宻眞藏有大弟子修行讀誦講說尊經於此眞藏能生信心常行不怠當知是人於諸天尊所施行功德而種福田無量劫來遵行大乗今遇此經生諸信心不住空有而求道者不住非空非有而求道者不住非非有非非空而求道者不住色聲而求道者不住非色非聲而求道者不住非非色非非聲而求道者不住智慧而求道者不住非智非慧而求道者不住非非智非非慧而求道者復告善明童子我之圎應悉知悉見了逹衆生知其根性照三世因何以故見知衆生有心取相者則生煩惱則生顚倒則生死壊若非心而取非相而取非法而取非著而取非見則壞世法斷諸善相汝不應取有捨無取無捨有取以是義故我常顯法法法常明明法無相無非法相無非非相汝等徒衆知我說意譬如虛舟汎浮濟溺無意而浮任人東西到所岸者捨舟便去况非舟耶善明童子天尊證成道果耶有所說法耶天尊曰一切諸法無有定相亦無定法究竟空寂若言我所說者則謗我法若言有法證成道者則壞世法何以故諸法微妙無有非法非非法盡爲功德無有差别所以爾者一切衆生習業不同皆從微妙而有差别當知差别非差别善明童子汝等云何若人行是功德於五惑世界金玉重寳並悉捨施此人所得功德以爲多不善明童子甚多天尊所說功德竒特希有若人於此經講說書寫受持供養此人所得功德勝彼百千萬倍何以故一切僊眞上聖皆從此經而成道果若無此經而成道者終無有是當知此經功德非可格量所謂道果即非道果而爲道果所謂三空四惑皆有所受即非道果而爲道果何以故我行一行絶諸有漏於法相中最爲第一善明童子汝等徒衆各淨國土離色香觸莊嚴妙麗以爲法界瑩飾其心是心非心名爲大心是名功德不可思議若有善男女等盡心供養講說讀誦當知是人功德第一成就羣生希有之法此經所在之處皆有道慧神通妙力善救法幢金剛童子隨處涌出護持法藏不得輕泄爾時善明童子上白天尊當何修此經我等徒衆云何受持天尊曰修此經者無文無字斷諸漏行證眞法藏此經名爲慧力法城善護羣生除邪惑障我說一切諸法即非諸法故名爲法城我說一切微塵即非微塵非微塵故名法城我說一切異類國土即非異類國土非國土故名爲法城善男子汝等若於眞藏法中能行一字或他方界爲人講說其福廣大不可稱量若於半法修行證全法者功徳甚重與彼無量善明童子聞說是經悟解其義涕洟泣淚恨不早聞希有天尊說如是眞藏深法度諸衆生我昔以來學小乗行所得法眼達理未深不曽得聞如是祕宻大乗經典今遇天尊授我妙藥令得受持信心定志莊嚴功德希有第一天尊曰所說功德實相即非功德實相非相非非相是名功德實相若能微思逹解功德實相者證法不足爲難何以故離一切微塵相故則是一切諸正眞法善男子若有人得聞此經此人即得金剛力得无畏心當知此人无量劫來修習此經勤行不懈復告善明童子一切衆生非有非非有非無非非無非心非非心是名悟解是名眞實是名功德善男子我非誑說非妄說非惑說非異說若有法可修可受可住可去可爲可得則壞正眞縳諸法性失諸功德不見道源不慈不孝㝠㝠闇室無解無出復次善明童子若有人忽聞此經心念不逆當知此人功德無量況書寫讀誦爲人講說功徳不可思議善男子在在處處皆有此經何以故不受聞見不受香味觸逹諸法性是人悉見此經則得功德名爲供飬名爲受持善男子應須恭敬應須供養功德甚重復次善男子若有人常行大心勸人修善讀誦此經功徳廣逺不可格量復次諸善知識各各自愼愼勿輕泄輕泄之者其罪甚重難可譬喻終劫說之亦不能盡其人無根宿無善念唯罪是務或聞善法心則狂亂狐疑不信當知此人難可勸化生死罪報無有限量爾時善明童子復白天尊一切衆生善男女等發心求無上道云何發心云何行行云何調理云何證道云何滅衆生行而成道果天尊曰一切衆生善男女等發心求無上道者云何所疑而作此問我本無生而無有滅一切衆生亦復如是無生無滅無住無去無人無我究竟平等實無有法發心求無上道者我於大慧之所所有一切法聚皆是大慧之本善明童子汝解如是說解如是義善明童子所解天尊說義於大慧之所者實無衆生可求道者亦無衆生而得道者天尊曰無說無聽以無說而無聽受之以無衆生而無衆生受之以無法而無法受之不壞世法而爲道果爲道果者無得無失無生無滅無憂無苦無顛無倒一切諸法皆是正道所言正道者無一切法亦無正法是名眞法非眞非眞而名道果善明童子問天尊言大慧具五眼不天尊答曰實具大慧有肉眼有法眼有慧眼有功德眼有道眼何以故肉眼即是法眼慧眼功德眼名爲道眼衆生即是法身慧身功德身名爲道身何以故一切法界名爲道身恒沙之衆數不能盡一切衆生異國殊心種種色相類聚羣分道眼悉知何以故天尊所顯色相殊心即非有心非色相心非心不心亦非不心非相不相亦非不相非過去心亦非非心非未來心亦非非心非現在心亦非非心當知法力甚深功德微妙祕宻眞藏難可譬喻得其邊底善明童子歡喜歎曰善哉善哉四衆各各伏地同聲讚歎而說頌曰天尊顯法王微妙無虚假功德隨心王慧源無不普種種色相好大心平等土度脫諸衆生消滅三塗苦四衆各得法法滅自然覩迷者不信眞沉瀹繫在五天尊善方便說法無偏普道眠一時照狐疑無不洗五隂豁朗開六情不相染方寸堅得道思微志可顯爾時大衆說此頌巳歎大慈尊顯諸法性自在神力我等徒衆不能顯了何以故天尊所說法即非說法若言天尊說者即是壊法即是毀法即是謗法即是滅法何以故不解天尊意故惟願天尊隨機爲說天尊曰我得成無上道者爲無所得覺法空寂覺無所覺寂無所寂無覺而覺無寂而寂證法理故名無上道無法可證無道可顯故名得道復次善男子等諸法平等無髙無下無生無滅無去無來是名無上道果我今所說非法名爲法王悉爲自在若有人於此經中修行一句爲人講說勸人受持讀誦所得功德億千萬倍非可譬喻恒沙筭數不能盡或有捨身毀碎或有投身餓虎或有火焚身命或有繫業因果捨施求福如此功德甚薄法力不成何以故無慧解故無通逹故自證自求自得自我如是自縳墮無明障假使碎身如恒河沙塵塵成灰土終無有盡以無盡故繫業不除業業相牽云何解脫汝諸徒衆各自思惟勿生懈怠勤行智慧證果須臾天尊於是而說頌曰法王遍法界濟度諸衆生慈恩惠澤普斷惑爲法城寳珠非内外照曜甚分明汝等諸徒衆迷惑不能行徒勞修苦行萬劫亦無榮忘身自無我功德坦然平常行不懈怠魂神無有驚我今顯法王了了常清淨悟解由方寸縁縁等無病功德遍法界何假虛嗟詠汝等須努力勤行無堅硬天尊說此頌巳告諸徒衆汝等深心伏聽告示諸法非外非内非長非短非去非來非虛非假微妙宛約百寳莊嚴功德具足非可顯名所說功德非功德是名功德所說證果非證果是名證果所說得道非得道是名得道悟解深解名爲大乗所說大乗非大乗是名大乗所說法界非法界是名法界遍入沙塵非沙塵是名沙塵如是微妙功德非可譬喻諸僊等衆聞如是說驚怖振惶汗流至踵各各自思俄頃之間遂經一劫得悟大乗證無上道天尊曰不以具足智慧而得成道不以具足相好而得成道不以具足煩惱而得成道不以具足諸塵而得成道不以具足法寳莊嚴而得成道不以具足法界而得成道不以具足布施而得成道若有善男女等能悟一切諸法大自在王平等究竟此人功德不可思議諸得道者不受功德不受智慧不受諸行不受慈悲不受忍辱善明童子上白天尊云何諸僊學道不受功德不受智慧不受諸行不受慈悲不受忍辱天尊曰大乗法印諸漏永斷云何貪受功德云何有貪受智慧若有善男女等說言天尊應見有來有去者此人迷惑不解我說當知天尊平等無二故名天尊若有人於法界以爲微塵比塵之數以爲多不諸僊等甚多天尊曰如我說法百億日月百億星宿數未及其一何以故我說法界非法界而爲法界我說衆生非衆生而爲衆生我說得道非得道而爲得道衆生貪着事事取捨生死變易迷惑神魂失平等性若有男女等捨身盡諸世界所有珎寳布施此之功德以爲多不諸僊等甚多若有人受持此經爲人演說不着諸相不着諸相不證我人不一諸理此之功德不可稱量勝彼百千萬億此之功德百千萬億分亦不及其一當知此經功德甚重不可稱量爾時四座於靈解山及諸天等衆悉皆悟解僉然稱善稽首讃歎天尊廣演大乗濟無邊衆各各自願報我國王思天尊力由我國王覆育我等致得尋眞求學聖道我等隨縁得悟難可思議善男女等人身難得努力勤行勿生懈怠一失善道萬劫無期天尊曰善哉善哉諸徒衆等並有宿縁根機易解聞此大乗信此勤行玄心逺念離空有相證法無生汝等四衆各率衆縁隨機化導勿滯一方悟諸縁理我顯眞藏大乗經典付属國王并大弟子留傅宣布濟沉溺苦大乘甘露其味希有得比味者無生無滅無去無來湛然常住究竟道塲若有毀謗不信此經此人見世惡業所種死入酆都中府風刀之考鬼神讁役一十四曹曹一考官百二十考吏一千二百考兵一萬二千考主三河九江四瀆溟波死魂作役如是考對痛毒難勝天尊於是重說苦魂而作頌曰爲人不信法毀謗於賢良受死酆都報劔樹碎形傷萬劫劫無期魂神痛斷腸呌聲聲不絶獄卒淬鑊湯受報無休息嗔眼四邊張誰能受此苦迷惑亂猖狂寄語修行子修福永無殃天尊說此頌巳告諸四衆善男子等各各勤行禁諸四患行平等心學大乗道三便永畢六通智慧得無畏心善明童子及諸四衆歡喜無量頂戴不勝慧心定志受教奉行從身至身從劫至劫誓無退轉稽首作禮各還本國无上内祕眞藏經卷之三
