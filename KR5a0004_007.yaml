front:
  text: 無上內祕真藏經卷之七洪十四
  hash: sha256:7bf36537249c031a047c96c8ef70afb22ba984402400495208e3de382dec8e11
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0004_HFL_007-001a, image: hfl/0015/0015-082.png}
body:
  text: 妙德品爾時真藏童子與諸眷屬天仙地仙無鞅數衆俱詣天尊遊行世界及下方無極地獄天上天下悉皆周匝見一國土國名長引男女長大長三十丈年壽八千皆學道德又見一國男女純朴無有文字尊卑上下各自禮敬不失威儀又見一國自然衣食男女歡樂無有哀憂又見一國國名塞河人長一丈三尺多力如獸不知道德無有人禮又見一國男女一足食自生之穀無有衣服又見一國之人身長九寸止息樹間不衣不食又見一國男女禮敬修學大乘無為自化又見一國男女鳥頭人面衣自然之衣猶如禽獸又見一國男女長壽生而不死又見一國男女身三足兩頭棵身無衣猶如野鹿又見一國男女唯有一眼在於頂上身生毛羽一足而行語似鳥音不知父毋又見一國國中有山左右金光之樹樹髙三百丈許其實美於甘泉食之千日皆得仙道乃至下方無極世界地獄罪報苦樂不同或抱銅柱或循劒樹或入鑊湯或上刀山或分形碎體或拔舌鐵錐各配者曹或在北元曹或在九府曹或在幽夜曹或在苦神曹或在毒刃曹或在溟波曹或在考正曹或在四極曹或在長劫曹或在三難曹或在萬掠曹或在長苦曹或在無極曹如此考掠罪報不可思議略述所見雜類不同敢問天尊大乘道教為遍周不若不遍者不名大乘若普遍者悉應知道知道教者應無罪業各有道德亦無善惡唯願天尊垂慈教示令衆得聞天尊曰何故復作此問吾為汝說譬如百昌一地生長種種不同或大或小或長或短千差萬别衆兆雜類亦復如是大乘造化品物不同國土差殊形貌不等天尊隨類相好優劣各順物宜習其本業既得本業隨類受形所受形者皆具道德悉入大乘當知祕密真藏功德廣遠非可格量一切衆生心心同受業業不等或造惡者或行善者種種運為皆由心作道常冥通不在中間亦不在外譬如夜室暉光隨孔而照光雖萬殊而本之者一真藏童子汝等善思大乘功德殊妙不可證知若證功德者一切善惡非善惡而為功德一切罪業非罪業而為功德一切地獄非地獄而為功德一切道場非道場而為功德一切衆生非衆生而為功德一切諸法非諸法而為功德一切生死非生死而為功德一切去來非去來而為功德一切天尊非天尊而為功德一切衆聖非衆聖而為功德一切大乘非大乘而為功德一切愚智非愚智而為功德一切雜類非雜類而為功德如是功德遍周皆是道惠亦名道眼亦名解脫亦名究竟亦名大通亦名普德亦名冥寂亦名遠逝亦名法毋亦名能生亦名妙相亦名出入亦名真藏亦名法寶亦名衆生亦名善惡亦名生死亦名取捨亦名雜類亦名分別亦名人我功德微妙不可思議種種示形非可演名爾時真藏童子及諸四衆聞如是功德驚悖喪忙反迷大道不審世間積財功德及修道業功德云何為有功德為無功德苦有功德天尊遍說大乘微妙功德即是虛誕誑惑衆生不為真實若無功德衆生不修不作功德應成道果天尊曰善哉善哉我說大乘微妙功德盡虛空界纖芥無遺汝所問者積財修業亦是功德何以故積財非財修業非業無人無我三善既淨即是微妙功德亦名大乘亦名證果亦名智惠亦名解脫一切諸法亦復如是究竟清浮究竟道場究竟功德汝等四衆善思積念精専無二功德深逺卒不能聞譬如穿井井穿愈深漸漸功多運土難出既至泉源得止衆渴悉令飽足無饑渴想穿井功勞隨泉亦滅修道積行亦復如是隂恩密惠研盡窮源了達性情從容自在功迹不見得至大乘功德具足又如逺行遊步萬里種種艱辛無所不見修道積行亦復如是艱辛苦行遊歷世問滅迹塵勞得諸根性證成道果衆生根性六賊馳騁四魔纒身三業取持五廕𦆑綿舉手運為皆成罪業善男子汝等徒衆深研靈奧栖心事表勿著我人纍結塵勞怨憎競起心邪亂惑百鬼來侵壽夭不長死入惡道一切衆生亦復如是飄浪生死恩愛貪求念念施為遂無覺察譬如猿猴跳躑恃便忽罹機辟自喪身本衆生心賊亦復如是汝等建志如履氷谷吾為汝說昔有一人不知內行鑽研智惠向外求善朝夕拜跪枯樹云乞長生二十八年不倦時刻枯木忽然生華內有甘汁其味甜密此人乃即飲之即得地仙當知心志懇到道不負人枯木猶感直心況研內行自然解脫爾時真藏童子及諸四衆聞此譬諭澤被不勝悟解大乘深淺同等功德殊妙各入軌儀天尊於是而作頌曰諸法微妙相自然功德本生靈解脫師體悟道非逺我顯歸舊宗功德無遲晚勤行積善行大乘與物反煩惱內尋真諸根寂然混汝等各自思愚夫終不忖他方雜世界功德遍皆滿物類雖不同真德無虧損我說真藏經度脫皆平等小乘人不信慈心內舍養方便令受持功德隨日長汝等勤精進證法如影響五廕香園林禁持牢守掌天尊說頌讃掦功德告諸童子并及眷屬一切衆生不離言教而求道果不離文字即是功德爾時真藏童子敢問天尊若有男女求學文字及諸言教云何問厥言教文字的在何方為在過去為在未來為在見在若在過去過去巳去復無可求者在未來未來未至亦不可得若在見在見在不住不住故無可求唯願天尊指掌開示天尊曰善哉善哉未求道者離一切相絶空有心我說文字性雜言教亦空非空不空亦不不空即此言者即是道果亦名內求又問一切衆生根機不等心識難如若決空理恐觸愚情者執有陳復乖智者云何可授天尊答言當觀其行具六正法便可授與又問何謂六正一者眼不受色眼根解脫二者耳不受聲耳聰明朗三者鼻無羶氣鼻徹衆腥四者口無言過口辨法本五者身不受觸身性虛通六者心意無纍惠解無方此六正者上士之行當合大乘入功德本復次有五善法堪授教人何謂五善一老善離世間華色之汝二者善行恩愛隨緣濟給三者善建功德常懷忍辱四者善事明師修學正道五者善能方便咨請良友此五善者中士之業當合中乘進升道境復次有九戒法何謂九戒一者戒身身不妄殺愛育羣生二者戒意意不妄貪無犯諸惡三者戒足足不妄踐無傷害命四者戒手手不妄操無受他物五者戒心心忍如地無有怨結六者戒耳耳不妄受無善惡聲七者戒眼眼不妄視無五色見八者戒口口不妄言無毀良善九者戒鼻鼻不妄喚無染薰馨此九者戒為下品衆生修行堅受福德立降如是真藏善逗機緣布張得所汝等徒衆依此受持功德無量不可稱說若有善惠解者為人講說曉示羣迷功德深逺何以故續續相傳經教不絶猶如傳燈一燈傳之百千萬燈一時俱照光明無損前燈後燈無優無劣智慧傳者亦復如是爾時真藏童子與諸徒衆共言契會我等並有宿福得遇天尊顯揚功德教示委曲悟解機緣我等各自建志從身至身從劫至劫經涉履歷終無退轉復次各各誓願濟度蒼生令出苦海若見急難當誦此經難即消滅若見國土有橫祅𦍙當誦此經祅即自止若有水旱兵災當誦此經兵甲不起若見疾病衰厄當誦此經病自消愈此經神力廣逺諸天童子大力鬼王師子金剛共相衛護我等正念勿負願言各各自視心心相得恬神靜念歎喜讃曰法王法力惠慈尊開演功德遍法界衆生衆行並沾恩蠢蠕蛸翹皆䝉賴大乘大道平等師普教羣迷無遺芥愚人愚暗不信真棄背慈母生恩愛慈母慈悲常度脫出入去來無有礙我等我行內思惟纍積功勞經千載小乘小知無寸功難化自我終無改十方十聖皆受持證果無方得自在爾時真藏童子及諸眷屬說此讃頌上白天尊咨論妙法一切衆生各自人我行衆生行乃至小乘二見之人引導羣迷亦自說言我所說者文真理直世間無比最尊最妙為衆經本復有諸雜鬼神之類亦自說言我所說者文真理實希有第一復有異類國土祅鬼甚多人民欣樂行小乘法専思斷惡志行善果貪善無巳不作諸惡亦自為是如此人行各各自専衆生淺劣易信小言志學為善云何得離小乘而習大行天尊曰如是如是衆生顚倒易牽易誘從易牽誘悉入邪道何以故昔有一國名曰自通常行善行智劣不深信邪善法有一野狐即是狐王多妖詐惑種種方術欲化國王語狐徒衆自通之國國王樂善棄惡智淺不深聞善則信我有妙術能飛能隱聰明智朗飛向殿前變作人像端正第一懸坐虛空去地百丈說諸妙經談空解義辨别隂陽聲響知鍾言泉河瀉遂不輟音國內宫人𡣕妃婇女及諸眷屬境內臣民信我靈聖必當聚集觀聽我說以為希有隨我所要必用我語我當勸其捨命脫取衣裳并及寶物收攝歸家入市貨易買取肥肉與我妻子眷屬共相餐食豈非上計美樂之業野狐徒衆俱聲唱善啓白王言徒衆常行偷盜并取野物恆怕畏人捉獲身命無量辛苦供給大王不能得濟王有如此上妙才𠆸絶世希有何不急興狐王聞此語巳便即起心暗誦幻術經文棄惡從善三日四夜誦得數百餘卷悉皆利滑即變形體飛空而去直到國王殿前去地百丈坐虛空中口誦經典果如前言國王宫人婇女妃𡣕及百千眷屬一時雲集舉目仰視觀見狐王說法奇特哀嗚哽咽悲泣交流勸善捨惡宫人彩女并及羣臣嗟歎無巳聖人出世希有難聞國內寶物并及百姓人民悉皆捨施復有三十餘人於王殿前一時捨命狐五語時衆曰如此捨命最是上士我以神力攝持將去安置玉山寶堂之內常行供養作是語巳化作疾風死尸寶物悉皆攝去無有遺失到羣狐窟共食人肉復遺狐子變化人形齎持寶物入市貨賣用將買肉至屠兒行中評論肉價屠兒行中有數猛狗爭骨相嚙狐子見狗心生忙怕不覺變形狗便嚙殺屠兒惶怖得此寶物不敢私藏即告市官具說如是市官不敢藏之即告州縣州即申奏國王陳狐寶物具述迹狀國王見表寶物之狀便即覺悟識此之物是我小兒所玩寶物前施聖道何故在狐手中爾時有一慧解之士名曰仙靈即前伏地上啓大王賜臣萬死敢以上陳王即開恩百死不問若有别見任當說言仙靈長跪而啓王曰前空中說經教化者即是狐魅祅術臣當欲啓大王懼違王意不敢出言王曰汝何得知仙靈曰但誦其文不解其理勸人棄惡從善心口乖違復能飛空即知虛僞一切大聖寂滅無端云何有此惑衆王曰錯失奈何仙靈曰可集軍衆多將猛狗圍彼大陵斷除妖種正法流行王即命諸軍衆剋定時日圍彼丘陵狐即變作人形稽首再拜奉迎於王猛狗來逼變為狐狀狗即嚙殺王命羣臣鑿地窟中必得寶物羣臣即尋鑿掘得至狐窟大得寶物王即敕下天下召來認物所來認者皆得其實當知世間難辨口是心非假說僞途情迷倒惑汝等四衆善自覩察六正法中取其一義無毀無壞無邪無惑何謂一義天尊曰不受諸有不受諸空忘身無我畢竟空寂即是第一義端又問忘身無我誰受空義得為第一天尊答言唯我自受又問自受無我云何有我自受如是如是實無自我即是第一義無生無滅究竟湛然故名自受復次一切衆生心行迷惑流在六十五道雜類邪見鬼神入其心府常作鬼語不自覺知聞說浮言即將為善若值祕密真藏逆耳無聞即生不信邪見外道巧說僞詞入其骨髓歡喜讃歎語其妻子歸崇此法即得成道何以故此法善見於人邪言易染便即受信若聞真藏離一切相滅空有心即生誹謗復次諸善男女等昔有一國國王名曰突敖自在為人通辨物理諸方外道邪見祅術種種方計來化國王行習僞道初有一人最為多解作術變形騰空自在音鍾𠆸樂充塞虛空徑至王所鏗鏘讃誦不可稱名宫人婇女上下羣臣觀此法音迷狂倒惑三七五旬遂無悟者王告之曰汝是外道祅邪急須早去吾當滅汝今亂惑羣臣來破我國此人答言我是正道來見國王觀王修善王可熟觀聽我說法王曰汝行僞術種種變見在於人間更無過汝我國之中有大乘真藏經典為衆生法鏡無此浮言誑惑於我我聞有道之士藏名匿迹人衆不知又聞至道窗冥有形則僞急須疾去吾當滅汝我有智臣名曰通靈汝有道術共來論義王召通靈通靈即前稽首上白大王不審有何意故追臣急速王曰汝聞昨所有人顯其妙術誑惑羣臣化我修善汝須定却收併外道論義研窮觀其吐納測其神行通靈曰外道多僞少實不足堪談請王召取來王殿前對王決問三日三夜共言論義談空說有辨古顯今遂無屈滯通靈即顯慧源共論正道滿口異音形無立所仍即絶對竄影逃蹤王命羣臣收羅捕取於是羣臣召一國內有此等色即須捉獲遂爾失蹤遍求不得外道徒黨三千餘人更無敢出自然磨滅國內清正信向大乘愈加殷重十方諸國聞此國王自在請法辨邪無礙外道誘化不勝當自退滅各遣大臣尋諸道法迎請尊經爾時國王即遣通靈咨請尊法具述所由十方諸國來請尊經唯願神尊垂恩赴請爾時天尊聞彼咨請放大光明隨經普照金剛童子衛法善神無鞅數衆香華鬱鬱遍空飄飄神德威光悉皆擁護彼諸國土各見瑞相幡幢𠆸樂虛空而至復有鬱蕙反風名香不燌自熏充滿空中濟生度死彼諸國王各浮國土裝辦洗拭迎請聖尊到彼國內七日七夜法音不絶仙童玉女遍滿法界諸天歡樂各奏音樂鏗鏘和雅動諸國土歡喜無量各各發願歸依無上道歸依無上經歸依無上師福德報應不可格量天王自在國盛人昌兵戈永絶萬劫無殃復有邊邦雜類國土聞此妙經神德威力各各奉迎尊崇聖道心與口誓從身至身學無上道不生猒倦於是神尊即遣童子護法善神無量等衆各齎反風鬱慧名香隨心請到所到之國地皆琉璃人人歡樂衣食自然國內清淨十方大聖並共護持宣揚真藏祕密妙經相傳付囑委寄國王并及大臣受持供養天上天下三清境界功德遍熏不可稱說諸善男女等勤學大乘修行三慧何謂三慧一者巧積方便善滅外塵二者斷諸行漏不出他境三者尋求實相直至道場既證反本二見常明三業輪轉四大恆通五廕開朗六情不染七識自在八正無我九德綿綿先賢後聖莫不由此而得成道當知真藏最為第一何以故諸餘經教皆說枝條小乘階級此經顯其根本言真理實易解分明是時座中有一智士名曰法寥上白天尊我昔以來經七小劫從師學道種種聞知多有不了未敢咨請又隨天尊到靈解山顯揚功德真藏大乘悉皆平等無極境界並悉沾恩不審何故更有諸國各遣大臣尋詣道法迎請尊經若普沾被不應更來迎請既有請者道則不周唯願天尊分明指掌天尊曰善哉善哉汝所問者衆兆同疑我今當說大乘經教混物為先無法不周無法不遍他方請者未有開發不識道源一切雜類皆從道生而不知道要須師發譬如寶藏埋在地中衆人踐之遂不知覺若善别者占視則知他方功德亦復如是雖有不知要須迎請而為發之一切衆生亦復如是或居中國王法當行遂無悟者終劫說之亦不能盡譬如頭圎戴天不知天之髙邃足方踐地不知地之深厚一切諸法生在道中不知道之形像衆生迷惑亦復如是爾時法寥及諸大衆歡喜作禮覺悟六正通三慧道守一舊城諸魔賊滅稽首奉辭無上慈尊哀嘷哽咽默然别去矣無上內袐真藏經卷之七
